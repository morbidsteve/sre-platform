---
# hello-web — deployed via sre-deploy-app.sh
# Reference copy: this is what the deploy script generates for Example 01.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hello-web
  namespace: team-demo
  labels:
    app.kubernetes.io/part-of: sre-platform
    sre.io/team: team-demo
spec:
  interval: 10m
  chart:
    spec:
      chart: ./apps/templates/web-app
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    app:
      name: "hello-web"
      team: "team-demo"
      image:
        repository: "harbor.apps.sre.example.com/team-demo/hello-web"
        tag: "v1.0.0"
        pullPolicy: IfNotPresent
      port: 3000
      replicas: 1
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 256Mi
      probes:
        liveness:
          path: "/"
          initialDelaySeconds: 10
          periodSeconds: 10
        readiness:
          path: "/"
          initialDelaySeconds: 5
          periodSeconds: 5
      env: []
    ingress:
      enabled: true
      host: "hello-web.apps.sre.example.com"
    autoscaling:
      enabled: false
    serviceMonitor:
      enabled: false
    networkPolicy:
      enabled: true
    podDisruptionBudget:
      enabled: false
