---
# acme-portal — deployed via sre-deploy-app.sh
# Reference copy: this is what the deploy script generates for Example 04.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: acme-portal
  namespace: team-demo
  labels:
    app.kubernetes.io/part-of: sre-platform
    sre.io/team: team-demo
spec:
  interval: 10m
  chart:
    spec:
      chart: ./apps/templates/web-app
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    app:
      name: "acme-portal"
      team: "team-demo"
      image:
        repository: "harbor.apps.sre.example.com/team-demo/acme-portal"
        tag: "v3.1.0"
        pullPolicy: IfNotPresent
      port: 8443
      replicas: 1
      resources:
        requests:
          cpu: 500m
          memory: 512Mi
        limits:
          cpu: 2000m
          memory: 2Gi
      probes:
        liveness:
          path: "/health"
          initialDelaySeconds: 10
          periodSeconds: 10
        readiness:
          path: "/health"
          initialDelaySeconds: 5
          periodSeconds: 5
      env: []
    containerSecurityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
      runAsNonRoot: true
      capabilities:
        drop:
          - ALL
    startupProbe:
      enabled: true
      path: "/health"
      initialDelaySeconds: 5
      periodSeconds: 5
      failureThreshold: 30
    appProtocol: "https"
    ingress:
      enabled: true
      host: "acme.apps.sre.example.com"
    autoscaling:
      enabled: false
    serviceMonitor:
      enabled: false
    networkPolicy:
      enabled: true
    podDisruptionBudget:
      enabled: false
