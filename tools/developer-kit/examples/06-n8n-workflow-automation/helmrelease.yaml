# n8n — workflow automation platform
# Demonstrates: root-required app, non-standard port, persistent storage, startup probe
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: n8n
  namespace: REPLACE_TEAM_NAMESPACE
  labels:
    app.kubernetes.io/part-of: sre-platform
    sre.io/team: REPLACE_TEAM_NAME
spec:
