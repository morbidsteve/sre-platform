apiVersion: sre.io/v1alpha1
kind: DeploymentBundle
metadata:
  name: taskboard
  version: "1.0.0"
  team: team-demo
  author: "Platform Team"
  description: "Kanban task board — React frontend + Go API + PostgreSQL"
spec:
  app:
    type: web-app
    image: images/frontend.tar
    port: 8080
    resources: small
    ingress: taskboard.apps.sre.example.com
    probes:
      liveness: /
      readiness: /
  components:
    - name: api
      type: api-service
      image: images/backend.tar
      port: 9090
      resources: small
  services:
    database:
      enabled: true
      size: small
    redis:
      enabled: false
    sso:
      enabled: true
    storage:
      enabled: false
  env:
    - name: LOG_LEVEL
      value: "info"
    - name: DATABASE_URL
      secret: taskboard-db-credentials
  security:
    runAsNonRoot: true
    readOnlyRootFilesystem: true
    capabilities: []
  source:
    included: true
    language: go
  classification: UNCLASSIFIED
