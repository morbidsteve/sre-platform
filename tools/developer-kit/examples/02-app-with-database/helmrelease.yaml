---
# todo-app — deployed via sre-deploy-app.sh
# Reference copy: this is what the deploy script generates for Example 02.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: todo-app
  namespace: team-demo
  labels:
    app.kubernetes.io/part-of: sre-platform
    sre.io/team: team-demo
spec:
  interval: 10m
  chart:
    spec:
      chart: ./apps/templates/web-app
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    app:
      name: "todo-app"
      team: "team-demo"
      image:
        repository: "harbor.apps.sre.example.com/team-demo/todo-app"
        tag: "v2.0.0"
        pullPolicy: IfNotPresent
      port: 8080
      replicas: 1
      resources:
        requests:
          cpu: 250m
          memory: 256Mi
        limits:
          cpu: 1000m
          memory: 1Gi
      probes:
        liveness:
          path: "/healthz"
          initialDelaySeconds: 10
          periodSeconds: 10
        readiness:
          path: "/readyz"
          initialDelaySeconds: 5
          periodSeconds: 5
      env:
        - name: "DATABASE_URL"
          value: "postgres://todo:changeme@todo-db:5432/todo?sslmode=disable"
    persistence:
      enabled: true
      mountPath: "/app/data"
      size: "5Gi"
    ingress:
      enabled: true
      host: "todo.apps.sre.example.com"
    autoscaling:
      enabled: false
    serviceMonitor:
      enabled: false
    networkPolicy:
      enabled: true
    podDisruptionBudget:
      enabled: false
