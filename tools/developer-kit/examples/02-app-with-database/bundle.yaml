apiVersion: sre.io/v1alpha1
kind: DeploymentBundle
metadata:
  name: todo-app
  version: "2.0.0"
  team: team-demo
  author: "Demo Developer"
  description: "Todo application with PostgreSQL database and SSO"
spec:
  app:
    type: web-app
    image: images/todo-app.tar
    port: 8080
    resources: medium
    ingress: todo.apps.sre.example.com
    probes:
      liveness: /healthz
      readiness: /readyz
  services:
    database:
      enabled: true
      size: small
    redis:
      enabled: false
    sso:
      enabled: true
    storage:
      enabled: false
  env:
    - name: LOG_LEVEL
      value: "info"
    - name: DATABASE_URL
      secret: todo-db-creds
  source:
    included: false
  classification: UNCLASSIFIED
