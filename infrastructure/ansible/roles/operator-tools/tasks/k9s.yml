---
# Install k9s — Terminal UI for Kubernetes cluster management

- name: Check if k9s is already installed at target version
  ansible.builtin.command: /usr/local/bin/k9s version --short
  register: k9s_installed
  changed_when: false
  failed_when: false

- name: Install k9s {{ operator_tools_k9s_version }}
  when: k9s_installed.rc != 0 or operator_tools_k9s_version not in (k9s_installed.stdout | default(''))
  block:
    - name: Download k9s release archive
      ansible.builtin.get_url:
        url: "https://github.com/derailed/k9s/releases/download/{{ operator_tools_k9s_version }}/k9s_Linux_{{ operator_tools_k9s_arch }}.tar.gz"
        dest: /tmp/k9s.tar.gz
        mode: "0644"
        timeout: 60

    - name: Extract k9s binary to /usr/local/bin
      ansible.builtin.unarchive:
        src: /tmp/k9s.tar.gz
        dest: /usr/local/bin
        remote_src: true
        include:
          - k9s
        mode: "0755"

    - name: Remove k9s download archive
      ansible.builtin.file:
        path: /tmp/k9s.tar.gz
        state: absent
