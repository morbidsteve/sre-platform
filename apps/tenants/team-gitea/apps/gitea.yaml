---
# gitea — deployed via sre-deploy-app.sh
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gitea
  namespace: team-gitea
  labels:
    app.kubernetes.io/part-of: sre-platform
    sre.io/team: team-gitea
spec:
  interval: 10m
  chart:
    spec:
      chart: ./apps/templates/web-app
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    app:
      name: "gitea"
      team: "team-gitea"
      image:
        repository: "harbor.apps.sre.example.com/team-gitea/gitea"
        tag: "v1.23.3"
        pullPolicy: IfNotPresent
      port: 3000
      replicas: 1
      resources:
        requests:
          cpu: 250m
          memory: 256Mi
        limits:
          cpu: 1000m
          memory: 1Gi
      probes:
        liveness:
          path: "/"
          initialDelaySeconds: 10
          periodSeconds: 10
        readiness:
          path: "/"
          initialDelaySeconds: 5
          periodSeconds: 5
      env: []
    podSecurityContext:
      runAsNonRoot: false
      runAsUser: 0
      seccompProfile:
        type: RuntimeDefault
    containerSecurityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
      runAsNonRoot: false
      capabilities:
        drop:
          - ALL
    startupProbe:
      enabled: true
      path: "/"
      initialDelaySeconds: 5
      periodSeconds: 5
      failureThreshold: 30
    persistence:
      enabled: true
      mountPath: "/data"
      size: "20Gi"
    ingress:
      enabled: true
      host: "gitea.apps.sre.example.com"
    autoscaling:
      enabled: false
    serviceMonitor:
      enabled: false
    networkPolicy:
      enabled: true
    podDisruptionBudget:
      enabled: false
