---
# minio — deployed via sre-deploy-app.sh
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: minio
  namespace: team-storage
  labels:
    app.kubernetes.io/part-of: sre-platform
    sre.io/team: team-storage
spec:
  interval: 10m
  chart:
    spec:
      chart: ./apps/templates/web-app
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    app:
      name: "minio"
      team: "team-storage"
      image:
        repository: "harbor.apps.sre.example.com/team-storage/minio"
        tag: "v2024.11.7"
        pullPolicy: IfNotPresent
      port: 9000
      replicas: 1
      resources:
        requests:
          cpu: "1"
          memory: "2Gi"
        limits:
          cpu: "4"
          memory: "8Gi"
      probes:
        liveness:
          path: "/minio/health/live"
          initialDelaySeconds: 10
          periodSeconds: 10
        readiness:
          path: "/minio/health/ready"
          initialDelaySeconds: 5
          periodSeconds: 5
      command:
        - "minio"
      args:
        - "server"
        - "/data"
        - "--console-address"
        - ":9001"
      env: []
    podSecurityContext:
      runAsNonRoot: false
      runAsUser: 0
      seccompProfile:
        type: RuntimeDefault
    containerSecurityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
      runAsNonRoot: false
      capabilities:
        drop:
          - ALL
    persistence:
      enabled: true
      mountPath: "/data"
      size: "50Gi"
    envFrom:
      - secretRef:
          name: "minio-credentials"
    extraPorts:
      - name: "console"
        port: 9001
        targetPort: 9001
        protocol: "TCP"
    ingress:
      enabled: true
      host: "minio.apps.sre.example.com"
    autoscaling:
      enabled: false
    serviceMonitor:
      enabled: false
    networkPolicy:
      enabled: true
    podDisruptionBudget:
      enabled: false
