---
# greeter-server — deployed via sre-deploy-app.sh
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: greeter-server
  namespace: team-grpc
  labels:
    app.kubernetes.io/part-of: sre-platform
    sre.io/team: team-grpc
spec:
  interval: 10m
  chart:
    spec:
      chart: ./apps/templates/api-service
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    app:
      name: "greeter-server"
      team: "team-grpc"
      image:
        repository: "harbor.apps.sre.example.com/team-grpc/greeter"
        tag: "v1.0.0"
        pullPolicy: IfNotPresent
      port: 50051
      replicas: 1
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 256Mi
      probes:
        liveness:
          type: "grpc"
          path: "/"
          initialDelaySeconds: 10
          periodSeconds: 10
        readiness:
          type: "grpc"
          path: "/"
          initialDelaySeconds: 5
          periodSeconds: 5
      env: []
    appProtocol: "grpc"
    ingress:
      enabled: false
    autoscaling:
      enabled: false
    serviceMonitor:
      enabled: false
    networkPolicy:
      enabled: true
    podDisruptionBudget:
      enabled: false
