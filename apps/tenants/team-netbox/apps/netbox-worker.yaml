---
# netbox-worker — deployed via sre-deploy-app.sh
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: netbox-worker
  namespace: team-netbox
  labels:
    app.kubernetes.io/part-of: sre-platform
    sre.io/team: team-netbox
spec:
  interval: 10m
  chart:
    spec:
      chart: ./apps/templates/worker
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    app:
      name: "netbox-worker"
      team: "team-netbox"
      image:
        repository: "harbor.apps.sre.example.com/team-netbox/netbox"
        tag: "v4.2.8"
        pullPolicy: IfNotPresent
      port: 8080
      replicas: 1
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 256Mi
      probes:
        liveness:
          path: "/"
          initialDelaySeconds: 10
          periodSeconds: 10
        readiness:
          path: "/"
          initialDelaySeconds: 5
          periodSeconds: 5
      command:
        - "/opt/netbox/venv/bin/python"
        - "/opt/netbox/netbox/manage.py"
        - "rqworker"
      env: []
    podSecurityContext:
      runAsNonRoot: false
      runAsUser: 0
      seccompProfile:
        type: RuntimeDefault
    containerSecurityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
      runAsNonRoot: false
      capabilities:
        drop:
          - ALL
    singleton: true
    ingress:
      enabled: false
    autoscaling:
      enabled: false
    serviceMonitor:
      enabled: false
    networkPolicy:
      enabled: true
    podDisruptionBudget:
      enabled: false
