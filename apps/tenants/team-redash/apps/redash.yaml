---
# redash — deployed via sre-deploy-app.sh
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redash
  namespace: team-redash
  labels:
    app.kubernetes.io/part-of: sre-platform
    sre.io/team: team-redash
spec:
  interval: 10m
  chart:
    spec:
      chart: ./apps/templates/web-app
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    app:
      name: "redash"
      team: "team-redash"
      image:
        repository: "harbor.apps.sre.example.com/team-redash/redash"
        tag: "v10.1.0"
        pullPolicy: IfNotPresent
      port: 5000
      replicas: 1
      resources:
        requests:
          cpu: 250m
          memory: 256Mi
        limits:
          cpu: 1000m
          memory: 1Gi
      probes:
        liveness:
          path: "/"
          initialDelaySeconds: 10
          periodSeconds: 10
        readiness:
          path: "/"
          initialDelaySeconds: 5
          periodSeconds: 5
      env:
        - name: "REDASH_REDIS_URL"
          value: "redis://redash-redis:6379/0"
    startupProbe:
      enabled: true
      path: "/ping"
      initialDelaySeconds: 5
      periodSeconds: 5
      failureThreshold: 30
    ingress:
      enabled: true
      host: "redash.apps.sre.example.com"
    autoscaling:
      enabled: false
    serviceMonitor:
      enabled: false
    networkPolicy:
      enabled: true
    podDisruptionBudget:
      enabled: false
