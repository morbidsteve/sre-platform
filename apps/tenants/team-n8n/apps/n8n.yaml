---
# n8n — deployed via sre-deploy-app.sh
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: n8n
  namespace: team-n8n
  labels:
    app.kubernetes.io/part-of: sre-platform
    sre.io/team: team-n8n
spec:
  interval: 10m
  chart:
    spec:
      chart: ./apps/templates/web-app
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    app:
      name: "n8n"
      team: "team-n8n"
      image:
        repository: "harbor.apps.sre.example.com/team-n8n/n8n"
        tag: "v1.76.1"
        pullPolicy: IfNotPresent
      port: 5678
      replicas: 1
      resources:
        requests:
          cpu: 250m
          memory: 256Mi
        limits:
          cpu: 1000m
          memory: 1Gi
      probes:
        liveness:
          path: "/"
          initialDelaySeconds: 10
          periodSeconds: 10
        readiness:
          path: "/"
          initialDelaySeconds: 5
          periodSeconds: 5
      env: []
    persistence:
      enabled: true
      mountPath: "/home/node/.n8n"
      size: "5Gi"
    ingress:
      enabled: true
      host: "n8n.apps.sre.example.com"
    autoscaling:
      enabled: false
    serviceMonitor:
      enabled: false
    networkPolicy:
      enabled: true
    podDisruptionBudget:
      enabled: false
