---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../_base
  - apps/

patches:
  - target: { kind: Namespace, name: TENANT_NAME }
    patch: |
      - op: replace
        path: /metadata/name
        value: team-n8n
      - op: replace
        path: /metadata/labels/sre.io~1team
        value: team-n8n
  - target: { kind: ResourceQuota, name: tenant-quota }
    patch: |
      - op: replace
        path: /metadata/name
        value: team-n8n-quota
      - op: replace
        path: /metadata/namespace
        value: team-n8n
  - target: { kind: LimitRange, name: tenant-limits }
    patch: |
      - op: replace
        path: /metadata/name
        value: team-n8n-limits
      - op: replace
        path: /metadata/namespace
        value: team-n8n
  - target: { kind: RoleBinding, name: tenant-developers }
    patch: |
      - op: replace
        path: /metadata/name
        value: team-n8n-developers
      - op: replace
        path: /metadata/namespace
        value: team-n8n
      - op: replace
        path: /subjects/0/name
        value: team-n8n-developers
  - target: { kind: RoleBinding, name: tenant-viewers }
    patch: |
      - op: replace
        path: /metadata/name
        value: team-n8n-viewers
      - op: replace
        path: /metadata/namespace
        value: team-n8n
      - op: replace
        path: /subjects/0/name
        value: team-n8n-viewers
  - target: { kind: NetworkPolicy, name: default-deny-all }
    patch: |
      - op: replace
        path: /metadata/namespace
        value: team-n8n
  - target: { kind: NetworkPolicy, name: allow-dns }
    patch: |
      - op: replace
        path: /metadata/namespace
        value: team-n8n
  - target: { kind: NetworkPolicy, name: allow-monitoring }
    patch: |
      - op: replace
        path: /metadata/namespace
        value: team-n8n
  - target: { kind: NetworkPolicy, name: allow-istio-gateway }
    patch: |
      - op: replace
        path: /metadata/namespace
        value: team-n8n
  - target: { kind: NetworkPolicy, name: allow-same-namespace }
    patch: |
      - op: replace
        path: /metadata/namespace
        value: team-n8n
  - target: { kind: NetworkPolicy, name: allow-istio-control-plane }
    patch: |
      - op: replace
        path: /metadata/namespace
        value: team-n8n
  - target: { kind: NetworkPolicy, name: allow-https-egress }
    patch: |
      - op: replace
        path: /metadata/namespace
        value: team-n8n

  - target: { kind: ResourceQuota, name: tenant-quota }
    patch: |
      - op: replace
        path: /spec/hard/requests.cpu
        value: "8"
      - op: replace
        path: /spec/hard/requests.memory
        value: "16Gi"
      - op: replace
        path: /spec/hard/limits.cpu
        value: "16"
      - op: replace
        path: /spec/hard/limits.memory
        value: "32Gi"
      - op: replace
        path: /spec/hard/pods
        value: "40"
      - op: replace
        path: /spec/hard/services
        value: "20"
      - op: replace
        path: /spec/hard/persistentvolumeclaims
        value: "20"
  - apps/n8n.yaml
  - apps/n8n-worker.yaml
