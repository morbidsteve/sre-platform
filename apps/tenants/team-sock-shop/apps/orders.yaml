---
# orders — deployed via sre-deploy-app.sh
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: orders
  namespace: team-sock-shop
  labels:
    app.kubernetes.io/part-of: sre-platform
    sre.io/team: team-sock-shop
spec:
  interval: 10m
  chart:
    spec:
      chart: ./apps/templates/api-service
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    imagePullSecrets:
      - name: harbor-pull-secret
    app:
      name: "orders"
      team: "team-sock-shop"
      image:
        repository: "harbor.apps.sre.example.com/team-sock-shop/orders"
        tag: "0.4.7"
        pullPolicy: IfNotPresent
      port: 80
      replicas: 1
      resources:
        requests:
          cpu: 250m
          memory: 256Mi
        limits:
          cpu: 1000m
          memory: 1Gi
      probes:
        liveness:
          path: "/"
          initialDelaySeconds: 10
          periodSeconds: 10
        readiness:
          path: "/"
          initialDelaySeconds: 5
          periodSeconds: 5
      env: []
    containerSecurityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      capabilities:
        drop:
          - ALL
        add:
          - NET_BIND_SERVICE
    startupProbe:
      enabled: true
      path: "/"
      initialDelaySeconds: 5
      periodSeconds: 5
      failureThreshold: 30
    ingress:
      enabled: false
    autoscaling:
      enabled: false
    serviceMonitor:
      enabled: false
    networkPolicy:
      enabled: true
    podDisruptionBudget:
      enabled: false
    podSecurityContext:
      runAsNonRoot: false
      seccompProfile:
        type: RuntimeDefault
    containerSecurityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
      runAsNonRoot: false
      capabilities:
        drop:
          - ALL
