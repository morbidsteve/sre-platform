---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../_base
  - apps/

patches:
  - target: { kind: Namespace, name: TENANT_NAME }
    patch: |
      - op: replace
        path: /metadata/name
        value: team-sock-shop
      - op: replace
        path: /metadata/labels/sre.io~1team
        value: team-sock-shop
  - target: { kind: ResourceQuota, name: tenant-quota }
    patch: |
      - op: replace
        path: /metadata/name
        value: team-sock-shop-quota
      - op: replace
        path: /metadata/namespace
        value: team-sock-shop
  - target: { kind: LimitRange, name: tenant-limits }
    patch: |
      - op: replace
        path: /metadata/name
        value: team-sock-shop-limits
      - op: replace
        path: /metadata/namespace
        value: team-sock-shop
  - target: { kind: RoleBinding, name: tenant-developers }
    patch: |
      - op: replace
        path: /metadata/name
        value: team-sock-shop-developers
      - op: replace
        path: /metadata/namespace
        value: team-sock-shop
      - op: replace
        path: /subjects/0/name
        value: team-sock-shop-developers
  - target: { kind: RoleBinding, name: tenant-viewers }
    patch: |
      - op: replace
        path: /metadata/name
        value: team-sock-shop-viewers
      - op: replace
        path: /metadata/namespace
        value: team-sock-shop
      - op: replace
        path: /subjects/0/name
        value: team-sock-shop-viewers
  - target: { kind: NetworkPolicy, name: default-deny-all }
    patch: |
      - op: replace
        path: /metadata/namespace
        value: team-sock-shop
  - target: { kind: NetworkPolicy, name: allow-dns }
    patch: |
      - op: replace
        path: /metadata/namespace
        value: team-sock-shop
  - target: { kind: NetworkPolicy, name: allow-monitoring }
    patch: |
      - op: replace
        path: /metadata/namespace
        value: team-sock-shop
  - target: { kind: NetworkPolicy, name: allow-istio-gateway }
    patch: |
      - op: replace
        path: /metadata/namespace
        value: team-sock-shop
  - target: { kind: NetworkPolicy, name: allow-same-namespace }
    patch: |
      - op: replace
        path: /metadata/namespace
        value: team-sock-shop
  - target: { kind: NetworkPolicy, name: allow-istio-control-plane }
    patch: |
      - op: replace
        path: /metadata/namespace
        value: team-sock-shop
  - target: { kind: NetworkPolicy, name: allow-https-egress }
    patch: |
      - op: replace
        path: /metadata/namespace
        value: team-sock-shop

  - target: { kind: ResourceQuota, name: tenant-quota }
    patch: |
      - op: replace
        path: /spec/hard/requests.cpu
        value: "16"
      - op: replace
        path: /spec/hard/requests.memory
        value: "32Gi"
      - op: replace
        path: /spec/hard/limits.cpu
        value: "32"
      - op: replace
        path: /spec/hard/limits.memory
        value: "64Gi"
      - op: replace
        path: /spec/hard/pods
        value: "80"
      - op: replace
        path: /spec/hard/services
        value: "40"
      - op: replace
        path: /spec/hard/persistentvolumeclaims
        value: "40"
  - apps/front-end.yaml
  - apps/catalogue.yaml
  - apps/carts.yaml
  - apps/orders.yaml
  - apps/payment.yaml
  - apps/user.yaml
  - apps/shipping.yaml
  - apps/queue-master.yaml
  - apps/catalogue-db.yaml
  - apps/carts-db.yaml
  - apps/orders-db.yaml
  - apps/user-db.yaml
  - apps/rabbitmq.yaml
