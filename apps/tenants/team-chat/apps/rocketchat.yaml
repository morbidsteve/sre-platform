---
# rocketchat — deployed via sre-deploy-app.sh
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rocketchat
  namespace: team-chat
  labels:
    app.kubernetes.io/part-of: sre-platform
    sre.io/team: team-chat
spec:
  interval: 10m
  chart:
    spec:
      chart: ./apps/templates/web-app
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    app:
      name: "rocketchat"
      team: "team-chat"
      image:
        repository: "harbor.apps.sre.example.com/team-chat/rocketchat"
        tag: "v7.0.0"
        pullPolicy: IfNotPresent
      port: 3000
      replicas: 1
      resources:
        requests:
          cpu: 250m
          memory: 256Mi
        limits:
          cpu: 1000m
          memory: 1Gi
      probes:
        liveness:
          path: "/"
          initialDelaySeconds: 10
          periodSeconds: 10
        readiness:
          path: "/"
          initialDelaySeconds: 5
          periodSeconds: 5
      env:
        - name: "ROOT_URL"
          value: "https://rocketchat.apps.sre.example.com"
        - name: "MONGO_URL"
          value: "mongodb://rocketchat-mongodb:27017/rocketchat"
    persistence:
      enabled: true
      mountPath: "/app/uploads"
      size: "10Gi"
    ingress:
      enabled: true
      host: "rocketchat.apps.sre.example.com"
    autoscaling:
      enabled: false
    serviceMonitor:
      enabled: false
    networkPolicy:
      enabled: true
    podDisruptionBudget:
      enabled: false
