---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: wireshark
  namespace: team-alpha
  labels:
    app.kubernetes.io/part-of: sre-platform
    sre.io/team: team-alpha
spec:
  interval: 10m
  chart:
    spec:
      chart: ./apps/templates/web-app
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    imagePullSecrets:
      - name: harbor-pull-creds
    app:
      name: wireshark
      team: team-alpha
      image:
        repository: harbor.apps.sre.example.com/team-alpha/wireshark
        tag: build-2e77d6f1
        pullPolicy: IfNotPresent
      port: 3000
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: "1"
          memory: 1Gi
      probes:
        liveness:
          path: /
          initialDelaySeconds: 30
          periodSeconds: 15
          type: http
        readiness:
          path: /
          initialDelaySeconds: 15
          periodSeconds: 10
          type: http
      env:
        - name: PUID
          value: "1000"
        - name: PGID
          value: "1000"
        - name: TZ
          value: "America/New_York"
    # Wireshark requires root and NET_ADMIN for packet capture
    podSecurityContext:
      runAsNonRoot: false
      runAsUser: 0
      runAsGroup: 0
      fsGroup: 0
      seccompProfile:
        type: RuntimeDefault
    containerSecurityContext:
      allowPrivilegeEscalation: true
      readOnlyRootFilesystem: false
      runAsNonRoot: false
      runAsUser: 0
      capabilities:
        add:
          - NET_ADMIN
          - NET_RAW
          - SYS_NICE
        drop: []
    ingress:
      enabled: true
      host: wireshark.apps.sre.example.com
    autoscaling:
      enabled: false
    serviceMonitor:
      enabled: false
    networkPolicy:
      enabled: true
    podDisruptionBudget:
      enabled: false
