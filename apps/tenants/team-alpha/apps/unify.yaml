---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: unify
  namespace: team-alpha
  labels:
    app.kubernetes.io/part-of: sre-platform
    sre.io/team: team-alpha
spec:
  interval: 10m
  chart:
    spec:
      chart: ./apps/templates/web-app
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    imagePullSecrets:
      - name: harbor-pull-creds
    app:
      name: unify
      team: team-alpha
      image:
        repository: harbor.apps.sre.example.com/team-alpha/unify
        tag: pipe-f7cb4942
        pullPolicy: IfNotPresent
      port: 8443
      replicas: 1
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: "2"
          memory: 2Gi
      probes:
        liveness:
          path: /
          type: tcp
          initialDelaySeconds: 60
          periodSeconds: 15
          failureThreshold: 10
        readiness:
          path: /
          type: tcp
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 10
      env:
        - name: PUID
          value: "1000"
        - name: PGID
          value: "1000"
        - name: TZ
          value: "America/New_York"
        - name: MONGO_HOST
          value: "localhost"
        - name: MONGO_PORT
          value: "27017"
        - name: MONGO_DBNAME
          value: "unifi"
        - name: MONGO_USER
          value: "unifi"
        - name: MONGO_PASS
          value: "unifi"
        - name: MEM_LIMIT
          value: "1024"
        - name: MEM_STARTUP
          value: "1024"
    # Unifi requires root (s6-overlay) and writable filesystem
    podSecurityContext:
      runAsNonRoot: false
      runAsUser: 0
      runAsGroup: 0
      fsGroup: 0
      seccompProfile:
        type: RuntimeDefault
    containerSecurityContext:
      allowPrivilegeEscalation: true
      readOnlyRootFilesystem: false
      runAsNonRoot: false
      runAsUser: 0
      capabilities:
        add:
          - NET_BIND_SERVICE
        drop: []
    # MongoDB sidecar — unifi requires a MongoDB instance
    extraContainers:
      - name: mongodb
        image: docker.io/library/mongo:4.4
        ports:
          - containerPort: 27017
            protocol: TCP
        env:
          - name: MONGO_INITDB_ROOT_USERNAME
            value: "unifi"
          - name: MONGO_INITDB_ROOT_PASSWORD
            value: "unifi"
          - name: MONGO_INITDB_DATABASE
            value: "unifi"
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 1Gi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          runAsNonRoot: false
          runAsUser: 0
        volumeMounts:
          - name: mongo-data
            mountPath: /data/db
    extraVolumes:
      - name: mongo-data
        emptyDir: {}
    ingress:
      enabled: true
      host: unify.apps.sre.example.com
      backendProtocol: HTTPS
    autoscaling:
      enabled: false
    serviceMonitor:
      enabled: false
    networkPolicy:
      enabled: true
    podDisruptionBudget:
      enabled: false
