---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ws
  namespace: team-alpha
  labels:
    app.kubernetes.io/part-of: sre-platform
    sre.io/team: team-alpha
spec:
  interval: 10m
  chart:
    spec:
      chart: ./apps/templates/web-app
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    imagePullSecrets:
      - name: harbor-pull-creds
    app:
      name: ws
      team: team-alpha
      image:
        repository: harbor.apps.sre.example.com/team-alpha/ws
        tag: pipe-00a7bcea
        pullPolicy: IfNotPresent
      port: 3000
      replicas: 2
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: "1"
          memory: 1Gi
      probes:
        liveness:
          path: /
          initialDelaySeconds: 10
          periodSeconds: 10
        readiness:
          path: /
          initialDelaySeconds: 5
          periodSeconds: 5
      env: []
    podSecurityContext:
      runAsNonRoot: false
      runAsUser: 0
      runAsGroup: 0
      fsGroup: 0
    containerSecurityContext:
      allowPrivilegeEscalation: true
      readOnlyRootFilesystem: false
      runAsNonRoot: false
      runAsUser: 0
    ingress:
      enabled: true
      host: ws.apps.sre.example.com
    autoscaling:
      enabled: false
    serviceMonitor:
      enabled: false
    networkPolicy:
      enabled: true
    podDisruptionBudget:
      enabled: false
