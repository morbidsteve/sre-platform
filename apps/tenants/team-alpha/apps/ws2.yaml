---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ws2
  namespace: team-alpha
  labels:
    app.kubernetes.io/part-of: sre-platform
    sre.io/team: team-alpha
spec:
  interval: 10m
  chart:
    spec:
      chart: ./apps/templates/web-app
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    imagePullSecrets:
      - name: harbor-pull-creds
    app:
      name: ws2
      team: team-alpha
      image:
        repository: harbor.apps.sre.example.com/team-alpha/ws2
        tag: build-5647181a
        pullPolicy: IfNotPresent
      port: 3001
      replicas: 1
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 256Mi
      probes:
        liveness:
          path: /
          initialDelaySeconds: 10
          periodSeconds: 10
        readiness:
          path: /
          initialDelaySeconds: 5
          periodSeconds: 5
      env: []
    ingress:
      enabled: true
      host: ws2.apps.sre.example.com
    autoscaling:
      enabled: false
    serviceMonitor:
      enabled: false
    networkPolicy:
      enabled: true
    podDisruptionBudget:
      enabled: false
