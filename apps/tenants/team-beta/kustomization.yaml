---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../_base
  - apps/

patches:
  # --- Namespace ---
  - target:
      kind: Namespace
      name: TENANT_NAME
    patch: |
      - op: replace
        path: /metadata/name
        value: team-beta
      - op: replace
        path: /metadata/labels/sre.io~1team
        value: team-beta

  # --- ResourceQuota ---
  - target:
      kind: ResourceQuota
      name: tenant-quota
    patch: |
      - op: replace
        path: /metadata/name
        value: team-beta-quota
      - op: replace
        path: /metadata/namespace
        value: team-beta

  # --- LimitRange ---
  - target:
      kind: LimitRange
      name: tenant-limits
    patch: |
      - op: replace
        path: /metadata/name
        value: team-beta-limits
      - op: replace
        path: /metadata/namespace
        value: team-beta

  # --- RBAC: developers ---
  - target:
      kind: RoleBinding
      name: tenant-developers
    patch: |
      - op: replace
        path: /metadata/name
        value: team-beta-developers
      - op: replace
        path: /metadata/namespace
        value: team-beta
      - op: replace
        path: /subjects/0/name
        value: team-beta-developers

  # --- RBAC: viewers ---
  - target:
      kind: RoleBinding
      name: tenant-viewers
    patch: |
      - op: replace
        path: /metadata/name
        value: team-beta-viewers
      - op: replace
        path: /metadata/namespace
        value: team-beta
      - op: replace
        path: /subjects/0/name
        value: team-beta-viewers

  # --- NetworkPolicy: default-deny-all ---
  - target:
      kind: NetworkPolicy
      name: default-deny-all
    patch: |
      - op: replace
        path: /metadata/namespace
        value: team-beta

  # --- NetworkPolicy: allow-dns ---
  - target:
      kind: NetworkPolicy
      name: allow-dns
    patch: |
      - op: replace
        path: /metadata/namespace
        value: team-beta

  # --- NetworkPolicy: allow-monitoring ---
  - target:
      kind: NetworkPolicy
      name: allow-monitoring
    patch: |
      - op: replace
        path: /metadata/namespace
        value: team-beta

  # --- NetworkPolicy: allow-istio-gateway ---
  - target:
      kind: NetworkPolicy
      name: allow-istio-gateway
    patch: |
      - op: replace
        path: /metadata/namespace
        value: team-beta

  # --- NetworkPolicy: allow-same-namespace ---
  - target:
      kind: NetworkPolicy
      name: allow-same-namespace
    patch: |
      - op: replace
        path: /metadata/namespace
        value: team-beta

  # --- NetworkPolicy: allow-istio-control-plane ---
  - target:
      kind: NetworkPolicy
      name: allow-istio-control-plane
    patch: |
      - op: replace
        path: /metadata/namespace
        value: team-beta

  # --- NetworkPolicy: allow-https-egress ---
  - target:
      kind: NetworkPolicy
      name: allow-https-egress
    patch: |
      - op: replace
        path: /metadata/namespace
        value: team-beta
