---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gitea
  namespace: team-demo
  labels:
    app.kubernetes.io/part-of: sre-platform
    sre.io/team: team-demo
spec:
  interval: 10m
  chart:
    spec:
      chart: ./apps/templates/web-app
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    imagePullSecrets:
      - name: harbor-pull-creds
    app:
      name: gitea
      team: team-demo
      image:
        repository: harbor.harbor.svc.cluster.local/team-demo/gitea
        tag: 1.22.0
        pullPolicy: IfNotPresent
      port: 3000
      replicas: 1
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 256Mi
      probes:
        liveness:
          path: /
          initialDelaySeconds: 10
          periodSeconds: 10
        readiness:
          path: /
          initialDelaySeconds: 5
          periodSeconds: 5
      env: []
    ingress:
      enabled: true
      host: gitea.apps.sre.example.com
    autoscaling:
      enabled: false
    serviceMonitor:
      enabled: false
    networkPolicy:
      enabled: true
    podDisruptionBudget:
      enabled: false
    containerSecurityContext:
      readOnlyRootFilesystem: false
      allowPrivilegeEscalation: false
      runAsNonRoot: true
      capabilities:
        drop:
          - ALL
    startupProbe:
      enabled: true
      path: /
      initialDelaySeconds: 5
      periodSeconds: 5
      failureThreshold: 30
    persistence:
      enabled: true
      mountPath: /var/lib/gitea
      size: 10Gi
