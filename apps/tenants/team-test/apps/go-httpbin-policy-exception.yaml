---
apiVersion: kyverno.io/v2
kind: PolicyException
metadata:
  name: go-httpbin-security-exception
  namespace: team-test
  labels:
    app.kubernetes.io/name: go-httpbin
    app.kubernetes.io/part-of: sre-platform
    sre.io/team: team-test
  annotations:
    sre.io/exception-reason: "go-httpbin image runs as root (UID 0)"
    sre.io/exception-approver: "platform-team"
spec:
  exceptions:
    - policyName: require-security-context
      ruleNames:
        - require-run-as-non-root
        - require-drop-all-capabilities
    - policyName: require-run-as-nonroot
      ruleNames:
        - require-pod-run-as-nonroot
        - require-container-run-as-nonroot
  match:
    any:
      - resources:
          kinds:
            - Pod
          namespaces:
            - team-test
          names:
            - "go-httpbin-*"
