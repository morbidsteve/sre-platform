---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: petclinic
  namespace: team-test
  labels:
    app.kubernetes.io/part-of: sre-platform
    sre.io/team: team-test
spec:
  interval: 10m
  chart:
    spec:
      chart: ./apps/templates/web-app
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    app:
      name: petclinic
      team: team-test
      image:
        repository: harbor.apps.sre.example.com/team-test/petclinic
        tag: v1.0.0
        pullPolicy: IfNotPresent
      port: 8080
      replicas: 2
      resources:
        requests:
          cpu: 250m
          memory: 256Mi
        limits:
          cpu: 1000m
          memory: 1Gi
      probes:
        liveness:
          path: /
          initialDelaySeconds: 15
          periodSeconds: 10
        readiness:
          path: /
          initialDelaySeconds: 5
          periodSeconds: 5
      env: []
    autoscaling:
      enabled: false
    networkPolicy:
      enabled: true
    podDisruptionBudget:
      enabled: false
    serviceMonitor:
      enabled: false
    ingress:
      enabled: true
      host: petclinic.apps.sre.example.com
