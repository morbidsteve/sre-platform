# Production pattern: Replace database-secret.yaml with this ExternalSecret
# to pull credentials from OpenBao via External Secrets Operator.
#
# Prerequisites:
#   1. Store credentials in OpenBao:
#        vault kv put sre/data/team-demo/demo-db \
#          username=taskboard password=<secure-password>
#   2. Remove database-secret.yaml from kustomization.yaml
#   3. Add this file to kustomization.yaml instead
#
# ---
# apiVersion: external-secrets.io/v1beta1
# kind: ExternalSecret
# metadata:
#   name: demo-db-credentials
#   namespace: team-demo
#   labels:
#     app.kubernetes.io/name: demo-db
#     app.kubernetes.io/part-of: sre-platform
#     sre.io/team: team-demo
# spec:
#   refreshInterval: 1h
#   secretStoreRef:
#     name: openbao-backend
#     kind: ClusterSecretStore
#   target:
#     name: demo-db-credentials
#     creationPolicy: Owner
#   data:
#     - secretKey: POSTGRES_USER
#       remoteRef:
#         key: sre/data/team-demo/demo-db
#         property: username
#     - secretKey: POSTGRES_PASSWORD
#       remoteRef:
#         key: sre/data/team-demo/demo-db
#         property: password
#     - secretKey: POSTGRES_DB
#       remoteRef:
#         key: sre/data/team-demo/demo-db
#         property: database
