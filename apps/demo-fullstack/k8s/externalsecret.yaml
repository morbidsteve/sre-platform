---
# Demo fullstack app database credentials — synced from OpenBao.
#
# Seed OpenBao path `sre/demo-fullstack/postgres`:
#   vault kv put sre/demo-fullstack/postgres \
#     username=taskboard \
#     password=<secure-password> \
#     database=taskboard
#
# The target Secret is consumed by:
#   - demo-db StatefulSet     -> POSTGRES_USER/PASSWORD/DB env vars
#   - demo-backend HelmRelease -> DATABASE_URL (via secretRef: demo-db-url)
#
# NIST Controls: IA-5, SC-28
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: demo-db-credentials
  namespace: team-demo
  labels:
    app.kubernetes.io/name: demo-db
    app.kubernetes.io/part-of: sre-platform
    sre.io/team: team-demo
  annotations:
    sre.io/nist-controls: "IA-5, SC-28"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-backend
    kind: ClusterSecretStore
  target:
    name: demo-db-credentials
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_USER
      remoteRef:
        key: sre/demo-fullstack/postgres
        property: username
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: sre/demo-fullstack/postgres
        property: password
    - secretKey: POSTGRES_DB
      remoteRef:
        key: sre/demo-fullstack/postgres
        property: database
---
# DATABASE_URL for demo-backend — constructed as a separate Secret so the
# sre-lib `env` helper can reference it via `secretRef: demo-db-url` which
# expects a single `value` key in the target Secret.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: demo-db-url
  namespace: team-demo
  labels:
    app.kubernetes.io/name: demo-backend
    app.kubernetes.io/part-of: sre-platform
    sre.io/team: team-demo
  annotations:
    sre.io/nist-controls: "IA-5, SC-28"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-backend
    kind: ClusterSecretStore
  target:
    name: demo-db-url
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        value: "postgres://{{ .username }}:{{ .password }}@demo-db.team-demo.svc.cluster.local:5432/{{ .database }}?sslmode=disable"
  data:
    - secretKey: username
      remoteRef:
        key: sre/demo-fullstack/postgres
        property: username
    - secretKey: password
      remoteRef:
        key: sre/demo-fullstack/postgres
        property: password
    - secretKey: database
      remoteRef:
        key: sre/demo-fullstack/postgres
        property: database
