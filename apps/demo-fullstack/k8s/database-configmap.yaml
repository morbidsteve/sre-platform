---
apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-db-init
  namespace: team-demo
  labels:
    app.kubernetes.io/name: demo-db
    app.kubernetes.io/part-of: sre-platform
    sre.io/team: team-demo
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS tasks (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        title VARCHAR(255) NOT NULL,
        description TEXT DEFAULT '',
        status VARCHAR(20) NOT NULL DEFAULT 'todo' CHECK (status IN ('todo', 'in-progress', 'done')),
        created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );

    -- Seed some example tasks so the board isn't empty
    INSERT INTO tasks (title, description, status) VALUES
        ('Review SRE platform architecture', 'Read the architecture docs and understand the platform components', 'done'),
        ('Deploy demo application', 'Use the sre-web-app Helm template to deploy the task board', 'in-progress'),
        ('Configure monitoring', 'Set up ServiceMonitor and Grafana dashboard for the app', 'todo'),
        ('Add ExternalSecret for DB creds', 'Move database credentials to OpenBao via ExternalSecret', 'todo'),
        ('Write runbook', 'Document troubleshooting steps for the demo app', 'todo')
    ON CONFLICT DO NOTHING;
