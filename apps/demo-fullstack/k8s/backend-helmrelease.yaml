---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: demo-backend
  namespace: team-demo
  labels:
    app.kubernetes.io/part-of: sre-platform
    sre.io/team: team-demo
spec:
  interval: 10m
  chart:
    spec:
      chart: ./apps/templates/api-service
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    app:
      name: demo-backend
      team: team-demo
      image:
        repository: harbor.apps.sre.example.com/platform/demo-backend
        tag: "v1.0.0"
        pullPolicy: IfNotPresent
      port: 9090
      replicas: 1
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 256Mi
      probes:
        liveness:
          path: "/healthz"
          initialDelaySeconds: 5
          periodSeconds: 10
        readiness:
          path: "/readyz"
          initialDelaySeconds: 3
          periodSeconds: 5
      env:
        # DATABASE_URL is synthesized by the demo-db-url ExternalSecret from
        # OpenBao creds at sre/demo-fullstack/postgres. The sre-lib env helper
        # reads the `value` key of the target Secret named below.
        - name: DATABASE_URL
          secretRef: demo-db-url
        - name: PORT
          value: "9090"
    imagePullSecrets:
      - name: harbor-pull-creds
    authorizationPolicy:
      enabled: true
      allowedNamespaces:
        - namespace: team-demo
        - namespace: istio-system
    autoscaling:
      enabled: false
    serviceMonitor:
      enabled: true
      interval: "15s"
      path: /metrics
    networkPolicy:
      enabled: true
      allowedCallers:
        - name: demo-frontend
          namespace: team-demo
      allowedServices:
        - name: demo-db
          port: 5432
    podDisruptionBudget:
      enabled: false
