---
# NOTE: In production, replace this Secret with an ExternalSecret that pulls
# credentials from OpenBao. See externalsecret.yaml for the pattern.
apiVersion: v1
kind: Secret
metadata:
  name: demo-db-credentials
  namespace: team-demo
  labels:
    app.kubernetes.io/name: demo-db
    app.kubernetes.io/part-of: sre-platform
    sre.io/team: team-demo
  annotations:
    sre.io/secret-source: "static — replace with ExternalSecret for production"
type: Opaque
stringData:
  POSTGRES_USER: "taskboard"
  POSTGRES_PASSWORD: "changeme-use-external-secrets"
  POSTGRES_DB: "taskboard"
