---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: demo-db
  namespace: team-demo
  labels:
    app.kubernetes.io/name: demo-db
    app.kubernetes.io/part-of: sre-platform
    sre.io/team: team-demo
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: demo-db
  namespace: team-demo
  labels:
    app.kubernetes.io/name: demo-db
    app.kubernetes.io/part-of: sre-platform
    sre.io/team: team-demo
spec:
  serviceName: demo-db
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: demo-db
  template:
    metadata:
      labels:
        app.kubernetes.io/name: demo-db
        app.kubernetes.io/part-of: sre-platform
        sre.io/team: team-demo
    spec:
      serviceAccountName: demo-db
      automountServiceAccountToken: false
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      containers:
        - name: postgres
          image: "docker.io/library/postgres:16.4-alpine"
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: demo-db-credentials
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: demo-db-credentials
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: demo-db-credentials
                  key: POSTGRES_DB
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            exec:
              command:
                - pg_isready
                - "-U"
                - taskboard
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - pg_isready
                - "-U"
                - taskboard
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
      volumes:
        - name: init-sql
          configMap:
            name: demo-db-init
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app.kubernetes.io/name: demo-db
          app.kubernetes.io/part-of: sre-platform
          sre.io/team: team-demo
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: local-path
        resources:
          requests:
            storage: 1Gi
