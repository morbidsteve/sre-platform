---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: demo-frontend
  namespace: team-demo
  labels:
    app.kubernetes.io/part-of: sre-platform
    sre.io/team: team-demo
spec:
  interval: 10m
  chart:
    spec:
      chart: ./apps/templates/web-app
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    app:
      name: demo-frontend
      team: team-demo
      image:
        repository: harbor.apps.sre.example.com/platform/demo-frontend
        tag: "v1.0.2"
        pullPolicy: IfNotPresent
      port: 8080
      replicas: 1
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          cpu: 50m
          memory: 64Mi
      probes:
        liveness:
          path: "/healthz"
          initialDelaySeconds: 3
          periodSeconds: 15
        readiness:
          path: "/healthz"
          initialDelaySeconds: 2
          periodSeconds: 5
      env: []
    imagePullSecrets:
      - name: harbor-pull-creds
    ingress:
      enabled: true
      host: "taskboard.${SRE_DOMAIN}"
    autoscaling:
      enabled: false
    serviceMonitor:
      enabled: false
    networkPolicy:
      enabled: true
      allowedServices:
        - name: demo-backend
          port: 8080
    podDisruptionBudget:
      enabled: false
