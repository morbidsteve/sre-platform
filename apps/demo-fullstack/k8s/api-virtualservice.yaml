---
# Route /api/* traffic on the taskboard hostname to the backend service.
# This uses Istio gateway-level routing instead of nginx reverse proxy,
# which is the idiomatic service mesh pattern.
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: demo-backend-api
  namespace: team-demo
  labels:
    app.kubernetes.io/name: demo-backend
    app.kubernetes.io/part-of: sre-platform
    sre.io/team: team-demo
spec:
  hosts:
    - "taskboard.${SRE_DOMAIN}"
  gateways:
    - istio-system/main
  http:
    # OAuth2 proxy callback routes
    - match:
        - uri:
            prefix: /oauth2/
      route:
        - destination:
            host: oauth2-proxy.oauth2-proxy.svc.cluster.local
            port:
              number: 4180
      timeout: 30s
    # API routes → backend service
    - match:
        - uri:
            prefix: /api/
      route:
        - destination:
            host: demo-backend-demo-backend.team-demo.svc.cluster.local
            port:
              number: 9090
      timeout: 30s
