---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sre-demo
  namespace: team-alpha
  labels:
    app.kubernetes.io/part-of: sre-platform
    sre.io/team: team-alpha
spec:
  interval: 10m
  chart:
    spec:
      chart: ./apps/templates/web-app
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    app:
      name: "sre-demo"
      team: "alpha"
      image:
        repository: "sre-demo"
        tag: "v0.1.0"
        pullPolicy: IfNotPresent
      port: 8080
      replicas: 2
      resources:
        requests:
          cpu: 50m
          memory: 32Mi
        limits:
          cpu: 200m
          memory: 128Mi
      probes:
        liveness:
          path: "/healthz"
          initialDelaySeconds: 5
          periodSeconds: 10
        readiness:
          path: "/readyz"
          initialDelaySeconds: 3
          periodSeconds: 5
      env:
        - name: APP_NAME
          value: "sre-demo"
        - name: APP_VERSION
          value: "0.1.0"
    ingress:
      enabled: true
      host: "demo.apps.sre.example.com"
    autoscaling:
      enabled: false
    serviceMonitor:
      enabled: true
      interval: "15s"
      path: "/metrics"
    networkPolicy:
      enabled: true
    podDisruptionBudget:
      enabled: true
      minAvailable: 1
