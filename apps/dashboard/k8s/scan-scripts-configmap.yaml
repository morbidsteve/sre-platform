---
# Scan tool wrapper scripts — mounted into scan K8s Jobs as /scripts
# These scripts ALWAYS exit 0 so K8s doesn't mark the job as "Failed".
# The dashboard parses the JSON output to determine pass/fail.
# All tool output (JSON) goes to stdout. Errors/progress go to stderr.
apiVersion: v1
kind: ConfigMap
metadata:
  name: scan-scripts
  namespace: sre-builds
  labels:
    app.kubernetes.io/part-of: sre-platform
data:
  sast-scan.sh: |
    #!/bin/sh
    # Try specified branch first, fall back to default branch
    git clone --depth 1 --branch "$GIT_BRANCH" "$GIT_URL" /src 2>/dev/null \
      || git clone --depth 1 "$GIT_URL" /src 2>/dev/null
    if [ ! -d /src ]; then
      echo '{"results":[],"errors":[{"message":"Git clone failed — check URL and branch"}]}'
      exit 0
    fi
    cd /src
    semgrep scan --config auto --json --quiet 2>/dev/null \
      || echo '{"results":[],"errors":[]}'
    exit 0

  secrets-scan.sh: |
    #!/bin/sh
    # Try specified branch first, fall back to default branch
    git clone --depth 5 --branch "$GIT_BRANCH" "$GIT_URL" /src 2>/dev/null \
      || git clone --depth 5 "$GIT_URL" /src 2>/dev/null
    if [ ! -d /src ]; then
      echo '[]'
      exit 0
    fi
    gitleaks detect --source /src --report-format json --report-path /dev/stdout --no-banner 2>/dev/null \
      || echo '[]'
    exit 0

  sbom-scan.sh: |
    #!/bin/sh
    trivy image --format spdx-json --insecure --scanners vuln --quiet "$IMAGE_REF" 2>/dev/null \
      || echo '{"spdxVersion":"SPDX-2.3","packages":[],"error":"SBOM generation failed"}'
    exit 0

  cve-scan.sh: |
    #!/bin/sh
    trivy image --format json --severity CRITICAL,HIGH,MEDIUM,LOW --insecure --quiet "$IMAGE_REF" 2>/dev/null \
      || echo '{"Results":[]}'
    exit 0

  dast-scan.sh: |
    #!/bin/sh
    # Try multiple ZAP baseline script locations
    if command -v zap-baseline.py >/dev/null 2>&1; then
      zap-baseline.py -t "$TARGET_URL" -J /dev/stdout -I 2>/dev/null
    elif [ -f /zap/zap-baseline.py ]; then
      python3 /zap/zap-baseline.py -t "$TARGET_URL" -J /dev/stdout -I 2>/dev/null
    else
      echo '{"error":"zap-baseline.py not found","site":[]}'
    fi
    exit 0
