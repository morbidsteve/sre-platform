---
# Scan tool wrapper scripts — mounted into scan K8s Jobs as /scripts
# Replaces brittle inline shell commands with tested, reusable scripts
# Exit codes: 0 = clean/passed, 1 = findings found, 2 = tool error
# ALL output on stdout must be valid JSON. Errors/progress go to stderr.
apiVersion: v1
kind: ConfigMap
metadata:
  name: scan-scripts
  namespace: sre-builds
  labels:
    app.kubernetes.io/part-of: sre-platform
data:
  sast-scan.sh: |
    #!/bin/sh
    # Clone repo — try specified branch, fall back to default branch
    if ! git clone --depth 1 --branch "$GIT_BRANCH" "$GIT_URL" /src 2>/tmp/git-err.log; then
      # Branch might not exist — try without --branch
      if ! git clone --depth 1 "$GIT_URL" /src 2>/tmp/git-err2.log; then
        ERR=$(cat /tmp/git-err.log /tmp/git-err2.log 2>/dev/null | head -5)
        echo "{\"results\":[],\"errors\":[{\"message\":\"Git clone failed: ${ERR}\"}]}"
        exit 2
      fi
      echo "Warning: branch $GIT_BRANCH not found, using default branch" >&2
    fi
    cd /src
    # Run Semgrep
    semgrep scan --config auto --json --quiet 2>/tmp/semgrep-err.log || true
    rc=$?
    if [ $rc -eq 0 ] || [ $rc -eq 1 ]; then
      # 0 = clean, 1 = findings found — semgrep already output JSON
      exit 0
    fi
    # Tool error — output fallback JSON on stdout
    ERR=$(cat /tmp/semgrep-err.log 2>/dev/null | head -3)
    echo "{\"results\":[],\"errors\":[{\"message\":\"Semgrep error (exit $rc): ${ERR}\"}]}"
    exit 2

  secrets-scan.sh: |
    #!/bin/sh
    # Clone repo — try specified branch, fall back to default branch
    if ! git clone --depth 5 --branch "$GIT_BRANCH" "$GIT_URL" /src 2>/tmp/git-err.log; then
      if ! git clone --depth 5 "$GIT_URL" /src 2>/tmp/git-err2.log; then
        echo "[]"
        echo "Git clone failed" >&2
        exit 2
      fi
      echo "Warning: branch $GIT_BRANCH not found, using default branch" >&2
    fi
    # Run Gitleaks — exit 1 means findings found (not an error)
    gitleaks detect --source /src --report-format json --report-path /dev/stdout --no-banner 2>/tmp/gitleaks-err.log
    rc=$?
    if [ $rc -eq 0 ]; then
      exit 0
    elif [ $rc -eq 1 ]; then
      exit 0
    else
      echo "[]"
      cat /tmp/gitleaks-err.log >&2
      exit 2
    fi

  sbom-scan.sh: |
    #!/bin/sh
    if [ -z "$IMAGE_REF" ]; then
      echo '{"error":"IMAGE_REF not set"}'
      exit 2
    fi
    # Run Trivy SBOM generation — only SPDX JSON on stdout
    trivy image \
      --format spdx-json \
      --insecure \
      --scanners vuln \
      --quiet \
      "$IMAGE_REF" 2>/tmp/trivy-err.log
    rc=$?
    if [ $rc -ne 0 ]; then
      ERR=$(cat /tmp/trivy-err.log 2>/dev/null | tail -3)
      echo "{\"error\":\"Trivy SBOM failed (exit $rc): ${ERR}\"}"
      exit 2
    fi
    exit 0

  cve-scan.sh: |
    #!/bin/sh
    if [ -z "$IMAGE_REF" ]; then
      echo '{"Results":[]}'
      exit 2
    fi
    # Run Trivy CVE scan — only JSON on stdout
    trivy image \
      --format json \
      --severity CRITICAL,HIGH,MEDIUM,LOW \
      --insecure \
      --quiet \
      "$IMAGE_REF" 2>/tmp/trivy-err.log
    rc=$?
    if [ $rc -ne 0 ]; then
      ERR=$(cat /tmp/trivy-err.log 2>/dev/null | tail -3)
      echo "{\"Results\":[],\"error\":\"Trivy CVE failed (exit $rc): ${ERR}\"}"
      exit 2
    fi
    exit 0

  dast-scan.sh: |
    #!/bin/sh
    if [ -z "$TARGET_URL" ]; then
      echo '{"site":[]}'
      exit 2
    fi
    # Run ZAP baseline — only JSON on stdout
    zap-baseline.py -t "$TARGET_URL" -J /dev/stdout -I 2>/tmp/zap-err.log
    rc=$?
    if [ $rc -eq 0 ] || [ $rc -eq 1 ] || [ $rc -eq 2 ]; then
      # ZAP 0=clean, 1=warnings, 2=alerts — all produce JSON on stdout
      exit 0
    fi
    echo '{"site":[]}'
    cat /tmp/zap-err.log >&2
    exit 2
