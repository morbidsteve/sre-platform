apiVersion: apps/v1
kind: Deployment
metadata:
  name: sre-dashboard
  namespace: sre-dashboard
  labels:
    app.kubernetes.io/name: sre-dashboard
    app.kubernetes.io/part-of: sre-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sre-dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sre-dashboard
        app.kubernetes.io/part-of: sre-platform
        sre.io/team: platform
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      serviceAccountName: sre-dashboard
      automountServiceAccountToken: true
      imagePullSecrets:
        - name: harbor-pull-secret
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: dashboard
          image: ${SRE_REGISTRY}/platform/sre-dashboard:v4.3.2
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
          env:
            - name: KC_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-admin-creds
                  key: password
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: pipeline-db-app
                  key: uri
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-token
                  key: token
                  optional: true
            - name: SRE_GITHUB_OWNER
              value: "morbidsteve"
            - name: SRE_GITHUB_REPO
              value: "sre-platform"
          ports:
            - containerPort: 3001
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: sre-dashboard
  namespace: sre-dashboard
  labels:
    app.kubernetes.io/name: sre-dashboard
    app.kubernetes.io/part-of: sre-platform
spec:
  selector:
    app.kubernetes.io/name: sre-dashboard
  ports:
    - port: 3001
      targetPort: 3001
      name: http
