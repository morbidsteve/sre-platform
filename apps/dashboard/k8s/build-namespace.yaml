---
apiVersion: v1
kind: Namespace
metadata:
  name: sre-builds
  labels:
    app.kubernetes.io/part-of: sre-platform
    sre.io/system-namespace: "true"
    sre.io/network-policy-configured: "true"
    sre.io/security-categorization: "moderate"
    pod-security.kubernetes.io/enforce: baseline
    istio-injection: enabled
    kubernetes.io/metadata.name: sre-builds
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: build-quota
  namespace: sre-builds
  labels:
    app.kubernetes.io/part-of: sre-platform
spec:
  hard:
    pods: "5"
    requests.cpu: "4"
    requests.memory: "8Gi"
    limits.cpu: "4"
    limits.memory: "8Gi"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: build-limits
  namespace: sre-builds
  labels:
    app.kubernetes.io/part-of: sre-platform
spec:
  limits:
    - type: Container
      default:
        cpu: "500m"
        memory: "512Mi"
      defaultRequest:
        cpu: "250m"
        memory: "256Mi"
      max:
        cpu: "2"
        memory: "2Gi"
    - type: Pod
      max:
        cpu: "2"
        memory: "2Gi"
