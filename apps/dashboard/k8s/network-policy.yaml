---
# Default deny all traffic in sre-dashboard namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: sre-dashboard
  labels:
    app.kubernetes.io/part-of: sre-platform
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dashboard-egress
  namespace: sre-dashboard
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # Kubernetes API server
    - ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
    # Keycloak internal service (for admin API logout)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: keycloak
      ports:
        - port: 80
          protocol: TCP
        - port: 8080
          protocol: TCP
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dashboard-ingress
  namespace: sre-dashboard
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    # From Istio gateway
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
      ports:
        - port: 3001
          protocol: TCP
    # Direct NodePort access
    - ports:
        - port: 3001
          protocol: TCP
