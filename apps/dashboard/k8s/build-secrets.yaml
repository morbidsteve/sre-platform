---
# Harbor push credentials for Kaniko build pods
# The dockerconfigjson value must be replaced with actual credentials
# generated from Harbor robot account (robot$ci-push)
apiVersion: v1
kind: Secret
metadata:
  name: harbor-push-creds
  namespace: sre-builds
  labels:
    app.kubernetes.io/part-of: sre-platform
    sre.io/purpose: build-pipeline
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: |
    {
      "auths": {
        "harbor.apps.sre.example.com": {
          "username": "robot$ci-push",
          "password": "REPLACE_ME",
          "auth": "REPLACE_ME"
        }
      }
    }
