apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: sre-dashboard
  namespace: sre-dashboard
  labels:
    app.kubernetes.io/name: sre-dashboard
    app.kubernetes.io/part-of: sre-platform
spec:
  hosts:
    - "dashboard.${SRE_DOMAIN}"
  gateways:
    - istio-system/main
  http:
    # OAuth2 proxy — routes /oauth2/* to oauth2-proxy for SSO flow
    - match:
        - uri:
            prefix: /oauth2/
      route:
        - destination:
            host: oauth2-proxy.oauth2-proxy.svc.cluster.local
            port:
              number: 4180
      timeout: 30s
    - route:
        - destination:
            host: sre-dashboard.sre-dashboard.svc.cluster.local
            port:
              number: 3001
