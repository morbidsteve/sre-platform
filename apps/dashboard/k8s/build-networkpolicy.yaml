---
# Default deny all traffic in sre-builds namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: sre-builds
  labels:
    app.kubernetes.io/part-of: sre-platform
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# Allow build pods full egress (DNS, git clone, Harbor push, base image pull)
# Builds require access to external git repos, Harbor internal registry, and
# public registries for pulling base images during Docker builds.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-build-traffic
  namespace: sre-builds
  labels:
    app.kubernetes.io/part-of: sre-platform
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: sre-dashboard
  egress:
    # Allow all egress - builds need DNS, git clone (HTTPS/SSH), Harbor push,
    # and pulling base images from public registries during Kaniko builds
    - {}
