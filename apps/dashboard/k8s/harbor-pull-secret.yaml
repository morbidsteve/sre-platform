---
# Harbor pull secret for the sre-dashboard namespace
# Allows pods to pull images from harbor.apps.sre.example.com/platform
# Uses the ci-push robot account (which has pull access)
apiVersion: v1
kind: Secret
metadata:
  name: harbor-pull-secret
  namespace: sre-dashboard
  labels:
    app.kubernetes.io/part-of: sre-platform
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: |
    {
      "auths": {
        "harbor.apps.sre.example.com": {
          "username": "robot$ci-push",
          "password": "REPLACE_ME",
          "auth": "REPLACE_ME"
        }
      }
    }
