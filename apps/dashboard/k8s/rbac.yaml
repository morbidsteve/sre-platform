---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sre-dashboard
  namespace: sre-dashboard
  labels:
    app.kubernetes.io/name: sre-dashboard
    app.kubernetes.io/part-of: sre-platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sre-dashboard
  labels:
    app.kubernetes.io/name: sre-dashboard
    app.kubernetes.io/part-of: sre-platform
rules:
  # Read nodes + patch (cordon/uncordon)
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["list", "get", "patch"]
  # Read pods + get individual pod
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list", "get"]
  # Pod logs
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  # Metrics API (node and pod metrics)
  - apiGroups: ["metrics.k8s.io"]
    resources: ["nodes", "pods"]
    verbs: ["list", "get"]
  # Namespaces — list + create + read (auto-create tenant namespaces)
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["list", "get", "create"]
  # Read services (for gateway NodePort detection + status page)
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list"]
  # Read endpoints (for status page health checks)
  - apiGroups: [""]
    resources: ["endpoints"]
    verbs: ["get", "list"]
  # List secrets in tenant namespaces (for helm cleanup)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["list", "delete"]
  # Read events (for audit log)
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["list"]
  # ConfigMaps — get, create, patch (for favorites storage)
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "create", "patch"]
  # HelmReleases — full CRUD for deploy features
  - apiGroups: ["helm.toolkit.fluxcd.io"]
    resources: ["helmreleases"]
    verbs: ["get", "list", "create", "patch", "delete"]
  # Flux GitRepository — for git deploy
  - apiGroups: ["source.toolkit.fluxcd.io"]
    resources: ["gitrepositories"]
    verbs: ["get", "create", "patch"]
  # Flux Kustomization — for git deploy + reconciliation trigger
  - apiGroups: ["kustomize.toolkit.fluxcd.io"]
    resources: ["kustomizations"]
    verbs: ["get", "list", "create", "patch"]
  # NetworkPolicies — create (for new tenant namespaces)
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["create"]
  # Istio VirtualServices — list
  - apiGroups: ["networking.istio.io"]
    resources: ["virtualservices"]
    verbs: ["list"]
  # Deployments — list, get, delete, patch (for app cleanup + scale/restart)
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["list", "get", "delete", "patch"]
  # Jobs — create/get/list/delete/watch in sre-builds (Kaniko build pipeline)
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "create", "delete", "watch"]
  # HelmRepositories — create/get/patch for Helm chart imports
  - apiGroups: ["source.toolkit.fluxcd.io"]
    resources: ["helmrepositories"]
    verbs: ["get", "list", "create", "patch"]
  # CloudNativePG Clusters — database provisioning
  - apiGroups: ["postgresql.cnpg.io"]
    resources: ["clusters"]
    verbs: ["get", "list", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sre-dashboard
  labels:
    app.kubernetes.io/name: sre-dashboard
    app.kubernetes.io/part-of: sre-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: sre-dashboard
subjects:
  - kind: ServiceAccount
    name: sre-dashboard
    namespace: sre-dashboard
---
# Namespaced Role for Grafana secrets in monitoring namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sre-dashboard-secrets
  namespace: monitoring
  labels:
    app.kubernetes.io/name: sre-dashboard
    app.kubernetes.io/part-of: sre-platform
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["grafana-admin-credentials", "kube-prometheus-stack-grafana"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sre-dashboard-secrets
  namespace: monitoring
  labels:
    app.kubernetes.io/name: sre-dashboard
    app.kubernetes.io/part-of: sre-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: sre-dashboard-secrets
subjects:
  - kind: ServiceAccount
    name: sre-dashboard
    namespace: sre-dashboard
---
