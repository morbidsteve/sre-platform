  namespace: keycloak
  labels:
    app.kubernetes.io/name: sre-dashboard
    app.kubernetes.io/part-of: sre-platform
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["keycloak"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sre-dashboard-secrets
  namespace: keycloak
  labels:
    app.kubernetes.io/name: sre-dashboard
    app.kubernetes.io/part-of: sre-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: sre-dashboard-secrets
subjects:
  - kind: ServiceAccount
    name: sre-dashboard
    namespace: sre-dashboard
---
# Namespaced Role for sre-builds namespace (Kaniko build pipeline)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sre-dashboard-builds
  namespace: sre-builds
  labels:
    app.kubernetes.io/name: sre-dashboard
    app.kubernetes.io/part-of: sre-platform
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "create", "delete", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sre-dashboard-builds
  namespace: sre-builds
  labels:
    app.kubernetes.io/name: sre-dashboard
    app.kubernetes.io/part-of: sre-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: sre-dashboard-builds
subjects:
  - kind: ServiceAccount
    name: sre-dashboard
    namespace: sre-dashboard
