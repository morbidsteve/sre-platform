---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sre-dashboard
  namespace: sre-dashboard
  labels:
    app.kubernetes.io/name: sre-dashboard
    app.kubernetes.io/part-of: sre-platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sre-dashboard
  labels:
    app.kubernetes.io/name: sre-dashboard
    app.kubernetes.io/part-of: sre-platform
rules:
  # Read nodes
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["list"]
  # Read pods (for problem pod detection)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list"]
  # Namespaces — list + create + read (auto-create tenant namespaces)
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["list", "get", "create"]
  # Read services (for gateway NodePort detection + status page)
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list"]
  # Read endpoints (for status page health checks)
  - apiGroups: [""]
    resources: ["endpoints"]
    verbs: ["get", "list"]
  # List secrets in tenant namespaces (for helm cleanup)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["list", "delete"]
  # Read events (for audit log)
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["list"]
  # ConfigMaps — get, create, patch (for favorites storage)
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "create", "patch"]
  # HelmReleases — list, create, patch, delete
  - apiGroups: ["helm.toolkit.fluxcd.io"]
    resources: ["helmreleases"]
    verbs: ["list", "create", "patch", "delete"]
  # NetworkPolicies — create (for new tenant namespaces)
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["create"]
  # Istio VirtualServices — list
  - apiGroups: ["networking.istio.io"]
    resources: ["virtualservices"]
    verbs: ["list"]
  # Deployments — list, delete (for app cleanup)
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sre-dashboard
  labels:
    app.kubernetes.io/name: sre-dashboard
    app.kubernetes.io/part-of: sre-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: sre-dashboard
subjects:
  - kind: ServiceAccount
    name: sre-dashboard
    namespace: sre-dashboard
---
# Namespaced Role for Grafana secrets in monitoring namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sre-dashboard-secrets
  namespace: monitoring
  labels:
    app.kubernetes.io/name: sre-dashboard
    app.kubernetes.io/part-of: sre-platform
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["grafana-admin-credentials", "kube-prometheus-stack-grafana"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sre-dashboard-secrets
  namespace: monitoring
  labels:
    app.kubernetes.io/name: sre-dashboard
    app.kubernetes.io/part-of: sre-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: sre-dashboard-secrets
subjects:
  - kind: ServiceAccount
    name: sre-dashboard
    namespace: sre-dashboard
