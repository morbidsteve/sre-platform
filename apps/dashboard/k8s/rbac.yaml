---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sre-dashboard
  namespace: sre-dashboard
  labels:
    app.kubernetes.io/name: sre-dashboard
    app.kubernetes.io/part-of: sre-platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sre-dashboard
  labels:
    app.kubernetes.io/name: sre-dashboard
    app.kubernetes.io/part-of: sre-platform
rules:
  # Read nodes
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["list"]
  # Read pods (for problem pod detection)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list"]
  # Read namespaces (for tenant listing)
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["list"]
  # Read services (for gateway NodePort detection)
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get"]
  # Read secrets (for credentials display)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
  # HelmReleases — list, create, patch, delete
  - apiGroups: ["helm.toolkit.fluxcd.io"]
    resources: ["helmreleases"]
    verbs: ["list", "create", "patch", "delete"]
  # Istio VirtualServices — list
  - apiGroups: ["networking.istio.io"]
    resources: ["virtualservices"]
    verbs: ["list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sre-dashboard
  labels:
    app.kubernetes.io/name: sre-dashboard
    app.kubernetes.io/part-of: sre-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: sre-dashboard
subjects:
  - kind: ServiceAccount
    name: sre-dashboard
    namespace: sre-dashboard
