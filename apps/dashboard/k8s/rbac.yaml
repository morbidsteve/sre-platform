metadata:
  name: sre-dashboard-secrets
  namespace: harbor
  labels:
    app.kubernetes.io/name: sre-dashboard
    app.kubernetes.io/part-of: sre-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: sre-dashboard-secrets
