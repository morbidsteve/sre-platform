# ExternalSecrets for the SRE Dashboard — pull admin credentials from OpenBao
# via the External Secrets Operator, so we never hardcode them in Git or
# in the server.js source.
#
# Prerequisites (one-time, run by a platform admin):
#   vault kv put sre/platform/sre-admin password=<current-sre-admin-pw>
#   vault kv put sre/platform/harbor-admin username=admin password=<current-harbor-pw>
#
# The resulting Kubernetes Secrets are consumed by apps/dashboard/k8s/deployment.yaml
# as env vars SRE_ADMIN_PASSWORD and HARBOR_ADMIN_USER / HARBOR_ADMIN_PASS.
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: sre-admin-creds
  namespace: sre-dashboard
  labels:
    app.kubernetes.io/name: sre-dashboard
    app.kubernetes.io/part-of: sre-platform
    sre.io/team: platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-backend
    kind: ClusterSecretStore
  target:
    name: sre-admin-creds
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: sre/platform/sre-admin
        property: password
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: harbor-admin-creds
  namespace: sre-dashboard
  labels:
    app.kubernetes.io/name: sre-dashboard
    app.kubernetes.io/part-of: sre-platform
    sre.io/team: platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-backend
    kind: ClusterSecretStore
  target:
    name: harbor-admin-creds
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: sre/platform/harbor-admin
        property: username
    - secretKey: password
      remoteRef:
        key: sre/platform/harbor-admin
        property: password
