---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sre-api-service.fullname" . }}
  labels:
    {{- include "sre-api-service.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.app.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "sre-api-service.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "sre-api-service.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "sre-api-service.serviceAccountName" . }}
      automountServiceAccountToken: false
      securityContext:
        {{- include "sre-lib.podSecurityContext" . | nindent 8 }}
      containers:
        - name: {{ .Values.app.name }}
          image: "{{ .Values.app.image.repository }}:{{ .Values.app.image.tag }}"
          imagePullPolicy: {{ .Values.app.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.app.port }}
              protocol: TCP
          securityContext:
            {{- include "sre-lib.containerSecurityContext" . | nindent 12 }}
          resources:
            {{- include "sre-lib.resources" . | nindent 12 }}
          livenessProbe:
            {{- if eq (.Values.app.probes.liveness.type | default "http") "tcp" }}
            tcpSocket:
              port: http
            {{- else }}
            httpGet:
              path: {{ .Values.app.probes.liveness.path }}
              port: http
            {{- end }}
            initialDelaySeconds: {{ .Values.app.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.app.probes.liveness.periodSeconds }}
            failureThreshold: {{ .Values.app.probes.liveness.failureThreshold | default 3 }}
          readinessProbe:
            {{- if eq (.Values.app.probes.readiness.type | default "http") "tcp" }}
            tcpSocket:
              port: http
            {{- else }}
            httpGet:
              path: {{ .Values.app.probes.readiness.path }}
              port: http
            {{- end }}
            initialDelaySeconds: {{ .Values.app.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.app.probes.readiness.periodSeconds }}
            failureThreshold: {{ .Values.app.probes.readiness.failureThreshold | default 3 }}
          env:
            {{- include "sre-lib.env" . | nindent 12 }}
