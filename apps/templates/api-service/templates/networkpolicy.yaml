{{- if .Values.networkPolicy.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "sre-api-service.fullname" . }}
  labels:
    {{- include "sre-api-service.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "sre-api-service.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- include "sre-lib.networkpolicy-ingress-same-namespace" .Values.app.port | nindent 4 }}
    {{- include "sre-lib.networkpolicy-ingress-monitoring" .Values.app.port | nindent 4 }}
    {{- if .Values.authorizationPolicy.enabled }}
    # Allow traffic from namespaces listed in authorizationPolicy.allowedNamespaces
    {{- range .Values.authorizationPolicy.allowedNamespaces }}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .namespace }}
      ports:
        - port: {{ $.Values.app.port }}
          protocol: TCP
    {{- end }}
    # Allow traffic from namespaces listed in authorizationPolicy.allowedCallers
    {{- range .Values.authorizationPolicy.allowedCallers }}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .namespace }}
      ports:
        - port: {{ $.Values.app.port }}
          protocol: TCP
    {{- end }}
    {{- end }}
    {{- if .Values.networkPolicy.allowedCallers }}
    {{- include "sre-lib.networkpolicy-ingress-allowed-callers" . | nindent 4 }}
    {{- end }}
    {{- with .Values.networkPolicy.additionalIngress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  egress:
    {{- include "sre-lib.networkpolicy-egress" . | nindent 4 }}
{{- end }}
