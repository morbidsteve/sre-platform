---
# -- Developer-facing values (what app teams configure) --
app:
  # Application name, used for resource naming
  name: ""
  # Owning team name, used for labels and RBAC
  team: ""
  image:
    # Container image repository (must be from harbor.sre.internal)
    repository: ""
    # Image tag (must be pinned, never use "latest")
    tag: ""
    pullPolicy: IfNotPresent
  # Container port the application listens on
  port: 8080
  # Number of replicas (used when autoscaling is disabled)
  replicas: 2
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  # Environment variables
  # - name: DATABASE_URL
  #   value: "postgres://..."
  # - name: API_KEY
  #   secretRef: my-api-key  # Synced from OpenBao via ESO
  env: []
  probes:
    liveness:
      path: /healthz
      initialDelaySeconds: 10
      periodSeconds: 10
    readiness:
      path: /readyz
      initialDelaySeconds: 5
      periodSeconds: 5
  # Graceful shutdown
  terminationGracePeriodSeconds: 30
  # preStopCommand: ["/bin/sh", "-c", "sleep 5"]
  preStopCommand: []

# -- Istio AuthorizationPolicy --
authorizationPolicy:
  # Enable Istio AuthorizationPolicy for caller restrictions
  enabled: true
  # List of namespaces allowed to call this API
  # If empty and enabled, all traffic is denied (explicit allow required)
  allowedNamespaces: []
  # Example:
  # - namespace: team-alpha
  # - namespace: team-beta
  #
  # Advanced: allow specific service accounts from specific namespaces
  # allowedCallers:
  # - namespace: team-alpha
  #   serviceAccounts:
  #     - frontend-sa
  #     - gateway-sa
  allowedCallers: []

# -- Autoscaling --
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilization: 80

# -- Platform integration (usually not changed by app teams) --
serviceAccount:
  # Create a dedicated ServiceAccount
  create: true

serviceMonitor:
  enabled: true
  interval: "30s"
  path: /metrics

networkPolicy:
  enabled: true
  # Services this app needs to call (generates egress rules)
  allowedServices: []
  # - name: user-service            # same namespace
  #   port: 8080
  # - name: auth-service            # different namespace
  #   namespace: team-platform
  #   port: 8080
  # Services allowed to call this app (generates ingress rules)
  allowedCallers: []
  # - name: api-gateway
  #   namespace: team-platform
  # Raw additional rules (escape hatch for complex cases)
  additionalIngress: []
  additionalEgress: []

podDisruptionBudget:
  enabled: true
  minAvailable: 1

# -- Database provisioning (CNPG PostgreSQL) --
database:
  enabled: false
  type: postgresql
  instances: 1
  size: 5Gi
  database: ""
  owner: ""

# -- Redis provisioning --
redis:
  enabled: false
  size: 1Gi

# -- Database migration init container --
migrations:
  enabled: false
  image: ""
  command: []

# -- External service entries (Istio ServiceEntry) --
externalServices: []
# - host: api.stripe.com
#   port: 443

# -- Object storage (S3-compatible via MinIO/S3) --
storage:
  enabled: false
  # Bucket name (defaults to <team>-<app-name>)
  bucket: ""
  # Storage endpoint (defaults to internal MinIO)
  endpoint: ""
  # AWS region (for S3 compatibility)
  region: ""
