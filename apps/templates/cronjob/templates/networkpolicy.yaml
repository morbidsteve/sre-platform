{{- if .Values.networkPolicy.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "sre-cronjob.fullname" . }}
  labels:
    {{- include "sre-cronjob.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "sre-cronjob.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- if .Values.serviceMonitor.enabled }}
    {{- include "sre-lib.networkpolicy-ingress-monitoring" .Values.serviceMonitor.port | nindent 4 }}
    {{- end }}
  egress:
    {{- include "sre-lib.networkpolicy-egress" . | nindent 4 }}
{{- end }}
