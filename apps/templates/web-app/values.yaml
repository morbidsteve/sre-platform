---
# -- Developer-facing values (what app teams configure) --
app:
  # Application name, used for resource naming
  name: ""
  # Owning team name, used for labels and RBAC
  team: ""
  image:
    # Container image repository (must be from harbor.sre.internal)
    repository: ""
    # Image tag (must be pinned, never use "latest")
    tag: ""
    pullPolicy: IfNotPresent
  # Container port the application listens on
  port: 8080
  # Number of replicas (used when autoscaling is disabled)
  replicas: 2
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  # Environment variables
  # - name: DATABASE_URL
  #   value: "postgres://..."
  # - name: API_KEY
  #   secretRef: my-api-key  # Synced from OpenBao via ESO
  env: []
  probes:
    liveness:
      path: /healthz
      initialDelaySeconds: 10
      periodSeconds: 10
    readiness:
      path: /readyz
      initialDelaySeconds: 5
      periodSeconds: 5
  # Graceful shutdown
  terminationGracePeriodSeconds: 30
  # preStopCommand: ["/bin/sh", "-c", "sleep 5"]
  preStopCommand: []

# -- Ingress (Istio VirtualService) --
ingress:
  enabled: false
  # Hostname for the application
  host: ""
  # Istio gateway reference
  gateway: "istio-system/main"

# -- Autoscaling --
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilization: 80

# -- Platform integration (usually not changed by app teams) --
serviceAccount:
  # Create a dedicated ServiceAccount
  create: true

serviceMonitor:
  enabled: true
  interval: "30s"
  path: /metrics

networkPolicy:
  enabled: true
  # Additional ingress rules beyond the defaults
  additionalIngress: []
  # Additional egress rules beyond the defaults
  additionalEgress: []

podDisruptionBudget:
  enabled: true
  minAvailable: 1

# -- Canary deployments (requires Flagger) --
canary:
  enabled: false
  progressDeadlineSeconds: 600
  analysis:
    # How often Flagger runs the analysis
    interval: "1m"
    # Max number of failed checks before rollback
    threshold: 5
    # Max traffic weight routed to canary
    maxWeight: 50
    # Traffic weight step increment
    stepWeight: 10
    # Minimum request success rate (percentage)
    successRate: 99
    # Maximum request duration (milliseconds)
    latencyMax: 500

# -- Database provisioning (CNPG PostgreSQL) --
database:
  enabled: false
  type: postgresql
  instances: 1
  size: 5Gi
  database: ""
  owner: ""

# -- Redis provisioning --
redis:
  enabled: false
  size: 1Gi

# -- Database migration init container --
migrations:
  enabled: false
  image: ""
  command: []

# -- External service entries (Istio ServiceEntry) --
externalServices: []
# - host: api.stripe.com
#   port: 443

# -- WebSocket support --
websocket:
  enabled: false
  routes: []
  # - uri: /ws
  # - uri: /socket.io

# -- Object storage (S3-compatible via MinIO/S3) --
storage:
  enabled: false
  # Bucket name (defaults to <team>-<app-name>)
  bucket: ""
  # Storage endpoint (defaults to internal MinIO)
  endpoint: ""
  # AWS region (for S3 compatibility)
  region: ""

# -- SSO / OIDC integration --
sso:
  enabled: false

# -- API rate limiting (Istio EnvoyFilter) --
rateLimit:
  enabled: false
  requestsPerSecond: 100
  burst: 200
