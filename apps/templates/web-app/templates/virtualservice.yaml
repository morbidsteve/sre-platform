{{- if .Values.ingress.enabled }}
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: {{ include "sre-web-app.fullname" . }}
  labels:
    {{- include "sre-web-app.labels" . | nindent 4 }}
spec:
  hosts:
    - {{ .Values.ingress.host | quote }}
  gateways:
    - {{ .Values.ingress.gateway }}
  http:
    {{- if and (hasKey .Values "websocket") .Values.websocket.enabled }}
    {{- range .Values.websocket.routes }}
    - match:
        - uri:
            prefix: {{ .uri }}
          headers:
            upgrade:
              exact: websocket
      route:
        - destination:
            host: {{ include "sre-web-app.fullname" $ }}
            port:
              number: {{ $.Values.app.port }}
      timeout: 0s
    {{- end }}
    {{- end }}
    # OAuth2 proxy callback — routes /oauth2/* to oauth2-proxy for SSO flow
    - match:
        - uri:
            prefix: /oauth2/
      route:
        - destination:
            host: oauth2-proxy.oauth2-proxy.svc.cluster.local
            port:
              number: 4180
      timeout: 30s
    - match:
        - uri:
            prefix: /
      route:
        - destination:
            host: {{ include "sre-web-app.fullname" . }}
            port:
              number: {{ .Values.app.port }}
{{- end }}
