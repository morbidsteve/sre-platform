{{- if .Values.networkPolicy.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "sre-web-app.fullname" . }}
  labels:
    {{- include "sre-web-app.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "sre-web-app.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- include "sre-lib.networkpolicy-ingress-istio-gateway" .Values.app.port | nindent 4 }}
    {{- include "sre-lib.networkpolicy-ingress-monitoring" .Values.app.port | nindent 4 }}
    {{- include "sre-lib.networkpolicy-ingress-same-namespace" .Values.app.port | nindent 4 }}
    {{- if .Values.networkPolicy.allowedCallers }}
    {{- include "sre-lib.networkpolicy-ingress-allowed-callers" . | nindent 4 }}
    {{- end }}
    {{- with .Values.networkPolicy.additionalIngress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  egress:
    {{- include "sre-lib.networkpolicy-egress" . | nindent 4 }}
{{- end }}
