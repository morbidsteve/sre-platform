---
# -- Developer-facing values (what app teams configure) --
app:
  # Application name, used for resource naming
  name: ""
  # Owning team name, used for labels and RBAC
  team: ""
  image:
    # Container image repository (must be from harbor.sre.internal)
    repository: ""
    # Image tag (must be pinned, never use "latest")
    tag: ""
    pullPolicy: IfNotPresent
  # Number of replicas (used when autoscaling is disabled)
  replicas: 2
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  # Command to run (optional, overrides image CMD)
  command: []
  # Arguments to command (optional)
  args: []
  # Environment variables
  # - name: QUEUE_URL
  #   value: "amqp://..."
  # - name: API_KEY
  #   secretRef: my-api-key  # Synced from OpenBao via ESO
  env: []
  probes:
    liveness:
      # Use exec probe for workers without HTTP endpoints
      exec:
        command:
          - /bin/sh
          - -c
          - "pgrep -f worker || exit 1"
      initialDelaySeconds: 10
      periodSeconds: 30
    readiness:
      exec:
        command:
          - /bin/sh
          - -c
          - "pgrep -f worker || exit 1"
      initialDelaySeconds: 5
      periodSeconds: 10

# -- Autoscaling --
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilization: 80

# -- Platform integration (usually not changed by app teams) --
serviceAccount:
  create: true

serviceMonitor:
  enabled: true
  interval: "30s"
  # Workers expose metrics on a separate port
  port: 9090
  path: /metrics

networkPolicy:
  enabled: true
  # Services this app needs to call (generates egress rules)
  allowedServices: []
  # - name: user-service            # same namespace
  #   port: 8080
  # - name: auth-service            # different namespace
  #   namespace: team-platform
  #   port: 8080
  # Services allowed to call this app (generates ingress rules)
  allowedCallers: []
  # - name: api-gateway
  #   namespace: team-platform
  # Raw additional rules (escape hatch for complex cases)
  additionalEgress: []

podDisruptionBudget:
  enabled: true
  minAvailable: 1

# -- Singleton mode (exactly 1 replica, HPA disabled) --
singleton: false

# -- Object storage (S3-compatible via MinIO/S3) --
storage:
  enabled: false
  # Bucket name (defaults to <team>-<app-name>)
  bucket: ""
  # Storage endpoint (defaults to internal MinIO)
  endpoint: ""
  # AWS region (for S3 compatibility)
  region: ""

# -- Persistent storage (for stateful apps) --
persistence:
  enabled: false
  mountPath: "/data"
  size: "1Gi"
  storageClass: ""
  accessModes:
    - ReadWriteOnce

# -- Extra volume mounts (for stateful apps needing writable paths) --
extraVolumeMounts: []
# - name: data
#   mountPath: /app/data

# -- Extra environment sources (K8s Secrets/ConfigMaps mounted as env vars) --
envFrom: []
# - secretRef:
#     name: my-app-credentials

# -- Extra volumes (non-emptyDir, e.g. ConfigMap mounts) --
extraVolumes: []
# - name: app-config
#   configMap:
#     name: my-app-config
