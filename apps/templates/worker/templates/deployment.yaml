---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sre-worker.fullname" . }}
  labels:
    {{- include "sre-worker.labels" . | nindent 4 }}
spec:
  {{- if .Values.singleton }}
  replicas: 1
  {{- else if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.app.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "sre-worker.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "sre-worker.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "sre-worker.serviceAccountName" . }}
      automountServiceAccountToken: false
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- include "sre-lib.podSecurityContext" . | nindent 8 }}
      containers:
        - name: {{ .Values.app.name }}
          image: "{{ .Values.app.image.repository }}:{{ .Values.app.image.tag }}"
          imagePullPolicy: {{ .Values.app.image.pullPolicy }}
          {{- with .Values.app.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.app.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.serviceMonitor.enabled }}
          ports:
            - name: metrics
              containerPort: {{ .Values.serviceMonitor.port }}
              protocol: TCP
          {{- end }}
          securityContext:
            {{- include "sre-lib.containerSecurityContext" . | nindent 12 }}
          resources:
            {{- include "sre-lib.resources" . | nindent 12 }}
          livenessProbe:
            exec:
              command:
                {{- toYaml .Values.app.probes.liveness.exec.command | nindent 16 }}
            initialDelaySeconds: {{ .Values.app.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.app.probes.liveness.periodSeconds }}
          readinessProbe:
            exec:
              command:
                {{- toYaml .Values.app.probes.readiness.exec.command | nindent 16 }}
            initialDelaySeconds: {{ .Values.app.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.app.probes.readiness.periodSeconds }}
          env:
            {{- include "sre-lib.env" . | nindent 12 }}
          {{- if or (and (hasKey .Values "storage") .Values.storage.enabled) .Values.envFrom }}
          envFrom:
            {{- if and (hasKey .Values "storage") .Values.storage.enabled }}
            - configMapRef:
                name: {{ include "sre-worker.fullname" . }}-storage-config
            {{- end }}
            {{- with .Values.envFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
          {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
      {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "sre-worker.fullname" . }}-data
      {{- end }}
