server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Allow embedding in dashboard iframe
    add_header X-Frame-Options "ALLOW-FROM https://dashboard.apps.sre.example.com" always;
    add_header Content-Security-Policy "frame-ancestors 'self' https://dashboard.apps.sre.example.com https://*.apps.sre.example.com" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API calls go directly to the dashboard from the browser (no proxy needed).
    # SSO cookie (SameSite=None) is sent cross-origin by the browser.

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
}
