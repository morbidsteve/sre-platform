server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    resolver 10.43.0.10 valid=30s ipv6=off;

    location /api/ {
        set $dashboard "sre-dashboard.sre-dashboard.svc.cluster.local:3001";
        proxy_pass http://$dashboard;
        proxy_http_version 1.1;
        proxy_set_header Host sre-dashboard.sre-dashboard.svc.cluster.local;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Auth-Request-User $http_x_auth_request_user;
        proxy_set_header X-Auth-Request-Email $http_x_auth_request_email;
        proxy_set_header X-Auth-Request-Groups $http_x_auth_request_groups;
        proxy_set_header Cookie $http_cookie;
        proxy_connect_timeout 30s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /oauth2/ {
        set $oauth2 "oauth2-proxy.oauth2-proxy.svc.cluster.local:4180";
        proxy_pass http://$oauth2;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
}
