---
apiVersion: v1
kind: Namespace
metadata:
  name: sre-dsop
  labels:
    app.kubernetes.io/part-of: sre-platform
    kubernetes.io/metadata.name: sre-dsop
    pod-security.kubernetes.io/enforce: privileged
    istio-injection: enabled
    sre.io/network-policy-configured: "true"
    sre.io/security-categorization: moderate
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dsop-wizard
  namespace: sre-dsop
  labels:
    app.kubernetes.io/name: dsop-wizard
    app.kubernetes.io/part-of: sre-platform
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dsop-wizard
  namespace: sre-dsop
  labels:
    app.kubernetes.io/name: dsop-wizard
    app.kubernetes.io/part-of: sre-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dsop-wizard
  template:
    metadata:
      labels:
        app: dsop-wizard
        app.kubernetes.io/name: dsop-wizard
        app.kubernetes.io/part-of: sre-platform
        sre.io/team: platform
      annotations:
        traffic.sidecar.istio.io/excludeOutboundPorts: "3001,4180"
    spec:
      serviceAccountName: dsop-wizard
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: harbor-pull-creds
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: wizard
          # Dockerfile uses nginxinc/nginx-unprivileged:1.27-alpine which
          # runs as UID 101 and listens on port 8080 without needing root.
          image: harbor.apps.sre.example.com/platform/dsop-wizard:v3.0.36
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 101
            runAsGroup: 101
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
      volumes:
        - name: tmp
          emptyDir: {}
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
