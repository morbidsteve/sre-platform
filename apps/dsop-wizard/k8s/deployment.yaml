---
apiVersion: v1
kind: Namespace
metadata:
  name: sre-dsop
  labels:
    app.kubernetes.io/part-of: sre-platform
    kubernetes.io/metadata.name: sre-dsop
    pod-security.kubernetes.io/enforce: privileged
    istio-injection: enabled
    sre.io/network-policy-configured: "true"
    sre.io/security-categorization: moderate
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dsop-wizard
  namespace: sre-dsop
  labels:
    app.kubernetes.io/name: dsop-wizard
    app.kubernetes.io/part-of: sre-platform
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dsop-wizard
  namespace: sre-dsop
  labels:
    app.kubernetes.io/name: dsop-wizard
    app.kubernetes.io/part-of: sre-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dsop-wizard
  template:
    metadata:
      labels:
        app: dsop-wizard
        app.kubernetes.io/name: dsop-wizard
        app.kubernetes.io/part-of: sre-platform
        sre.io/team: platform
    spec:
      serviceAccountName: dsop-wizard
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: harbor-pull-creds
      securityContext:
        runAsNonRoot: false
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: wizard
          # NOTE: Uses nginx:1.27-alpine which runs as root.
          # To run as non-root (runAsUser: 101), switch Dockerfile base
          # image to nginxinc/nginx-unprivileged:1.27-alpine (like portal).
          image: ${SRE_REGISTRY}/platform/dsop-wizard:v2.6.0
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
