apiVersion: v1
kind: Namespace
metadata:
  name: sre-portal
  labels:
    app.kubernetes.io/part-of: sre-platform
    kubernetes.io/metadata.name: sre-portal
    pod-security.kubernetes.io/enforce: privileged
    istio-injection: enabled
    sre.io/network-policy-configured: "true"
    sre.io/security-categorization: moderate
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sre-portal
  namespace: sre-portal
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sre-portal
  namespace: sre-portal
  labels:
    app.kubernetes.io/name: sre-portal
    app.kubernetes.io/part-of: sre-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sre-portal
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sre-portal
        app.kubernetes.io/part-of: sre-platform
        sre.io/team: platform
    spec:
      serviceAccountName: sre-portal
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: harbor-pull-creds
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: portal
          # Dockerfile uses nginxinc/nginx-unprivileged:1.27-alpine (UID 101,
          # listens on 8080). Root FS is read-only; nginx temp dirs are mounted
          # as emptyDir.
          image: harbor.apps.sre.example.com/platform/sre-portal:v2.3.2
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 101
            runAsGroup: 101
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
      volumes:
        - name: tmp
          emptyDir: {}
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: sre-portal
  namespace: sre-portal
  labels:
    app.kubernetes.io/name: sre-portal
    app.kubernetes.io/part-of: sre-platform
spec:
  selector:
    app.kubernetes.io/name: sre-portal
  ports:
    - port: 8080
      targetPort: 8080
      name: http
