apiVersion: v1
kind: Namespace
metadata:
  name: sre-portal
  labels:
    app.kubernetes.io/part-of: sre-platform
    kubernetes.io/metadata.name: sre-portal
    pod-security.kubernetes.io/enforce: privileged
    istio-injection: enabled
    sre.io/network-policy-configured: "true"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sre-portal
  namespace: sre-portal
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sre-portal
  namespace: sre-portal
  labels:
    app.kubernetes.io/name: sre-portal
    app.kubernetes.io/part-of: sre-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sre-portal
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sre-portal
        app.kubernetes.io/part-of: sre-platform
        sre.io/team: platform
    spec:
      serviceAccountName: sre-portal
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: harbor-pull-creds
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: portal
          image: harbor.apps.sre.example.com/platform/sre-portal:v2.0.0
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 101
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: sre-portal
  namespace: sre-portal
  labels:
    app.kubernetes.io/name: sre-portal
    app.kubernetes.io/part-of: sre-platform
spec:
  selector:
    app.kubernetes.io/name: sre-portal
  ports:
    - port: 8080
      targetPort: 8080
      name: http
