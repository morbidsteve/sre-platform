apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: sre-portal
  namespace: sre-portal
  labels:
    app.kubernetes.io/name: sre-portal
    app.kubernetes.io/part-of: sre-platform
spec:
  hosts:
    - "portal.${SRE_DOMAIN}"
  gateways:
    - istio-system/main
  http:
    # OAuth2 proxy — routes /oauth2/* to oauth2-proxy for SSO flow
    - match:
        - uri:
            prefix: /oauth2/
      route:
        - destination:
            host: oauth2-proxy.oauth2-proxy.svc.cluster.local
            port:
              number: 4180
      timeout: 30s
    - route:
        - destination:
            host: sre-portal.sre-portal.svc.cluster.local
            port:
              number: 8080
