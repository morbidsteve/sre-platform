server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # DNS resolver for variable-based proxy_pass (required for Istio compatibility)
    resolver 10.43.0.10 valid=30s ipv6=off;
    resolver_timeout 5s;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # OAuth2 Proxy auth_request endpoint (subrequest to validate session)
    location = /oauth2/auth {
        internal;
        set $oauth2_upstream "oauth2-proxy.oauth2-proxy.svc.cluster.local";
        proxy_pass http://$oauth2_upstream:4180/oauth2/auth;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        # Must use service FQDN as Host (not $host) so Istio routes correctly
        proxy_set_header Host "oauth2-proxy.oauth2-proxy.svc.cluster.local";
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Cookie $http_cookie;
    }

    # Proxy OAuth2 endpoints (start, callback, sign_out, userinfo)
    location /oauth2/ {
        set $oauth2_upstream "oauth2-proxy.oauth2-proxy.svc.cluster.local";
        proxy_pass http://$oauth2_upstream:4180;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy dashboard API — auth_request extracts SSO headers for RBAC
    location /api/ {
        auth_request /oauth2/auth;
        auth_request_set $auth_user $upstream_http_x_auth_request_user;
        auth_request_set $auth_email $upstream_http_x_auth_request_email;
        auth_request_set $auth_groups $upstream_http_x_auth_request_groups;

        set $dashboard_upstream "sre-dashboard.sre-dashboard.svc.cluster.local";
        proxy_pass http://$dashboard_upstream:3001;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        # Must use service FQDN as Host so Istio routes correctly
        proxy_set_header Host "sre-dashboard.sre-dashboard.svc.cluster.local";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Auth-Request-User $auth_user;
        proxy_set_header X-Auth-Request-Email $auth_email;
        proxy_set_header X-Auth-Request-Groups $auth_groups;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
