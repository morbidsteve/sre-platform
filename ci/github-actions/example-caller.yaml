---
# Example CI workflow that calls the SRE reusable build pipeline.
# Implements all 8 RAISE 2.0 Security Gates.
#
# Place this file in your application repo at:
#   .github/workflows/ci.yaml
#
# Pipeline flow:
#   1. GATE 3: Secrets detection (Gitleaks)
#   2. GATE 1: SAST (Semgrep)
#   3. Build container image
#   4. GATE 4: Container security scan (Trivy)
#   5. GATE 2: SBOM generation (Syft)
#   6. GATE 6: ISSM review (manual approval)
#   7. GATE 7: Image signing (Cosign)
#   8. GATE 8: Push to Harbor
#   9. Update GitOps repo → Flux deploys
#  10. GATE 5: DAST scan (ZAP) — runs against deployed app
#
# Prerequisites:
#   - GitHub Environment "issm-review" with required reviewers (your ISSM)
#   - Secrets: HARBOR_USERNAME, HARBOR_PASSWORD, COSIGN_PRIVATE_KEY,
#     COSIGN_PASSWORD, GITOPS_TOKEN

name: "My App CI"

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  # ------------------------------------------------------------------
  # Steps 1-8: Build, scan all gates, ISSM review, sign, push
  # ------------------------------------------------------------------
  build:
    name: "Build & Push"
    uses: ./.github/workflows/build-scan-deploy.yaml
    with:
      image-name: "my-app"
      image-tag: "${{ github.ref_name }}"
      harbor-project: "team-alpha"
      # Optional overrides:
      # dockerfile: "./build/Dockerfile"
      # build-context: "."
      # trivy-severity: "CRITICAL,HIGH"
      # harbor-registry: "harbor.apps.sre.example.com"
    secrets: inherit

  # ------------------------------------------------------------------
  # Step 9: Update the GitOps repo to trigger Flux deployment
  # ------------------------------------------------------------------
  deploy:
    name: "Update GitOps"
    needs: build
    uses: ./.github/workflows/update-gitops.yaml
    with:
      image-name: "my-app"
      image-tag: "${{ github.ref_name }}"
      team: "team-alpha"
      # For production: create a PR instead of committing directly
      # create-pr: true
    secrets: inherit

  # ------------------------------------------------------------------
  # Step 10: GATE 5 — DAST scan against deployed app
  # Runs after Flux deploys the new version
  # ------------------------------------------------------------------
  dast:
    name: "GATE 5: DAST"
    needs: deploy
    uses: ./.github/workflows/dast-scan.yaml
    with:
      target-url: "https://my-app.apps.sre.example.com"
      scan-type: "baseline"
