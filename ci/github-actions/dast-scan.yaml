---
# RAISE 2.0 GATE 5: Dynamic Application Security Testing (DAST)
#
# Runs OWASP ZAP against a deployed preview environment or staging URL.
# Called after the app is deployed (not during the build pipeline).
#
# Usage: Call from preview-environment.yaml after deploy, or manually
#   jobs:
#     dast:
#       uses: <org>/sre-platform/.github/workflows/dast-scan.yaml@main
#       with:
#         target-url: https://pr-42-my-app.apps.sre.example.com
#         scan-type: baseline

name: "GATE 5: DAST Scan (OWASP ZAP)"

on:
  workflow_call:
    inputs:
      target-url:
        description: "URL of the deployed application to scan"
        required: true
        type: string
      scan-type:
        description: "ZAP scan type: 'baseline' (passive, fast) or 'full' (active, slow)"
        required: false
        type: string
        default: "baseline"
      rules-file:
        description: "Path to ZAP rules file for customizing scan behavior"
        required: false
        type: string
        default: ""

jobs:
  dast-scan:
    name: "OWASP ZAP ${{ inputs.scan-type }} scan"
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      security-events: write  # For SARIF upload
      issues: write           # For creating issues on findings

    steps:
      - name: Checkout code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.2.2

      # ------------------------------------------------------------------
      # ZAP Baseline Scan (passive — safe for any environment)
      # Crawls the target and checks responses for common vulnerabilities
      # ------------------------------------------------------------------
      - name: ZAP Baseline Scan
        if: inputs.scan-type == 'baseline'
        uses: zaproxy/action-baseline@af764993dd3d2f3a129dbcaa4b4f4c5c1d0a9235  # v0.14.0
        with:
          target: ${{ inputs.target-url }}
          rules_file_name: ${{ inputs.rules-file }}
          cmd_options: "-a -j"
          allow_issue_writing: false
          artifact_name: "zap-baseline-report"

      # ------------------------------------------------------------------
      # ZAP Full Scan (active — sends attack payloads, use on preview only)
      # Includes: SQL injection, XSS, CSRF, path traversal, etc.
      # ------------------------------------------------------------------
      - name: ZAP Full Scan
        if: inputs.scan-type == 'full'
        uses: zaproxy/action-full-scan@3bbd8e0a30db04501a4d6bef08a2420adc2e6b31  # v0.12.0
        with:
          target: ${{ inputs.target-url }}
          rules_file_name: ${{ inputs.rules-file }}
          cmd_options: "-a -j"
          allow_issue_writing: false
          artifact_name: "zap-full-report"

      # ------------------------------------------------------------------
      # Convert ZAP report to SARIF and upload to GitHub Security tab
      # ------------------------------------------------------------------
      - name: Convert ZAP report to SARIF
        if: always()
        run: |
          # ZAP actions produce report_html.html and report_json.json
          # Find the JSON report
          ZAP_REPORT=$(find . -name "report_json.json" -o -name "zap-report.json" 2>/dev/null | head -1)
          if [ -z "$ZAP_REPORT" ]; then
            echo "No ZAP JSON report found, skipping SARIF conversion"
            exit 0
          fi

          # Create a minimal SARIF from ZAP JSON
          python3 -c "
          import json, sys

          with open('${ZAP_REPORT}') as f:
              zap = json.load(f)

          rules = []
          results = []

          for site in zap.get('site', []):
              for alert in site.get('alerts', []):
                  rule_id = f\"ZAP-{alert.get('pluginid', 'unknown')}\"
                  risk = alert.get('riskdesc', 'Informational').split(' ')[0]
                  level_map = {'High': 'error', 'Medium': 'warning', 'Low': 'note', 'Informational': 'note'}
                  level = level_map.get(risk, 'note')

                  rules.append({
                      'id': rule_id,
                      'name': alert.get('name', ''),
                      'shortDescription': {'text': alert.get('name', '')},
                      'fullDescription': {'text': alert.get('desc', '')},
                      'defaultConfiguration': {'level': level}
                  })

                  for instance in alert.get('instances', [])[:5]:
                      results.append({
                          'ruleId': rule_id,
                          'level': level,
                          'message': {'text': f\"{alert.get('name')}: {alert.get('solution', 'Review and fix.')}\"},
                          'locations': [{
                              'physicalLocation': {
                                  'artifactLocation': {'uri': instance.get('uri', '${{ inputs.target-url }}')},
                                  'region': {'startLine': 1}
                              }
                          }]
                      })

          sarif = {
              '\$schema': 'https://json.schemastore.org/sarif-2.1.0.json',
              'version': '2.1.0',
              'runs': [{
                  'tool': {
                      'driver': {
                          'name': 'OWASP ZAP',
                          'version': '2.15.0',
                          'informationUri': 'https://www.zaproxy.org/',
                          'rules': rules
                      }
                  },
                  'results': results
              }]
          }

          with open('zap-results.sarif', 'w') as f:
              json.dump(sarif, f, indent=2)

          print(f'Converted {len(results)} findings to SARIF')
          " 2>/dev/null || echo "SARIF conversion skipped (no python3 or parse error)"

      - name: Upload ZAP SARIF results
        uses: github/codeql-action/upload-sarif@4dd16135b69cb609a7909eaa37a880eb844d02a1  # v3.28.12
        if: hashFiles('zap-results.sarif') != ''
        with:
          sarif_file: "zap-results.sarif"
          category: "owasp-zap"

      - name: DAST summary
        if: always()
        run: |
          echo "## GATE 5: DAST Scan Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Target | \`${{ inputs.target-url }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Scan Type | ${{ inputs.scan-type }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tool | OWASP ZAP |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Full report available in workflow artifacts." >> "$GITHUB_STEP_SUMMARY"
