---
# Reusable GitHub Actions workflow for SRE Platform CI/CD
# Builds, scans, signs, and pushes container images to Harbor
#
# Usage: Call this workflow from your application repo:
#   jobs:
#     build:
#       uses: <org>/sre-platform/.github/workflows/build-scan-deploy.yaml@main
#       with:
#         image-name: my-app
#         image-tag: v1.2.3
#         harbor-project: team-alpha
#       secrets: inherit

name: "Build, Scan & Deploy"

on:
  workflow_call:
    inputs:
      image-name:
        description: "Name of the container image (e.g., my-app)"
        required: true
        type: string
      image-tag:
        description: "Image tag to apply (e.g., v1.2.3)"
        required: true
        type: string
      harbor-project:
        description: "Harbor project/team name (e.g., team-alpha)"
        required: true
        type: string
      dockerfile:
        description: "Path to the Dockerfile"
        required: false
        type: string
        default: "./Dockerfile"
      build-context:
        description: "Docker build context path"
        required: false
        type: string
        default: "."
      trivy-severity:
        description: "Trivy severity threshold to fail the build"
        required: false
        type: string
        default: "CRITICAL"
      harbor-registry:
        description: "Harbor registry hostname"
        required: false
        type: string
        default: "harbor.apps.sre.example.com"
    secrets:
      HARBOR_USERNAME:
        description: "Harbor robot account username"
        required: true
      HARBOR_PASSWORD:
        description: "Harbor robot account password"
        required: true
      COSIGN_PRIVATE_KEY:
        description: "Cosign private key for image signing"
        required: true
      COSIGN_PASSWORD:
        description: "Password for the Cosign private key"
        required: true

env:
  FULL_IMAGE: "${{ inputs.harbor-registry }}/${{ inputs.harbor-project }}/${{ inputs.image-name }}:${{ inputs.image-tag }}"

jobs:
  # ====================================================================
  # Job 1: Build, scan (all security gates), produce artifacts
  # ====================================================================
  build-and-scan:
    name: "Build & Security Gates"
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      security-events: write  # Required for SARIF uploads

    steps:
      # ------------------------------------------------------------------
      # 1. Checkout application source code
      # ------------------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.2.2
        with:
          fetch-depth: 0  # Full history for Gitleaks

      # ------------------------------------------------------------------
      # GATE 3: Secrets/Keys Detection (Gitleaks)
      # Scans git history + working directory for leaked secrets
      # ------------------------------------------------------------------
      - name: "GATE 3: Secrets detection (Gitleaks)"
        uses: gitleaks/gitleaks-action@44c470ffc35caa8b1eb3e4b5d57e2d70e4e3f9e0  # v2.3.7
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          args: "--verbose --redact"

      # ------------------------------------------------------------------
      # GATE 1: Static Application Security Testing (Semgrep)
      # Scans source code for vulnerabilities using OWASP rules
      # ------------------------------------------------------------------
      - name: "GATE 1: SAST scan (Semgrep)"
        uses: semgrep/semgrep-action@713efdd71e0aa54f585dae4f55fd3845966ef1cf  # v1
        with:
          config: >-
            p/owasp-top-ten
            p/security-audit
            p/secrets
          generateSarif: "1"
        env:
          SEMGREP_RULES: "p/owasp-top-ten p/security-audit p/secrets"

      - name: Upload Semgrep SARIF results
        uses: github/codeql-action/upload-sarif@4dd16135b69cb609a7909eaa37a880eb844d02a1  # v3.28.12
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: "semgrep"

      # ------------------------------------------------------------------
      # 2. Set up Docker Buildx for multi-platform builds
      # ------------------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2  # v3.10.0

      # ------------------------------------------------------------------
      # 3. Build the container image (local only, not pushed yet)
      # ------------------------------------------------------------------
      - name: Build container image
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1  # v5.5.0
        with:
          context: ${{ inputs.build-context }}
          file: ${{ inputs.dockerfile }}
          push: false
          load: true
          tags: ${{ env.FULL_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ------------------------------------------------------------------
      # GATE 4: Container Security Scanning (Trivy)
      # Fails the pipeline on CRITICAL findings by default
      # ------------------------------------------------------------------
      - name: "GATE 4: Container security scan (Trivy)"
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947e795f797d01e4b97  # v0.28.0
        with:
          image-ref: ${{ env.FULL_IMAGE }}
          format: "table"
          exit-code: "1"
          severity: ${{ inputs.trivy-severity }}
          timeout: "10m"

      - name: "GATE 4: Trivy SARIF report"
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947e795f797d01e4b97  # v0.28.0
        if: always()
        with:
          image-ref: ${{ env.FULL_IMAGE }}
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH,MEDIUM"
          timeout: "10m"

      - name: Upload Trivy SARIF results
        uses: github/codeql-action/upload-sarif@4dd16135b69cb609a7909eaa37a880eb844d02a1  # v3.28.12
        if: always()
        with:
          sarif_file: "trivy-results.sarif"
          category: "trivy"

      # ------------------------------------------------------------------
      # GATE 2: Software Bill of Materials (Syft)
      # Generates SPDX JSON SBOM
      # ------------------------------------------------------------------
      - name: "GATE 2: Generate SBOM (Syft)"
        uses: anchore/sbom-action@fc46e51fd3cb168ffb36c6d1915723c47db58571  # v0.17.7
        with:
          image: ${{ env.FULL_IMAGE }}
          format: spdx-json
          output-file: "sbom-spdx.json"
          artifact-name: "sbom-${{ inputs.image-name }}-${{ inputs.image-tag }}.spdx.json"

      - name: "GATE 2: Generate SBOM (CycloneDX)"
        uses: anchore/sbom-action@fc46e51fd3cb168ffb36c6d1915723c47db58571  # v0.17.7
        with:
          image: ${{ env.FULL_IMAGE }}
          format: cyclonedx-json
          output-file: "sbom-cyclonedx.json"
          artifact-name: "sbom-${{ inputs.image-name }}-${{ inputs.image-tag }}.cyclonedx.json"

      # ------------------------------------------------------------------
      # Save image for next job
      # ------------------------------------------------------------------
      - name: Save container image
        run: docker save "${{ env.FULL_IMAGE }}" -o /tmp/image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: container-image
          path: /tmp/image.tar
          retention-days: 1

      - name: Upload scan artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: scan-results
          path: |
            trivy-results.sarif
            sbom-spdx.json
            sbom-cyclonedx.json
            semgrep.sarif
          retention-days: 90

      # ------------------------------------------------------------------
      # Security gate summary
      # ------------------------------------------------------------------
      - name: Security gates summary
        if: always()
        run: |
          echo "## Security Gates Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Gate | Tool | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| GATE 1: SAST | Semgrep | Completed |" >> "$GITHUB_STEP_SUMMARY"
          echo "| GATE 2: SBOM | Syft | Generated (SPDX + CycloneDX) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| GATE 3: Secrets | Gitleaks | Completed |" >> "$GITHUB_STEP_SUMMARY"
          echo "| GATE 4: Container Scan | Trivy | Passed (no ${{ inputs.trivy-severity }}) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| GATE 5: DAST | OWASP ZAP | Runs post-deploy |" >> "$GITHUB_STEP_SUMMARY"
          echo "| GATE 6: ISSM Review | Manual | Pending approval |" >> "$GITHUB_STEP_SUMMARY"
          echo "| GATE 7: Image Signing | Cosign | After ISSM approval |" >> "$GITHUB_STEP_SUMMARY"
          echo "| GATE 8: Artifact Storage | Harbor | After ISSM approval |" >> "$GITHUB_STEP_SUMMARY"

  # ====================================================================
  # Job 2: GATE 6 — ISSM Review Gate
  # Pipeline pauses here for manual approval before signing
  # ====================================================================
  issm-review:
    name: "GATE 6: ISSM Review"
    needs: build-and-scan
    runs-on: ubuntu-22.04
    environment: issm-review  # Requires approval in GitHub Environment settings
    steps:
      - name: ISSM review approved
        run: |
          echo "## ISSM Review Approved" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "The RPOC ISSM has reviewed scan results and approved this release." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | \`${{ env.FULL_IMAGE }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Approved by | \`${{ github.actor }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Approved at | \`$(date -u +%Y-%m-%dT%H:%M:%SZ)\` |" >> "$GITHUB_STEP_SUMMARY"

  # ====================================================================
  # Job 3: Sign and push (only runs after ISSM approval)
  # ====================================================================
  sign-and-push:
    name: "Sign & Push to Harbor"
    needs: issm-review
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      id-token: write  # Required for Cosign OIDC

    steps:
      - name: Download container image
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: container-image
          path: /tmp

      - name: Download scan artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: scan-results

      - name: Load container image
        run: docker load -i /tmp/image.tar

      # ------------------------------------------------------------------
      # GATE 8: Store in artifact repository (Harbor)
      # ------------------------------------------------------------------
      - name: "GATE 8: Login to Harbor"
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567  # v3.3.0
        with:
          registry: ${{ inputs.harbor-registry }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: "GATE 8: Push image to Harbor"
        run: docker push "${{ env.FULL_IMAGE }}"

      # ------------------------------------------------------------------
      # GATE 7: Sign the release container image (Cosign)
      # ------------------------------------------------------------------
      - name: Install Cosign
        uses: sigstore/cosign-installer@3454372f970b8a86ee5b7c1123cb0f81d9dd3279  # v3.8.0

      - name: "GATE 7: Sign image with Cosign"
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          cosign sign --key env://COSIGN_PRIVATE_KEY \
            --yes \
            "${{ env.FULL_IMAGE }}"

      - name: Attach SBOM attestation
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          cosign attest --key env://COSIGN_PRIVATE_KEY \
            --predicate sbom-spdx.json \
            --type spdxjson \
            --yes \
            "${{ env.FULL_IMAGE }}"

      - name: Attach CycloneDX attestation
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          cosign attest --key env://COSIGN_PRIVATE_KEY \
            --predicate sbom-cyclonedx.json \
            --type cyclonedx \
            --yes \
            "${{ env.FULL_IMAGE }}"

      # ------------------------------------------------------------------
      # Generate SLSA provenance attestation (Level 2)
      # ------------------------------------------------------------------
      - name: Generate SLSA provenance
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          cat > /tmp/slsa-provenance.json <<PROVENANCE
          {
            "_type": "https://in-toto.io/Statement/v0.1",
            "predicateType": "https://slsa.dev/provenance/v0.2",
            "subject": [
              {
                "name": "${{ env.FULL_IMAGE }}",
                "digest": {
                  "sha256": "$(docker inspect --format='{{index .RepoDigests 0}}' ${{ env.FULL_IMAGE }} 2>/dev/null | cut -d@ -f2 | cut -d: -f2 || echo 'unknown')"
                }
              }
            ],
            "predicate": {
              "builder": {
                "id": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
              },
              "buildType": "https://github.com/actions/runner",
              "invocation": {
                "configSource": {
                  "uri": "git+https://github.com/${{ github.repository }}@${{ github.ref }}",
                  "digest": {
                    "sha1": "${{ github.sha }}"
                  },
                  "entryPoint": ".github/workflows/ci.yaml"
                }
              },
              "metadata": {
                "buildInvocationId": "${{ github.run_id }}",
                "buildStartedOn": "${{ github.event.head_commit.timestamp }}",
                "completeness": {
                  "parameters": true,
                  "environment": true,
                  "materials": true
                },
                "reproducible": false
              },
              "materials": [
                {
                  "uri": "git+https://github.com/${{ github.repository }}@${{ github.ref }}",
                  "digest": {
                    "sha1": "${{ github.sha }}"
                  }
                }
              ]
            }
          }
          PROVENANCE
          cosign attest --key env://COSIGN_PRIVATE_KEY \
            --predicate /tmp/slsa-provenance.json \
            --type slsaprovenance \
            --yes \
            "${{ env.FULL_IMAGE }}"

      # ------------------------------------------------------------------
      # Pipeline summary
      # ------------------------------------------------------------------
      - name: Pipeline summary
        run: |
          echo "## RAISE 2.0 Security Gates — All Passed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Gate | Tool | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| GATE 1: SAST | Semgrep | Passed |" >> "$GITHUB_STEP_SUMMARY"
          echo "| GATE 2: SBOM | Syft | Generated (SPDX + CycloneDX) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| GATE 3: Secrets Detection | Gitleaks | Passed |" >> "$GITHUB_STEP_SUMMARY"
          echo "| GATE 4: Container Scan | Trivy | Passed (no ${{ inputs.trivy-severity }}) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| GATE 5: DAST | OWASP ZAP | Runs post-deploy |" >> "$GITHUB_STEP_SUMMARY"
          echo "| GATE 6: ISSM Review | Manual Approval | Approved by \`${{ github.actor }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| GATE 7: Image Signing | Cosign | Signed |" >> "$GITHUB_STEP_SUMMARY"
          echo "| GATE 8: Artifact Storage | Harbor | \`${{ env.FULL_IMAGE }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Attestation | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| SBOM Attestation (SPDX) | Attached |" >> "$GITHUB_STEP_SUMMARY"
          echo "| SBOM Attestation (CycloneDX) | Attached |" >> "$GITHUB_STEP_SUMMARY"
          echo "| SLSA Provenance | Level 2 (Attached) |" >> "$GITHUB_STEP_SUMMARY"
