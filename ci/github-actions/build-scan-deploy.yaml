---
# Reusable GitHub Actions workflow for SRE Platform CI/CD
# Builds, scans, signs, and pushes container images to Harbor
#
# Usage: Call this workflow from your application repo:
#   jobs:
#     build:
#       uses: <org>/sre-platform/.github/workflows/build-scan-deploy.yaml@main
#       with:
#         image-name: my-app
#         image-tag: v1.2.3
#         harbor-project: team-alpha
#       secrets: inherit

name: "Build, Scan & Deploy"

on:
  workflow_call:
    inputs:
      image-name:
        description: "Name of the container image (e.g., my-app)"
        required: true
        type: string
      image-tag:
        description: "Image tag to apply (e.g., v1.2.3)"
        required: true
        type: string
      harbor-project:
        description: "Harbor project/team name (e.g., team-alpha)"
        required: true
        type: string
      dockerfile:
        description: "Path to the Dockerfile"
        required: false
        type: string
        default: "./Dockerfile"
      build-context:
        description: "Docker build context path"
        required: false
        type: string
        default: "."
      trivy-severity:
        description: "Trivy severity threshold to fail the build"
        required: false
        type: string
        default: "CRITICAL"
      harbor-registry:
        description: "Harbor registry hostname"
        required: false
        type: string
        default: "harbor.sre.internal"
    secrets:
      HARBOR_USERNAME:
        description: "Harbor robot account username"
        required: true
      HARBOR_PASSWORD:
        description: "Harbor robot account password"
        required: true
      COSIGN_PRIVATE_KEY:
        description: "Cosign private key for image signing"
        required: true
      COSIGN_PASSWORD:
        description: "Password for the Cosign private key"
        required: true

env:
  FULL_IMAGE: "${{ inputs.harbor-registry }}/${{ inputs.harbor-project }}/${{ inputs.image-name }}:${{ inputs.image-tag }}"

jobs:
  build-scan-sign:
    name: "Build, Scan, Sign & Push"
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      id-token: write  # Required for Cosign OIDC

    steps:
      # ------------------------------------------------------------------
      # 1. Checkout application source code
      # ------------------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.2.2

      # ------------------------------------------------------------------
      # 2. Set up Docker Buildx for multi-platform builds
      # ------------------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2  # v3.10.0

      # ------------------------------------------------------------------
      # 3. Build the container image (local only, not pushed yet)
      # ------------------------------------------------------------------
      - name: Build container image
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1  # v5.5.0
        with:
          context: ${{ inputs.build-context }}
          file: ${{ inputs.dockerfile }}
          push: false
          load: true
          tags: ${{ env.FULL_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ------------------------------------------------------------------
      # 4. Scan image with Trivy for vulnerabilities
      #    Fails the pipeline on CRITICAL findings by default
      # ------------------------------------------------------------------
      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947e795f797d01e4b97  # v0.28.0
        with:
          image-ref: ${{ env.FULL_IMAGE }}
          format: "table"
          exit-code: "1"
          severity: ${{ inputs.trivy-severity }}
          timeout: "10m"

      - name: Run Trivy scan (SARIF report)
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947e795f797d01e4b97  # v0.28.0
        if: always()
        with:
          image-ref: ${{ env.FULL_IMAGE }}
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH,MEDIUM"
          timeout: "10m"

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@4dd16135b69cb609a7909eaa37a880eb844d02a1  # v3.28.12
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

      # ------------------------------------------------------------------
      # 5. Generate SBOM with Syft (SPDX format)
      # ------------------------------------------------------------------
      - name: Generate SBOM
        uses: anchore/sbom-action@fc46e51fd3cb168ffb36c6d1915723c47db58571  # v0.17.7
        with:
          image: ${{ env.FULL_IMAGE }}
          format: spdx-json
          output-file: "sbom-spdx.json"
          artifact-name: "sbom-${{ inputs.image-name }}-${{ inputs.image-tag }}.spdx.json"

      # ------------------------------------------------------------------
      # 6. Login to Harbor registry
      # ------------------------------------------------------------------
      - name: Login to Harbor
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567  # v3.3.0
        with:
          registry: ${{ inputs.harbor-registry }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      # ------------------------------------------------------------------
      # 7. Push image to Harbor
      # ------------------------------------------------------------------
      - name: Push image to Harbor
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1  # v5.5.0
        with:
          context: ${{ inputs.build-context }}
          file: ${{ inputs.dockerfile }}
          push: true
          tags: ${{ env.FULL_IMAGE }}
          cache-from: type=gha

      # ------------------------------------------------------------------
      # 8. Install Cosign for image signing
      # ------------------------------------------------------------------
      - name: Install Cosign
        uses: sigstore/cosign-installer@3454372f970b8a86ee5b7c1123cb0f81d9dd3279  # v3.8.0

      # ------------------------------------------------------------------
      # 9. Sign the image with Cosign
      # ------------------------------------------------------------------
      - name: Sign image with Cosign
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          cosign sign --key env://COSIGN_PRIVATE_KEY \
            --yes \
            "${{ env.FULL_IMAGE }}"

      # ------------------------------------------------------------------
      # 10. Attach SBOM as Cosign attestation
      # ------------------------------------------------------------------
      - name: Attach SBOM attestation
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          cosign attest --key env://COSIGN_PRIVATE_KEY \
            --predicate sbom-spdx.json \
            --type spdxjson \
            --yes \
            "${{ env.FULL_IMAGE }}"

      # ------------------------------------------------------------------
      # 11. Generate SLSA provenance attestation (Level 2)
      # ------------------------------------------------------------------
      - name: Generate SLSA provenance
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          cat > /tmp/slsa-provenance.json <<PROVENANCE
          {
            "_type": "https://in-toto.io/Statement/v0.1",
            "predicateType": "https://slsa.dev/provenance/v0.2",
            "subject": [
              {
                "name": "${{ env.FULL_IMAGE }}",
                "digest": {
                  "sha256": "$(docker inspect --format='{{index .RepoDigests 0}}' ${{ env.FULL_IMAGE }} 2>/dev/null | cut -d@ -f2 | cut -d: -f2 || echo 'unknown')"
                }
              }
            ],
            "predicate": {
              "builder": {
                "id": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
              },
              "buildType": "https://github.com/actions/runner",
              "invocation": {
                "configSource": {
                  "uri": "git+https://github.com/${{ github.repository }}@${{ github.ref }}",
                  "digest": {
                    "sha1": "${{ github.sha }}"
                  },
                  "entryPoint": ".github/workflows/ci.yaml"
                }
              },
              "metadata": {
                "buildInvocationId": "${{ github.run_id }}",
                "buildStartedOn": "${{ github.event.head_commit.timestamp }}",
                "completeness": {
                  "parameters": true,
                  "environment": true,
                  "materials": true
                },
                "reproducible": false
              },
              "materials": [
                {
                  "uri": "git+https://github.com/${{ github.repository }}@${{ github.ref }}",
                  "digest": {
                    "sha1": "${{ github.sha }}"
                  }
                }
              ]
            }
          }
          PROVENANCE
          cosign attest --key env://COSIGN_PRIVATE_KEY \
            --predicate /tmp/slsa-provenance.json \
            --type slsaprovenance \
            --yes \
            "${{ env.FULL_IMAGE }}"

      # ------------------------------------------------------------------
      # 12. Output summary
      # ------------------------------------------------------------------
      - name: Pipeline summary
        run: |
          echo "## Build & Deploy Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | \`${{ env.FULL_IMAGE }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Trivy Scan | Passed (no ${{ inputs.trivy-severity }} findings) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| SBOM | Generated (SPDX JSON) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Cosign Signature | Attached |" >> "$GITHUB_STEP_SUMMARY"
          echo "| SBOM Attestation | Attached |" >> "$GITHUB_STEP_SUMMARY"
          echo "| SLSA Provenance | Level 2 (Attached) |" >> "$GITHUB_STEP_SUMMARY"
