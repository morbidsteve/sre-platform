---
# Tekton Triggers: GitLab Push Webhook
# Receives GitLab push events and creates PipelineRuns for affected apps.
#
# Setup:
#   1. In GitLab project, go to Settings > Webhooks
#   2. URL: https://tekton-triggers.apps.sre.example.com/gitlab
#   3. Secret token: (value from gitlab-webhook-secret Secret)
#   4. Trigger: Push events
#   5. Enable SSL verification

# -------------------------------------------------------------------
# TriggerBinding: Extract fields from the GitLab push payload
# -------------------------------------------------------------------
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerBinding
metadata:
  name: gitlab-push-binding
  namespace: tekton-pipelines
  labels:
    app.kubernetes.io/part-of: sre-platform
    app.kubernetes.io/component: ci
spec:
  params:
    - name: git-url
      value: "$(body.project.git_http_url)"
    - name: git-revision
      value: "$(body.ref)"
    - name: git-commit-sha
      value: "$(body.after)"
    - name: git-commit-message
      value: "$(body.commits[0].message)"
    - name: git-repo-name
      value: "$(body.project.name)"
    - name: git-sender
      value: "$(body.user_username)"
---
# -------------------------------------------------------------------
# TriggerTemplate: Dashboard (GitLab)
# -------------------------------------------------------------------
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: gitlab-dashboard-build-template
  namespace: tekton-pipelines
  labels:
    app.kubernetes.io/part-of: sre-platform
    app.kubernetes.io/component: ci
spec:
  params:
    - name: git-url
    - name: git-revision
    - name: git-commit-sha
  resourcetemplates:
    - apiVersion: tekton.dev/v1
      kind: PipelineRun
      metadata:
        generateName: gl-dashboard-build-
        namespace: tekton-pipelines
        labels:
          app.kubernetes.io/part-of: sre-platform
          tekton.dev/pipeline: build-deploy
          sre.io/app: sre-dashboard
          sre.io/source: gitlab
      spec:
        pipelineRef:
          name: build-deploy
        params:
          - name: git-url
            value: "$(tt.params.git-url)"
          - name: git-revision
            value: "main"
          - name: app-name
            value: "sre-dashboard"
          - name: image-name
            value: "sre-dashboard"
          - name: image-tag
            value: "git-$(tt.params.git-commit-sha)"
          - name: dockerfile-path
            value: "Dockerfile"
          - name: build-context
            value: "apps/dashboard"
          - name: deployment-file
            value: "apps/dashboard/k8s/deployment.yaml"
          - name: working-dir
            value: "apps/dashboard"
          - name: validation-type
            value: "node"
        workspaces:
          - name: shared-workspace
            volumeClaimTemplate:
              spec:
                accessModes:
                  - ReadWriteOnce
                resources:
                  requests:
                    storage: 1Gi
          - name: docker-credentials
            secret:
              secretName: harbor-push-creds
          - name: git-credentials
            secret:
              secretName: gitlab-token
        taskRunTemplate:
          podTemplate:
            securityContext:
              fsGroup: 65532
---
