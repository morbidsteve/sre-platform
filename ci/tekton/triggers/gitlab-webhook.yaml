# -------------------------------------------------------------------
# EventListener: Receive GitLab push webhooks and route to apps
# -------------------------------------------------------------------
apiVersion: triggers.tekton.dev/v1beta1
kind: EventListener
metadata:
  name: gitlab-push-listener
  namespace: tekton-pipelines
  labels:
    app.kubernetes.io/part-of: sre-platform
    app.kubernetes.io/component: ci
spec:
  serviceAccountName: tekton-triggers-sa
  triggers:
    # ----- Dashboard trigger (apps/dashboard/** changed) -----
    - name: dashboard-trigger
      interceptors:
        - ref:
            name: "gitlab"
          params:
            - name: "secretRef"
              value:
                secretName: gitlab-webhook-secret
                secretKey: secret
        - ref:
            name: "cel"
          params:
            - name: "filter"
              value: >-
                body.ref == 'refs/heads/main' &&
                !body.commits[0].message.contains('[skip ci]') &&
                body.commits.exists(c, c.modified.exists(f, f.startsWith('apps/dashboard/')) || c.added.exists(f, f.startsWith('apps/dashboard/')))
      bindings:
        - ref: gitlab-push-binding
      template:
        ref: gitlab-dashboard-build-template

    # ----- Portal trigger (apps/portal/** changed) -----
    - name: portal-trigger
      interceptors:
        - ref:
            name: "gitlab"
          params:
            - name: "secretRef"
              value:
                secretName: gitlab-webhook-secret
                secretKey: secret
        - ref:
            name: "cel"
          params:
            - name: "filter"
              value: >-
                body.ref == 'refs/heads/main' &&
                !body.commits[0].message.contains('[skip ci]') &&
                body.commits.exists(c, c.modified.exists(f, f.startsWith('apps/portal/')) || c.added.exists(f, f.startsWith('apps/portal/')))
      bindings:
        - ref: gitlab-push-binding
      template:
        ref: gitlab-portal-build-template

    # ----- DSOP Wizard trigger (apps/dsop-wizard/** changed) -----
    - name: wizard-trigger
      interceptors:
        - ref:
            name: "gitlab"
          params:
            - name: "secretRef"
              value:
                secretName: gitlab-webhook-secret
                secretKey: secret
        - ref:
            name: "cel"
          params:
            - name: "filter"
              value: >-
                body.ref == 'refs/heads/main' &&
                !body.commits[0].message.contains('[skip ci]') &&
                body.commits.exists(c, c.modified.exists(f, f.startsWith('apps/dsop-wizard/')) || c.added.exists(f, f.startsWith('apps/dsop-wizard/')))
      bindings:
        - ref: gitlab-push-binding
      template:
        ref: gitlab-wizard-build-template
  resources:
    kubernetesResource:
      spec:
        template:
          spec:
            serviceAccountName: tekton-triggers-sa
            containers: []
---
# -------------------------------------------------------------------
# Secret: GitLab webhook secret (placeholder — replace before use)
# -------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: gitlab-webhook-secret
  namespace: tekton-pipelines
  labels:
    app.kubernetes.io/part-of: sre-platform
type: Opaque
stringData:
  secret: "REPLACE_ME_WITH_GITLAB_WEBHOOK_SECRET"
---
# -------------------------------------------------------------------
# Secret: GitLab token for git push (placeholder — replace before use)
# -------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: gitlab-token
  namespace: tekton-pipelines
  labels:
    app.kubernetes.io/part-of: sre-platform
type: Opaque
stringData:
  token: "REPLACE_ME_WITH_GITLAB_TOKEN"
