---
# Tekton Triggers: GitHub Push Webhook
# Receives GitHub push events and creates PipelineRuns for affected apps.
#
# Setup:
#   1. Configure GitHub webhook to POST to:
#      https://tekton-triggers.apps.sre.example.com/github
#   2. Set content type: application/json
#   3. Set secret: (value from github-webhook-secret Secret)
#   4. Events: Just the push event

# -------------------------------------------------------------------
# TriggerBinding: Extract fields from the GitHub push payload
# -------------------------------------------------------------------
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerBinding
metadata:
  name: github-push-binding
  namespace: tekton-pipelines
  labels:
    app.kubernetes.io/part-of: sre-platform
    app.kubernetes.io/component: ci
spec:
  params:
    - name: git-url
      value: "$(body.repository.clone_url)"
    - name: git-revision
      value: "$(body.ref)"
    - name: git-commit-sha
      value: "$(body.after)"
    - name: git-commit-message
      value: "$(body.head_commit.message)"
    - name: git-repo-name
      value: "$(body.repository.name)"
    - name: git-sender
      value: "$(body.sender.login)"
---
# -------------------------------------------------------------------
# TriggerTemplate: Dashboard — Create PipelineRun for dashboard builds
# -------------------------------------------------------------------
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: dashboard-build-template
  namespace: tekton-pipelines
  labels:
    app.kubernetes.io/part-of: sre-platform
    app.kubernetes.io/component: ci
spec:
  params:
    - name: git-url
    - name: git-revision
    - name: git-commit-sha
  resourcetemplates:
    - apiVersion: tekton.dev/v1
      kind: PipelineRun
      metadata:
        generateName: dashboard-build-
        namespace: tekton-pipelines
        labels:
          app.kubernetes.io/part-of: sre-platform
          tekton.dev/pipeline: build-deploy
          sre.io/app: sre-dashboard
      spec:
        pipelineRef:
          name: build-deploy
        params:
          - name: git-url
            value: "$(tt.params.git-url)"
          - name: git-revision
            value: "main"
          - name: app-name
            value: "sre-dashboard"
          - name: image-name
            value: "sre-dashboard"
          - name: image-tag
            value: "git-$(tt.params.git-commit-sha)"
          - name: dockerfile-path
            value: "Dockerfile"
          - name: build-context
            value: "apps/dashboard"
          - name: deployment-file
            value: "apps/dashboard/k8s/deployment.yaml"
          - name: working-dir
            value: "apps/dashboard"
          - name: validation-type
            value: "node"
        workspaces:
          - name: shared-workspace
            volumeClaimTemplate:
              spec:
                accessModes:
                  - ReadWriteOnce
                resources:
                  requests:
                    storage: 1Gi
          - name: docker-credentials
            secret:
              secretName: harbor-push-creds
          - name: git-credentials
            secret:
              secretName: github-token
        taskRunTemplate:
          podTemplate:
            securityContext:
              fsGroup: 65532
---
