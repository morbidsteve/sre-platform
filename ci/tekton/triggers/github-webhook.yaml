# -------------------------------------------------------------------
# EventListener: Receive GitHub push webhooks and route to apps
# -------------------------------------------------------------------
apiVersion: triggers.tekton.dev/v1beta1
kind: EventListener
metadata:
  name: github-push-listener
  namespace: tekton-pipelines
  labels:
    app.kubernetes.io/part-of: sre-platform
    app.kubernetes.io/component: ci
spec:
  serviceAccountName: tekton-triggers-sa
  triggers:
    # ----- Dashboard trigger (apps/dashboard/** changed) -----
    - name: dashboard-trigger
      interceptors:
        # Verify GitHub webhook signature
        - ref:
            name: "github"
          params:
            - name: "secretRef"
              value:
                secretName: github-webhook-secret
                secretKey: secret
        # Filter: only push events to main
        - ref:
            name: "cel"
          params:
            - name: "filter"
              value: >-
                body.ref == 'refs/heads/main' &&
                !body.head_commit.message.contains('[skip ci]') &&
                body.commits.exists(c, c.modified.exists(f, f.startsWith('apps/dashboard/')) || c.added.exists(f, f.startsWith('apps/dashboard/')))
      bindings:
        - ref: github-push-binding
      template:
        ref: dashboard-build-template

    # ----- Portal trigger (apps/portal/** changed) -----
    - name: portal-trigger
      interceptors:
        - ref:
            name: "github"
          params:
            - name: "secretRef"
              value:
                secretName: github-webhook-secret
                secretKey: secret
        - ref:
            name: "cel"
          params:
            - name: "filter"
              value: >-
                body.ref == 'refs/heads/main' &&
                !body.head_commit.message.contains('[skip ci]') &&
                body.commits.exists(c, c.modified.exists(f, f.startsWith('apps/portal/')) || c.added.exists(f, f.startsWith('apps/portal/')))
      bindings:
        - ref: github-push-binding
      template:
        ref: portal-build-template

    # ----- DSOP Wizard trigger (apps/dsop-wizard/** changed) -----
    - name: wizard-trigger
      interceptors:
        - ref:
            name: "github"
          params:
            - name: "secretRef"
              value:
                secretName: github-webhook-secret
                secretKey: secret
        - ref:
            name: "cel"
          params:
            - name: "filter"
              value: >-
                body.ref == 'refs/heads/main' &&
                !body.head_commit.message.contains('[skip ci]') &&
                body.commits.exists(c, c.modified.exists(f, f.startsWith('apps/dsop-wizard/')) || c.added.exists(f, f.startsWith('apps/dsop-wizard/')))
      bindings:
        - ref: github-push-binding
      template:
        ref: wizard-build-template
  resources:
    kubernetesResource:
      spec:
        template:
          spec:
            serviceAccountName: tekton-triggers-sa
            containers: []
---
# -------------------------------------------------------------------
# Service for the EventListener (exposed via Istio VirtualService)
# -------------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: el-github-push-listener
  namespace: tekton-pipelines
  labels:
    app.kubernetes.io/part-of: sre-platform
    app.kubernetes.io/component: ci
spec:
  selector:
    eventlistener: github-push-listener
  ports:
    - port: 8080
      targetPort: 8080
      name: http
---
# -------------------------------------------------------------------
# ServiceAccount for Tekton Triggers
# -------------------------------------------------------------------
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tekton-triggers-sa
  namespace: tekton-pipelines
  labels:
    app.kubernetes.io/part-of: sre-platform
---
# -------------------------------------------------------------------
# RBAC: Allow Triggers SA to create PipelineRuns
# -------------------------------------------------------------------
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tekton-triggers-role
  labels:
    app.kubernetes.io/part-of: sre-platform
rules:
  - apiGroups: ["triggers.tekton.dev"]
    resources: ["eventlisteners", "triggerbindings", "triggertemplates", "triggers", "interceptors"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["tekton.dev"]
    resources: ["pipelineruns", "taskruns"]
    verbs: ["create", "get", "list"]
  - apiGroups: [""]
    resources: ["configmaps", "secrets", "serviceaccounts"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tekton-triggers-binding
  labels:
    app.kubernetes.io/part-of: sre-platform
subjects:
  - kind: ServiceAccount
    name: tekton-triggers-sa
    namespace: tekton-pipelines
roleRef:
  kind: ClusterRole
  name: tekton-triggers-role
  apiGroup: rbac.authorization.k8s.io
---
# -------------------------------------------------------------------
# Secret: GitHub webhook secret (placeholder — replace before use)
# -------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: github-webhook-secret
  namespace: tekton-pipelines
  labels:
    app.kubernetes.io/part-of: sre-platform
type: Opaque
stringData:
  secret: "REPLACE_ME_WITH_GITHUB_WEBHOOK_SECRET"
---
# -------------------------------------------------------------------
# Secret: GitHub token for git push (placeholder — replace before use)
# -------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: github-token
  namespace: tekton-pipelines
  labels:
    app.kubernetes.io/part-of: sre-platform
type: Opaque
stringData:
  token: "REPLACE_ME_WITH_GITHUB_TOKEN"
