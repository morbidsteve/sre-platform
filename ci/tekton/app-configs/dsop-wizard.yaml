---
# Manual PipelineRun: DSOP Wizard
# Use this to manually trigger a DSOP wizard build without a webhook.
#
# Usage:
#   kubectl create -f ci/tekton/app-configs/dsop-wizard.yaml
#
# Before running, update the image-tag parameter to the desired version.
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: wizard-manual-
  namespace: tekton-pipelines
  labels:
    app.kubernetes.io/part-of: sre-platform
    tekton.dev/pipeline: build-deploy
    sre.io/app: dsop-wizard
    sre.io/trigger: manual
spec:
  pipelineRef:
    name: build-deploy
  params:
    - name: git-url
      value: "https://github.com/morbidsteve/sre-platform.git"
    - name: git-revision
      value: "main"
    - name: app-name
      value: "dsop-wizard"
    - name: image-name
      value: "dsop-wizard"
    - name: image-tag
      value: "v3.0.1"
    - name: dockerfile-path
      value: "Dockerfile"
    - name: build-context
      value: "apps/dsop-wizard"
    - name: deployment-file
      value: "apps/dsop-wizard/k8s/deployment.yaml"
    - name: working-dir
      value: "apps/dsop-wizard"
    - name: validation-type
      value: "typescript"
  workspaces:
    - name: shared-workspace
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 1Gi
    - name: docker-credentials
      secret:
        secretName: harbor-push-creds
    - name: git-credentials
      secret:
        secretName: github-token
  taskRunTemplate:
    podTemplate:
      securityContext:
        fsGroup: 65532
