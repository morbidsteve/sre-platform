---
# Override HA config for lab — single replica, no anti-affinity
apiVersion: v1
kind: ConfigMap
metadata:
  name: monitoring-ha-values
  namespace: monitoring
data:
  values.yaml: |
    prometheus:
      prometheusSpec:
        replicas: 1
    alertmanager:
      alertmanagerSpec:
        replicas: 1
    grafana:
      replicas: 1
      affinity: {}
