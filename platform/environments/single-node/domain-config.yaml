---
# Domain config for single-node profile
# Uses sslip.io for automatic DNS resolution to the node IP
# Override SRE_DOMAIN after applying if you have a real domain
apiVersion: v1
kind: ConfigMap
metadata:
  name: sre-domain-config
  namespace: flux-system
data:
  SRE_DOMAIN: "apps.sre.example.com"
  SRE_REGISTRY: "harbor.apps.sre.example.com"
  SRE_KEYCLOAK_URL: "https://keycloak.apps.sre.example.com"
  SRE_CLUSTER_NAME: "sre-single-node"
