---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-tempo-egress
  namespace: tempo
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # Kubernetes API and S3-compatible storage backend (HTTPS)
    - ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Intra-namespace
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: tempo

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-tempo-ingress
  namespace: tempo
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    # Within namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: tempo
    # Zipkin traces from Istio sidecars (all namespaces)
    - from:
        - namespaceSelector: {}
      ports:
        - port: 9411
          protocol: TCP
    # OTLP gRPC traces from applications and collectors (all namespaces)
    - from:
        - namespaceSelector: {}
      ports:
        - port: 4317
          protocol: TCP
    # OTLP HTTP traces from applications (all namespaces)
    - from:
        - namespaceSelector: {}
      ports:
        - port: 4318
          protocol: TCP
    # Grafana queries and Prometheus scraping from monitoring namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 3100
          protocol: TCP
