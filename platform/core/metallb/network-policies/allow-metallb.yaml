---
# MetalLB controller needs API server access + webhook ingress from API server
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-metallb-controller
  namespace: metallb-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: controller
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - {} # Webhook calls from API server
  egress:
    - {} # API server + leader election + secrets
---
# MetalLB speaker needs host network access for ARP announcements
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-metallb-speaker
  namespace: metallb-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: speaker
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - {} # Speaker receives memberlist traffic from other speakers
  egress:
    - {} # Speaker needs API server + ARP + memberlist
