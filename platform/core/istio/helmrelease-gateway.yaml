---
# Istio Ingress Gateway — north-south traffic entry point
#
# Environment adaptation:
#   - Cloud: Change service.type to LoadBalancer (removes need for NodePort)
#   - Bare metal / Proxmox: NodePort (default) — access via <nodeIP>:30443
#   - Enterprise on-prem: MetalLB + LoadBalancer or NodePort
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istio-gateway
  namespace: istio-system
spec:
  interval: 10m
  dependsOn:
    - name: istiod
  chart:
    spec:
      chart: gateway
      version: "1.25.2"
      sourceRef:
        kind: HelmRepository
        name: istio
        namespace: flux-system
      reconcileStrategy: Revision
  install:
    createNamespace: false
    remediation:
      retries: 3
    # Istio gateway chart has strict JSON schema that rejects standard
    # values like 'resources' and 'service' at top level
    disableSchemaValidation: true
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
    disableSchemaValidation: true
  values:
    replicaCount: 1
    autoscaling:
      enabled: false
    service:
      type: NodePort
      ports:
        - name: status-port
          port: 15021
          protocol: TCP
          targetPort: 15021
        - name: http2
          port: 80
          protocol: TCP
          targetPort: 80
          nodePort: 30080
        - name: https
          port: 443
          protocol: TCP
          targetPort: 443
          nodePort: 30443
    podAnnotations:
      traffic.sidecar.istio.io/includeInboundPorts: ""
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
    podDisruptionBudget:
      minAvailable: 1
