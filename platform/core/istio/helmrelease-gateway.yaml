---
# Istio Ingress Gateway — north-south traffic entry point
# Uses hostNetwork so the gateway pod binds directly to node ports 443/80
# — no NodePort or LoadBalancer needed.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istio-gateway
  namespace: istio-system
spec:
  interval: 10m
  dependsOn:
    - name: istiod
  chart:
    spec:
      chart: gateway
      version: "1.25.2"
      sourceRef:
        kind: HelmRepository
        name: istio
        namespace: flux-system
      reconcileStrategy: Revision
  install:
    createNamespace: false
    remediation:
      retries: 3
    # Istio gateway chart has strict JSON schema that rejects standard
    # values like 'resources' and 'service' at top level
    disableSchemaValidation: true
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
    disableSchemaValidation: true
  # Patch the rendered Deployment to add hostNetwork (not a native chart value).
  # Also remove the net.ipv4.ip_unprivileged_port_start sysctl which conflicts
  # with hostNetwork. For cloud deployments, remove this postRenderers block
  # and set service.type: LoadBalancer instead.
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: istio-gateway
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: istio-gateway
              spec:
                template:
                  spec:
                    hostNetwork: true
                    dnsPolicy: ClusterFirstWithHostNet
                    securityContext:
                      $patch: replace
  values:
    replicaCount: 1
    autoscaling:
      enabled: false
    service:
      # ClusterIP is sufficient — hostNetwork means pods listen on the node
      # directly on ports 443/80. The Service is only for in-cluster routing.
      type: ClusterIP
      ports:
        - name: status-port
          port: 15021
          protocol: TCP
          targetPort: 15021
        - name: http2
          port: 80
          protocol: TCP
          targetPort: 80
        - name: https
          port: 443
          protocol: TCP
          targetPort: 443
    podAnnotations:
      traffic.sidecar.istio.io/includeInboundPorts: ""
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
    podDisruptionBudget:
      minAvailable: 1
