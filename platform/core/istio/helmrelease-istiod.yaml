---
# Istiod — Istio control plane
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istiod
  namespace: istio-system
spec:
  interval: 10m
  dependsOn:
    - name: istio-base
  chart:
    spec:
      chart: istiod
      version: "1.25.2"
      sourceRef:
        kind: HelmRepository
        name: istio
        namespace: flux-system
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    pilot:
      autoscaleEnabled: false
      replicaCount: 1
      resources:
        requests:
          cpu: 200m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      # Enable access logging for AU-2 compliance
      accessLogFile: "/dev/stdout"
      accessLogEncoding: "JSON"

    global:
      # FIPS-compliant TLS settings
      proxy:
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
      # Mesh-wide mTLS settings (reinforced by PeerAuthentication below)
      mtls:
        enabled: true
      # Tracing configuration (Tempo integration)
      tracer:
        zipkin:
          address: "tempo.tempo.svc.cluster.local:9411"

    meshConfig:
      # Enable access logging for all proxies (NIST AU-2)
      accessLogFile: "/dev/stdout"
      accessLogEncoding: "JSON"
      # Default mTLS to STRICT
      defaultConfig:
        holdApplicationUntilProxyStarts: true
        tracing:
          sampling: 10.0
          zipkin:
            address: "tempo.tempo.svc.cluster.local:9411"
      # Outbound traffic policy — REGISTRY_ONLY for zero-trust
      outboundTrafficPolicy:
        mode: REGISTRY_ONLY
      # Enable tracing
      enableTracing: true
      extensionProviders:
        - name: tempo-zipkin
          zipkin:
            service: tempo.tempo.svc.cluster.local
            port: 9411
        - name: oauth2-proxy
          envoyExtAuthzHttp:
            service: oauth2-proxy.oauth2-proxy.svc.cluster.local
            port: 4180
            headersToDownstreamOnDeny:
              - content-type
              - set-cookie
            headersToUpstreamOnAllow:
              - authorization
              - cookie
              - x-auth-request-user
              - x-auth-request-email
              - x-auth-request-groups
            includeRequestHeadersInCheck:
              - authorization
              - cookie
            pathPrefix: /oauth2/auth
            includeAdditionalHeadersInCheck:
              X-Auth-Request-Redirect: "https://%REQ(:authority)%%REQ(:path)%"
