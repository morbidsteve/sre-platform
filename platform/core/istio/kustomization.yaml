---
# Phase 1: Install Istio Helm charts (CRDs + control plane + gateway)
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - helmrelease-base.yaml
  - helmrelease-istiod.yaml
  - helmrelease-gateway.yaml
  - network-policies/default-deny.yaml
  - network-policies/allow-istiod.yaml
  - network-policies/allow-gateway.yaml
