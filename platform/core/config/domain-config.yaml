---
# Domain configuration for Flux postBuild variable substitution.
# All VirtualServices, Gateway, Certificate, and HelmRelease resources reference ${SRE_DOMAIN}.
# Override this ConfigMap per-environment via platform/environments/<profile>/.
#
# TO CHANGE THE PLATFORM DOMAIN:
#   1. Edit this file (or the environment-specific override)
#   2. Commit and push — Flux auto-reconciles all manifests
#   3. See docs/domain-change-guide.md for manual steps (Keycloak, certs, DNS)
apiVersion: v1
kind: ConfigMap
metadata:
  name: sre-domain-config
  namespace: flux-system
data:
  SRE_DOMAIN: "apps.sre.example.com"
  SRE_REGISTRY: "harbor.apps.sre.example.com"
  SRE_KEYCLOAK_URL: "https://keycloak.apps.sre.example.com"
  SRE_CLUSTER_NAME: "sre-lab"
  SRE_GATEWAY_IP: "192.168.2.200"
  SRE_METALLB_RANGE: "192.168.2.200-192.168.2.210"
  SRE_KEYCLOAK_PROXY_IP: "10.43.189.238"
  SRE_OPENBAO_OIDC_SECRET: "REPLACE_ME"
