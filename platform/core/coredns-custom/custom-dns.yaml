---
# CoreDNS custom DNS entries for *.${SRE_DOMAIN}
# This allows in-cluster pods to resolve the domain, but nodes still need
# /etc/hosts or a real DNS server.
#
# For node-level resolution (containerd image pulls), we use a DaemonSet
# that adds entries to the node /etc/hosts file.
apiVersion: v1
kind: ConfigMap
metadata:
  name: node-hosts-config
  namespace: kube-system
  labels:
    app.kubernetes.io/part-of: sre-platform
data:
  hosts-entries: |
    # SRE Platform — MetalLB gateway IP for all *.${SRE_DOMAIN} services
    # Platform services
    192.168.2.200 harbor.${SRE_DOMAIN}
    192.168.2.200 dashboard.${SRE_DOMAIN}
    192.168.2.200 grafana.${SRE_DOMAIN}
    192.168.2.200 keycloak.${SRE_DOMAIN}
    192.168.2.200 neuvector.${SRE_DOMAIN}
    192.168.2.200 openbao.${SRE_DOMAIN}
    192.168.2.200 oauth2.${SRE_DOMAIN}
    192.168.2.200 portal.${SRE_DOMAIN}
    192.168.2.200 prometheus.${SRE_DOMAIN}
    192.168.2.200 alertmanager.${SRE_DOMAIN}
    192.168.2.200 dsop.${SRE_DOMAIN}
    192.168.2.200 compliance.${SRE_DOMAIN}
    # Deployed tenant apps
    192.168.2.200 wireshark.${SRE_DOMAIN}
    192.168.2.200 ws.${SRE_DOMAIN}
    192.168.2.200 statusboard.${SRE_DOMAIN}
    192.168.2.200 intel.${SRE_DOMAIN}
    192.168.2.200 admin-tools.${SRE_DOMAIN}
    192.168.2.200 nginx-demo.${SRE_DOMAIN}
    192.168.2.200 keystone.${SRE_DOMAIN}
  registries-yaml: |
    mirrors:
      harbor.${SRE_DOMAIN}:
        endpoint:
          - "https://harbor.${SRE_DOMAIN}"
    configs:
      "harbor.${SRE_DOMAIN}":
        tls:
          insecure_skip_verify: true
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-hosts-manager
  namespace: kube-system
  labels:
    app.kubernetes.io/name: node-hosts-manager
    app.kubernetes.io/part-of: sre-platform
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: node-hosts-manager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: node-hosts-manager
        app.kubernetes.io/part-of: sre-platform
    spec:
      hostNetwork: true
      tolerations:
        - operator: Exists
      containers:
        - name: hosts-manager
          image: docker.io/library/busybox:1.36.1
          command:
            - /bin/sh
            - -c
            - |
              # Manage SRE platform hosts entries using start/end markers
              # so the managed block can be replaced when the ConfigMap updates
              MARKER_START="# BEGIN SRE-PLATFORM-MANAGED"
              MARKER_END="# END SRE-PLATFORM-MANAGED"
              LEGACY_MARKER="# SRE-PLATFORM-MANAGED"
              HOSTS="/host-etc/hosts"
              while true; do
                # Build desired content
                DESIRED="$${MARKER_START}
              $(cat /config/hosts-entries)
              $${MARKER_END}"
                # Remove legacy one-line marker block if present (from old DaemonSet)
                if grep -q "$${LEGACY_MARKER}" "$${HOSTS}" 2>/dev/null && ! grep -q "$${MARKER_START}" "$${HOSTS}" 2>/dev/null; then
                  # Strip everything from the legacy marker to end of file
                  LEGACY_LINE=$(grep -n "$${LEGACY_MARKER}" "$${HOSTS}" | head -1 | cut -d: -f1)
                  if [ -n "$${LEGACY_LINE}" ]; then
                    head -n $$(($${LEGACY_LINE} - 1)) "$${HOSTS}" > "$${HOSTS}.tmp"
                    mv "$${HOSTS}.tmp" "$${HOSTS}"
                    echo "Removed legacy SRE-PLATFORM-MANAGED block"
                  fi
                fi
                # Check if managed block exists and matches current config
                if grep -q "$${MARKER_START}" "$${HOSTS}" 2>/dev/null; then
                  # Extract current managed block for comparison
                  CURRENT=$(sed -n "/$${MARKER_START}/,/$${MARKER_END}/p" "$${HOSTS}")
                  if [ "$${CURRENT}" != "$${DESIRED}" ]; then
                    # Replace the managed block with updated entries
                    sed -i "/$${MARKER_START}/,/$${MARKER_END}/d" "$${HOSTS}"
                    echo "" >> "$${HOSTS}"
                    echo "$${DESIRED}" >> "$${HOSTS}"
                    echo "Updated SRE platform hosts entries"
                  fi
                else
                  # First time — add the managed block
                  echo "" >> "$${HOSTS}"
                  echo "$${DESIRED}" >> "$${HOSTS}"
                  echo "Added SRE platform hosts entries"
                fi
                # Write RKE2 registries.yaml for Harbor TLS trust
                REGISTRIES="/host-rancher/registries.yaml"
                if [ ! -f "$${REGISTRIES}" ] || ! grep -q "harbor.${SRE_DOMAIN}" "$${REGISTRIES}" 2>/dev/null; then
                  mkdir -p /host-rancher
                  cp /config/registries-yaml "$${REGISTRIES}"
                  echo "Wrote RKE2 registries.yaml (RKE2 restart needed to pick up)"
                fi
                sleep 300
              done
          volumeMounts:
            - name: host-etc
              mountPath: /host-etc
            - name: host-rancher
              mountPath: /host-rancher
            - name: config
              mountPath: /config
          securityContext:
            runAsUser: 0
            privileged: true
          resources:
            requests:
              cpu: 5m
              memory: 8Mi
            limits:
              cpu: 10m
              memory: 16Mi
      volumes:
        - name: host-etc
          hostPath:
            path: /etc
        - name: host-rancher
          hostPath:
            path: /etc/rancher/rke2
        - name: config
          configMap:
            name: node-hosts-config
