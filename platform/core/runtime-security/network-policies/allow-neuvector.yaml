---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-neuvector-egress
  namespace: neuvector
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # Kubernetes API (admission webhook, resource watches, scanning)
    - ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Intra-namespace (controller cluster, enforcer-to-controller, scanner-to-controller, manager-to-controller)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: neuvector
    # Broad namespace access for runtime security scanning and network monitoring
    - to:
        - namespaceSelector: {}

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-neuvector-ingress
  namespace: neuvector
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    # Within namespace (controller cluster, enforcer, scanner, manager)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: neuvector
    # Istio gateway for NeuVector web UI
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
      ports:
        - port: 8443
          protocol: TCP
    # Prometheus scraping from monitoring namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 8068
          protocol: TCP
    # Admission webhook from Kubernetes API (any source)
    - from: []
      ports:
        - port: 20443
          protocol: TCP
