---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kyverno
  namespace: kyverno
spec:
  interval: 10m
  chart:
    spec:
      chart: kyverno
      version: "3.3.7"
      sourceRef:
        kind: HelmRepository
        name: kyverno
        namespace: flux-system
  dependsOn:
    - name: istio-base
      namespace: istio-system
    - name: cert-manager
      namespace: cert-manager
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    # Note: ServiceMonitors are created via standalone manifests (see
    # kyverno-servicemonitors.yaml) rather than chart values.
    #
    # Disable the chart's pre-delete and post-upgrade cleanup hooks.
    # Their default image (`bitnami/kubectl:1.30.2`) is no longer
    # pullable on Docker Hub (Bitnami moved most images to a paid
    # registry in 2025), which makes both hooks ImagePullBackOff and
    # blocks every Helm upgrade/uninstall. Reinstate after bumping the
    # chart version to one that replaces the Bitnami image.
    webhooksCleanup:
      enabled: false
    policyReportsCleanup:
      enabled: false
    crds:
      migration:
        enabled: false
    admissionController:
      replicas: 3
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
    backgroundController:
      replicas: 2
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi
    reportsController:
      replicas: 2
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi
    cleanupController:
      replicas: 1
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi
    config:
      webhooks:
        namespaceSelector:
          matchExpressions:
            - key: kubernetes.io/metadata.name
              operator: NotIn
              values:
                - kube-system
    features:
      policyExceptions:
        enabled: true
  valuesFrom:
    - kind: ConfigMap
      name: kyverno-env-values
      optional: true
