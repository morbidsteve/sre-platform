---
# Flux Kustomization for MetalLB configuration (IP pools, L2 advertisements)
# Depends on MetalLB being installed first (CRDs must exist)
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: sre-metallb-config
  namespace: flux-system
spec:
  interval: 10m
  path: ./platform/core/metallb-config
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: sre-metallb
  timeout: 5m
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: sre-domain-config
        optional: false
