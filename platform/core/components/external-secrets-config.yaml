---
# Flux Kustomization for ESO CRD resources (ClusterSecretStore)
# Depends on external-secrets being installed first
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: sre-external-secrets-config
  namespace: flux-system
  annotations:
    sre.io/nist-controls: "IA-5, SC-28"
spec:
  interval: 10m
  path: ./platform/core/external-secrets-config
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: sre-external-secrets
  timeout: 5m
