---
# Flux Kustomization for cert-manager CRD resources (ClusterIssuers, Certificates)
# Depends on cert-manager being installed first
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: sre-cert-manager-config
  namespace: flux-system
  annotations:
    sre.io/nist-controls: "IA-5, SC-12, SC-13"
spec:
  interval: 10m
  path: ./platform/core/cert-manager-config
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: sre-cert-manager
  timeout: 5m
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: sre-domain-config
