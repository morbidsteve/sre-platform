---
# Flux Kustomization for node-level DNS resolution
# Manages /etc/hosts on all nodes for *.${SRE_DOMAIN} resolution
# Required for containerd to pull images from Harbor
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: sre-node-hosts
  namespace: flux-system
spec:
  interval: 10m
  path: ./platform/core/coredns-custom
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 5m
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: sre-domain-config
