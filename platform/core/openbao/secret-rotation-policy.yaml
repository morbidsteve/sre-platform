---
# OpenBao Secrets Rotation Policy Configuration
# Applied via post-init script after OpenBao is initialized and unsealed
# NIST Controls: IA-5, SC-12, SC-28
#
# This ConfigMap contains the policy and configuration scripts to set up
# automatic secret rotation in OpenBao. Run via:
#   kubectl exec -n openbao openbao-0 -- sh /tmp/rotation/setup-rotation.sh
apiVersion: v1
kind: ConfigMap
metadata:
  name: openbao-rotation-config
  namespace: openbao
  labels:
    app.kubernetes.io/part-of: sre-platform
  annotations:
    sre.io/nist-controls: "IA-5, SC-12, SC-28"
data:
  setup-rotation.sh: |
    #!/bin/sh
    # Configure secret rotation policies in OpenBao
    set -e

    export VAULT_ADDR="http://127.0.0.1:8200"

    echo "==> Configuring max TTL and default TTL..."
    bao write sys/mounts/sre/tune default_lease_ttl=72h max_lease_ttl=720h

    echo "==> Creating rotation-aware policies..."

    # Platform admin policy — full access with 24h token TTL
    bao policy write platform-admin - <<'POLICY'
    path "sre/*" {
      capabilities = ["create", "read", "update", "delete", "list"]
    }
    path "pki/*" {
      capabilities = ["create", "read", "update", "delete", "list"]
    }
    path "auth/kubernetes/role/*" {
      capabilities = ["create", "read", "update", "delete", "list"]
    }
    POLICY

    # Tenant read policy — scoped to team path, 8h token TTL
    bao policy write tenant-reader - <<'POLICY'
    path "sre/data/{{identity.entity.aliases.auth_kubernetes_*.metadata.service_account_namespace}}/*" {
      capabilities = ["read", "list"]
    }
    POLICY

    # ESO policy — read access for External Secrets Operator
    bao policy write external-secrets - <<'POLICY'
    path "sre/data/*" {
      capabilities = ["read", "list"]
    }
    path "sre/metadata/*" {
      capabilities = ["read", "list"]
    }
    POLICY

    echo "==> Configuring PKI secrets engine rotation..."
    # Set intermediate CA max TTL to 1 year, certificate max TTL to 90 days
    bao secrets tune -max-lease-ttl=8760h pki/ 2>/dev/null || true

    # Create a role for short-lived workload certificates (72h)
    bao write pki/roles/workload-cert \
      allowed_domains="svc.cluster.local" \
      allow_subdomains=true \
      max_ttl=72h \
      ttl=24h \
      key_type=ec \
      key_bits=256 \
      require_cn=false \
      allow_any_name=false 2>/dev/null || true

    echo "==> Configuring Kubernetes auth token TTLs..."
    # ESO service account gets 1h tokens (auto-renewed by ESO)
    bao write auth/kubernetes/role/external-secrets \
      bound_service_account_names=external-secrets \
      bound_service_account_namespaces=external-secrets \
      policies=external-secrets \
      ttl=1h \
      max_ttl=4h 2>/dev/null || true

    echo "==> Secret rotation policies configured."
    echo "    - KV secrets: 72h default lease, 720h max"
    echo "    - PKI certs: 24h default, 72h max"
    echo "    - K8s auth tokens: 1h default, 4h max"
    echo ""
    echo "Note: ExternalSecret resources should set refreshInterval to"
    echo "match or be shorter than the lease TTL for timely rotation."
