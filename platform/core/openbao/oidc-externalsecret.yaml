---
# Keycloak OIDC client secret for OpenBao SSO login.
# Used by auto-unseal-cronjob.yaml when configuring vault's auth/oidc.
#
# Seed OpenBao path `sre/platform/openbao-oidc`:
#   vault kv put sre/platform/openbao-oidc \
#     client-secret=<keycloak-openbao-client-secret>
#
# NIST Controls: IA-2, IA-5, IA-8, SC-28
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: openbao-oidc-client
  namespace: openbao
  labels:
    app.kubernetes.io/part-of: sre-platform
    app.kubernetes.io/component: openbao
  annotations:
    sre.io/nist-controls: "IA-5, SC-28"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-backend
    kind: ClusterSecretStore
  target:
    name: openbao-oidc-client
    creationPolicy: Owner
  data:
    - secretKey: client-secret
      remoteRef:
        key: sre/platform/openbao-oidc
        property: client-secret
