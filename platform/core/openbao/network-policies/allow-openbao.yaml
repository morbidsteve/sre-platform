---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-openbao-egress
  namespace: openbao
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # Kubernetes API (K8s auth method and service registration)
    - ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Keycloak OIDC (auth discovery and token validation)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: keycloak
      ports:
        - port: 8080
          protocol: TCP
    # Intra-namespace (Raft peering between OpenBao pods)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openbao

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-openbao-ingress
  namespace: openbao
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    # Within namespace (Raft peering, API between OpenBao pods)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openbao
    # ESO and app pods accessing OpenBao API from any namespace
    - from:
        - namespaceSelector: {}
      ports:
        - port: 8200
          protocol: TCP
    # Prometheus scraping from monitoring namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 8200
          protocol: TCP
