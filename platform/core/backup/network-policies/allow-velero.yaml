---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-velero-egress
  namespace: velero
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # Kubernetes API (backup/restore operations) and S3 storage (HTTPS)
    - ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Intra-namespace (velero server, node-agent, hooks)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: velero
    # Broad namespace access for backup data collection
    - to:
        - namespaceSelector: {}
      ports:
        - port: 443
          protocol: TCP
        - port: 8080
          protocol: TCP
        - port: 8443
          protocol: TCP

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-velero-ingress
  namespace: velero
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    # Within namespace (velero server, node-agent)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: velero
    # Prometheus scraping from monitoring namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 8085
          protocol: TCP
