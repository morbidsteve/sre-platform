---
# Allow all monitoring pods basic egress (API server + DNS)
# More granular per-pod policies can be added once stable
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-monitoring-egress
  namespace: monitoring
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # Kubernetes API
    - ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Scrape all namespaces (common metrics ports)
    - ports:
        - port: 8080
          protocol: TCP
        - port: 8443
          protocol: TCP
        - port: 9090
          protocol: TCP
        - port: 9093
          protocol: TCP
        - port: 9094
          protocol: TCP
        - port: 9100
          protocol: TCP
        - port: 10250
          protocol: TCP
        - port: 10257
          protocol: TCP
        - port: 10259
          protocol: TCP
        - port: 15014
          protocol: TCP
        - port: 15090
          protocol: TCP
    # Intra-namespace communication
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
    # Loki datasource (logging namespace)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: logging
      ports:
        - port: 3100
          protocol: TCP

---
# Allow ingress from Istio gateway (Grafana) and within monitoring namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-monitoring-ingress
  namespace: monitoring
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    # Within monitoring namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
    # Istio gateway for Grafana, Prometheus, Alertmanager
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
      ports:
        - port: 80
          protocol: TCP
        - port: 3000
          protocol: TCP
        - port: 9090
          protocol: TCP
        - port: 9093
          protocol: TCP
    # Webhook traffic from API server
    - ports:
        - port: 443
          protocol: TCP
        - port: 10250
          protocol: TCP
