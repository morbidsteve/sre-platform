---
# Allow all monitoring pods basic egress (API server + DNS)
# More granular per-pod policies can be added once stable
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-monitoring-egress
  namespace: monitoring
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # Kubernetes API
    - ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Scrape all namespaces (common metrics ports)
    - ports:
        - port: 8000    # Kyverno metrics (admission/background/reports/cleanup controllers)
          protocol: TCP
        - port: 9187    # CNPG postgres-exporter (pipeline-db in sre-dashboard)
          protocol: TCP
        - port: 3100    # Loki, Tempo
          protocol: TCP
        - port: 3500    # Loki canary
          protocol: TCP
        - port: 8001    # Harbor exporter
          protocol: TCP
        - port: 8080    # Various
          protocol: TCP
        - port: 8085    # Velero
          protocol: TCP
        - port: 8200    # OpenBao
          protocol: TCP
        - port: 8443    # Various HTTPS
          protocol: TCP
        - port: 9000    # Keycloak metrics
          protocol: TCP
        - port: 9090    # Prometheus
          protocol: TCP
        - port: 9093    # AlertManager
          protocol: TCP
        - port: 9094    # AlertManager cluster
          protocol: TCP
        - port: 9100    # Node Exporter
          protocol: TCP
        - port: 9153    # CoreDNS
          protocol: TCP
        - port: 10250   # Kubelet
          protocol: TCP
        - port: 10257   # kube-controller-manager
          protocol: TCP
        - port: 10259   # kube-scheduler
          protocol: TCP
        - port: 12345   # Alloy
          protocol: TCP
        - port: 15014   # Istio
          protocol: TCP
        - port: 15090   # Istio Envoy
          protocol: TCP
    # Intra-namespace communication
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
    # Loki + Tempo datasources
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: logging
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: tempo
      ports:
        - port: 3100
          protocol: TCP
        - port: 80
          protocol: TCP

---
# Allow ingress from Istio gateway (Grafana) and within monitoring namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-monitoring-ingress
  namespace: monitoring
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    # Within monitoring namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
    # Istio gateway for Grafana, Prometheus, Alertmanager
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
      ports:
        - port: 80
          protocol: TCP
        - port: 3000
          protocol: TCP
        - port: 9090
          protocol: TCP
        - port: 9093
          protocol: TCP
    # Dashboard proxy (for StatusBoard/Intel Feed proxy endpoints)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: sre-dashboard
      ports:
        - port: 9090
          protocol: TCP
        - port: 9093
          protocol: TCP
    # Webhook traffic from API server
    - ports:
        - port: 443
          protocol: TCP
        - port: 10250
          protocol: TCP
