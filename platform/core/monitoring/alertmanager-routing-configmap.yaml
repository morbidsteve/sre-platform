---
# ConfigMap containing Alertmanager routing overrides for kube-prometheus-stack.
# Referenced by the HelmRelease via valuesFrom.
#
# This separates alerting routing from the main HelmRelease values so that
# routing changes (adding receivers, adjusting intervals) do not require
# modifying the HelmRelease itself.
#
# NIST Controls: IR-4, IR-5, IR-6, SI-5
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-routing-values
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: sre-platform
    app.kubernetes.io/component: alertmanager
  annotations:
    sre.io/nist-controls: "IR-4, IR-5, IR-6, SI-5"
data:
  values.yaml: |
    alertmanager:
      config:
        global:
          resolve_timeout: "5m"
          # Set ALERTMANAGER_SLACK_WEBHOOK env or replace URL below
          # slack_api_url: "REPLACE_ME_SLACK_WEBHOOK_URL"
        route:
          receiver: "null"
          group_by:
            - "namespace"
            - "alertname"
            - "severity"
          group_wait: "30s"
          group_interval: "5m"
          repeat_interval: "4h"
          routes:
            - receiver: "critical-pagerduty"
              matchers:
                - severity = critical
              repeat_interval: "15m"
              continue: true
            - receiver: "critical-slack"
              matchers:
                - severity = critical
              repeat_interval: "1h"
              continue: false
            - receiver: "warning-slack"
              matchers:
                - severity = warning
              repeat_interval: "4h"
              continue: false
            - receiver: "security-slack"
              matchers:
                - category = security
              repeat_interval: "30m"
              continue: false
        receivers:
          # Default null receiver for lab (replace with real integrations for production)
          - name: "null"
          # Slack receivers (uncomment and set slack_api_url in global when ready)
          # - name: "default-slack"
          #   slack_configs:
          #     - channel: "#sre-alerts"
          #       send_resolved: true
          # - name: "critical-slack"
          #   slack_configs:
          #     - channel: "#sre-critical"
          #       send_resolved: true
          - name: "critical-pagerduty"
          # PagerDuty (uncomment when ready)
          #   pagerduty_configs:
          #     - routing_key: "REPLACE_ME_PAGERDUTY_ROUTING_KEY"
          #       severity: critical
          - name: "warning-slack"
          - name: "critical-slack"
          - name: "security-slack"
          - name: "default-slack"
          - name: "email-fallback"
        inhibit_rules:
          - source_matchers:
              - severity = critical
            target_matchers:
              - severity = warning
            equal:
              - "namespace"
              - "alertname"
          - source_matchers:
              - alertname = InfoInhibitor
            target_matchers:
              - severity = info
            equal:
              - "namespace"
