---
# ConfigMap containing Alertmanager routing overrides for kube-prometheus-stack.
# Referenced by the HelmRelease via valuesFrom.
#
# This separates alerting routing from the main HelmRelease values so that
# routing changes (adding receivers, adjusting intervals) do not require
# modifying the HelmRelease itself.
#
# NIST Controls: IR-4, IR-5, IR-6, SI-5
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-routing-values
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: sre-platform
    app.kubernetes.io/component: alertmanager
  annotations:
    sre.io/nist-controls: "IR-4, IR-5, IR-6, SI-5"
data:
  values.yaml: |
    alertmanager:
      config:
        global:
          resolve_timeout: "5m"
          # Set ALERTMANAGER_SLACK_WEBHOOK env or replace URL below
          slack_api_url: "REPLACE_ME_SLACK_WEBHOOK_URL"
        route:
          receiver: "default-slack"
          group_by:
            - "namespace"
            - "alertname"
            - "severity"
          group_wait: "30s"
          group_interval: "5m"
          repeat_interval: "4h"
          routes:
            - receiver: "critical-pagerduty"
              matchers:
                - severity = critical
              repeat_interval: "15m"
              continue: true
            - receiver: "critical-slack"
              matchers:
                - severity = critical
              repeat_interval: "1h"
              continue: false
            - receiver: "warning-slack"
              matchers:
                - severity = warning
              repeat_interval: "4h"
              continue: false
            - receiver: "security-slack"
              matchers:
                - category = security
              repeat_interval: "30m"
              continue: false
        receivers:
          - name: "default-slack"
            slack_configs:
              - channel: "#sre-alerts"
                send_resolved: true
                title: '{{ "{{" }} .Status | toUpper {{ "}}" }} | {{ "{{" }} .CommonLabels.alertname {{ "}}" }}'
                text: >-
                  *Severity:* {{ "{{" }} .CommonLabels.severity {{ "}}" }}
                  *Namespace:* {{ "{{" }} .CommonLabels.namespace {{ "}}" }}
                  *Description:* {{ "{{" }} .CommonAnnotations.description {{ "}}" }}
                  *Runbook:* {{ "{{" }} .CommonAnnotations.runbook_url {{ "}}" }}
          - name: "critical-slack"
            slack_configs:
              - channel: "#sre-critical"
                send_resolved: true
                color: '{{ "{{" }} if eq .Status "firing" {{ "}}" }}danger{{ "{{" }} else {{ "}}" }}good{{ "{{" }} end {{ "}}" }}'
                title: 'CRITICAL | {{ "{{" }} .CommonLabels.alertname {{ "}}" }}'
                text: >-
                  *Namespace:* {{ "{{" }} .CommonLabels.namespace {{ "}}" }}
                  *Description:* {{ "{{" }} .CommonAnnotations.description {{ "}}" }}
                  *Runbook:* {{ "{{" }} .CommonAnnotations.runbook_url {{ "}}" }}
          - name: "critical-pagerduty"
            pagerduty_configs:
              - routing_key: "REPLACE_ME_PAGERDUTY_ROUTING_KEY"
                severity: critical
                description: '{{ "{{" }} .CommonLabels.alertname {{ "}}" }} in {{ "{{" }} .CommonLabels.namespace {{ "}}" }}'
          - name: "warning-slack"
            slack_configs:
              - channel: "#sre-alerts"
                send_resolved: true
                title: 'WARNING | {{ "{{" }} .CommonLabels.alertname {{ "}}" }}'
                text: >-
                  *Namespace:* {{ "{{" }} .CommonLabels.namespace {{ "}}" }}
                  *Description:* {{ "{{" }} .CommonAnnotations.description {{ "}}" }}
          - name: "security-slack"
            slack_configs:
              - channel: "#sre-security"
                send_resolved: true
                color: danger
                title: 'SECURITY | {{ "{{" }} .CommonLabels.alertname {{ "}}" }}'
                text: >-
                  *Type:* {{ "{{" }} .CommonLabels.category {{ "}}" }}
                  *Namespace:* {{ "{{" }} .CommonLabels.namespace {{ "}}" }}
                  *Description:* {{ "{{" }} .CommonAnnotations.description {{ "}}" }}
          - name: "email-fallback"
            email_configs:
              - to: "sre-team@example.com"
                from: "alertmanager@sre.example.com"
                smarthost: "smtp.example.com:587"
                auth_username: "REPLACE_ME"
                auth_password: "REPLACE_ME"
                send_resolved: true
        inhibit_rules:
          - source_matchers:
              - severity = critical
            target_matchers:
              - severity = warning
            equal:
              - "namespace"
              - "alertname"
          - source_matchers:
              - alertname = InfoInhibitor
            target_matchers:
              - severity = info
            equal:
              - "namespace"
