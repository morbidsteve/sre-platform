---
# ConfigMap containing Alertmanager routing overrides for kube-prometheus-stack.
# Referenced by the HelmRelease via valuesFrom.
#
# This separates alerting routing from the main HelmRelease values so that
# routing changes (adding receivers, adjusting intervals) do not require
# modifying the HelmRelease itself.
#
# NIST Controls: IR-4, IR-5, IR-6, SI-5
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-routing-values
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: sre-platform
    app.kubernetes.io/component: alertmanager
  annotations:
    sre.io/nist-controls: "IR-4, IR-5, IR-6, SI-5"
data:
  values.yaml: |
    alertmanager:
      config:
        global:
          resolve_timeout: "5m"
        route:
          receiver: "default-webhook"
          group_by:
            - "namespace"
            - "alertname"
            - "severity"
          group_wait: "30s"
          group_interval: "5m"
          repeat_interval: "4h"
          routes:
            - receiver: "critical-webhook"
              matchers:
                - severity = critical
              repeat_interval: "1h"
              continue: false
            - receiver: "warning-webhook"
              matchers:
                - severity = warning
              repeat_interval: "4h"
              continue: false
        receivers:
          - name: "default-webhook"
            webhook_configs:
              - url: "http://placeholder.example.com/webhook"
                send_resolved: true
          - name: "critical-webhook"
            webhook_configs:
              - url: "http://placeholder.example.com/critical"
                send_resolved: true
          - name: "warning-webhook"
            webhook_configs:
              - url: "http://placeholder.example.com/warning"
                send_resolved: true
        inhibit_rules:
          - source_matchers:
              - severity = critical
            target_matchers:
              - severity = warning
            equal:
              - "namespace"
              - "alertname"
