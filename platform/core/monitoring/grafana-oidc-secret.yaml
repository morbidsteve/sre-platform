---
# Grafana OIDC client secret for Keycloak SSO
# Replace REPLACE_ME_GRAFANA_CLIENT_SECRET with the actual Keycloak client secret
# after running scripts/configure-keycloak-sso.sh
apiVersion: v1
kind: Secret
metadata:
  name: grafana-oidc-credentials
  namespace: monitoring
type: Opaque
stringData:
  values.yaml: |
    grafana:
      grafana.ini:
        auth.generic_oauth:
          client_secret: "REPLACE_ME_GRAFANA_CLIENT_SECRET"
