---
# Grafana OIDC client secret for Keycloak SSO, synced from OpenBao.
#
# The Grafana HelmRelease (helmrelease.yaml) references this Secret via
# valuesFrom.kind=Secret name=grafana-oidc-credentials, expecting a
# `values.yaml` key whose contents override Grafana chart values with
# the OIDC client secret.
#
# Seed OpenBao path `sre/platform/grafana-oidc`:
#   vault kv put sre/platform/grafana-oidc \
#     client-secret=<keycloak-grafana-client-secret>
#
# NIST Controls: IA-2, IA-5, IA-8, SC-28
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-oidc-credentials
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: sre-platform
    app.kubernetes.io/component: grafana
  annotations:
    sre.io/nist-controls: "IA-5, SC-28"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-backend
    kind: ClusterSecretStore
  target:
    name: grafana-oidc-credentials
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        values.yaml: |
          grafana:
            grafana.ini:
              auth.generic_oauth:
                client_secret: "{{ .clientSecret }}"
  data:
    - secretKey: clientSecret
      remoteRef:
        key: sre/platform/grafana-oidc
        property: client-secret
