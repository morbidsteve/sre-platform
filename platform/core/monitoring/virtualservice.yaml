---
# Istio VirtualService for Grafana dashboard
# Routes external traffic from the main Istio gateway to Grafana
# NIST AU-6 (Audit Review, Analysis, and Reporting)
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: sre-platform
  annotations:
    sre.io/nist-controls: "AU-6, CA-7, SI-4"
spec:
  hosts:
    - "grafana.${SRE_DOMAIN}"
  gateways:
    - istio-system/main
  http:
    # OAuth2 proxy — routes /oauth2/* to oauth2-proxy for SSO flow
    - match:
        - uri:
            prefix: /oauth2/
      route:
        - destination:
            host: oauth2-proxy.oauth2-proxy.svc.cluster.local
            port:
              number: 4180
      timeout: 30s
    - route:
        - destination:
            host: kube-prometheus-stack-grafana.monitoring.svc.cluster.local
            port:
              number: 80
      timeout: 30s
      retries:
        attempts: 3
        perTryTimeout: 10s
        retryOn: "5xx,reset,connect-failure"

---
# Istio VirtualService for Prometheus UI
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: sre-platform
  annotations:
    sre.io/nist-controls: "CA-7, SI-4"
spec:
  hosts:
    - "prometheus.${SRE_DOMAIN}"
  gateways:
    - istio-system/main
  http:
    # OAuth2 proxy — routes /oauth2/* to oauth2-proxy for SSO flow
    - match:
        - uri:
            prefix: /oauth2/
      route:
        - destination:
            host: oauth2-proxy.oauth2-proxy.svc.cluster.local
            port:
              number: 4180
      timeout: 30s
    - route:
        - destination:
            host: kube-prometheus-stack-prometheus.monitoring.svc.cluster.local
            port:
              number: 9090

---
