---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 10m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "72.6.2"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  dependsOn:
    - name: istio-base
      namespace: istio-system
    - name: kyverno
      namespace: kyverno
  install:
    crds: CreateReplace
    createNamespace: false
    remediation:
      retries: 3
    timeout: 10m
  upgrade:
    cleanupOnFail: true
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    # ---------------------------------------------------------------
    # Prometheus
    # ---------------------------------------------------------------
    prometheus:
      enabled: true
      prometheusSpec:
        replicas: 1
        retention: "15d"
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: "1"
            memory: 2Gi
        # Storage configured via environment profile ConfigMap (monitoring-env-values)
        # Discover ServiceMonitors and PodMonitors across all namespaces
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
        serviceMonitorSelector: {}
        podMonitorSelector: {}
        ruleSelector: {}

    # ---------------------------------------------------------------
    # Grafana
    # ---------------------------------------------------------------
    grafana:
      enabled: true
      replicas: 1
      # Admin password injected via grafana-admin-credentials Secret (valuesFrom)
      # Do NOT set adminPassword inline — use bootstrap-secrets.sh
      grafana.ini:
        server:
          root_url: "https://grafana.apps.sre.example.com"
          serve_from_sub_path: false
        security:
          cookie_samesite: none
          cookie_secure: true
        # Keycloak SSO — OIDC config (secret injected via grafana-oidc-credentials valuesFrom)
        auth.generic_oauth:
          enabled: true
          name: "Keycloak"
          allow_sign_up: true
          client_id: "grafana"
          scopes: "openid profile email groups"
          auth_url: "https://keycloak.apps.sre.example.com/realms/sre/protocol/openid-connect/auth"
          token_url: "http://keycloak-http.keycloak.svc.cluster.local:80/realms/sre/protocol/openid-connect/token"
          api_url: "http://keycloak-http.keycloak.svc.cluster.local:80/realms/sre/protocol/openid-connect/userinfo"
          role_attribute_path: "contains(groups[*], 'platform-admins') && 'Admin' || contains(groups[*], 'developers') && 'Editor' || 'Viewer'"
          tls_skip_verify_insecure: true
      assertNoLeakedSecrets: false
      service:
        type: ClusterIP
      # Persistence configured via environment profile ConfigMap (monitoring-env-values)
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
      sidecar:
        dashboards:
          enabled: true
          searchNamespace: ALL
          label: "grafana_dashboard"
          folderAnnotation: "grafana_folder"
          provider:
            foldersFromFilesStructure: true
        datasources:
          enabled: true
          searchNamespace: ALL
          label: "grafana_datasource"
      additionalDataSources:
        - name: Loki
          type: loki
          url: http://loki.logging.svc.cluster.local:3100
          access: proxy
          jsonData:
            maxLines: 1000
        - name: Tempo
          type: tempo
          url: http://tempo.tempo.svc.cluster.local:3100
          access: proxy
          jsonData:
            tracesToLogsV2:
              datasourceUid: loki
              enabled: true
            lokiSearch:
              datasourceUid: loki

    # ---------------------------------------------------------------
    # AlertManager
    # ---------------------------------------------------------------
    alertmanager:
      enabled: true
      alertmanagerSpec:
        replicas: 1
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
        # Storage configured via environment profile ConfigMap (monitoring-env-values)
      # Alertmanager routing config is managed via the alertmanager-routing-values
      # ConfigMap (valuesFrom below). Edit alertmanager-routing-configmap.yaml
      # to change receivers, routes, or inhibit rules.

    # ---------------------------------------------------------------
    # Node Exporter
    # ---------------------------------------------------------------
    nodeExporter:
      enabled: true

    # ---------------------------------------------------------------
    # kube-state-metrics
    # ---------------------------------------------------------------
    kubeStateMetrics:
      enabled: true

    # ---------------------------------------------------------------
    # Disable components not available in RKE2 lab
    # ---------------------------------------------------------------
    kubeEtcd:
      enabled: false
    kubeProxy:
      enabled: false

    # ---------------------------------------------------------------
    # Prometheus Operator
    # ---------------------------------------------------------------
    prometheusOperator:
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 300m
          memory: 384Mi

    # ---------------------------------------------------------------
    # Default ServiceMonitor settings
    # ---------------------------------------------------------------
    defaultRules:
      create: true
      rules:
        alertmanager: true
        etcd: false
        configReloaders: true
        general: true
        k8s: true
        kubeApiserverAvailability: true
        kubeApiserverBurnrate: true
        kubeApiserverHistogram: true
        kubeApiserverSlos: true
        kubeControllerManager: true
        kubelet: true
        kubeProxy: false
        kubePrometheusGeneral: true
        kubePrometheusNodeRecording: true
        kubernetesApps: true
        kubernetesResources: true
        kubernetesStorage: true
        kubernetesSystem: true
        kubeSchedulerAlerting: true
        kubeSchedulerRecording: true
        kubeStateMetrics: true
        network: true
        node: true
        nodeExporterAlerting: true
        nodeExporterRecording: true
        prometheus: true
        prometheusOperator: true
  valuesFrom:
    - kind: Secret
      name: grafana-admin-credentials
      optional: true
    - kind: ConfigMap
      name: monitoring-env-values
      optional: true
    - kind: ConfigMap
      name: alertmanager-routing-values
      optional: true
    - kind: ConfigMap
      name: monitoring-ha-values
      optional: true
    - kind: Secret
      name: grafana-oidc-credentials
      optional: true
