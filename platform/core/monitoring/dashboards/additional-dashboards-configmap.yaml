---
# ConfigMap wrappers for additional Grafana dashboards.
# Each ConfigMap has the grafana_dashboard: "1" label so Grafana's
# sidecar container automatically discovers and loads them.
# One ConfigMap per dashboard to avoid the 1MB etcd size limit.
apiVersion: v1
kind: ConfigMap
metadata:
  name: sre-dashboard-cost-allocation
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/part-of: sre-platform
  annotations:
    grafana_folder: "SRE Platform"
data:
  cost-allocation.json: |
    {{- .Files.Get "cost-allocation.json" | nindent 4 }}
