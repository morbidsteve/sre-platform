---
# NOTE: INACTIVE — see platform/README.md
#
# Allow Prometheus to scrape metrics from all platform namespaces
# NIST AU-2, CA-7 — continuous monitoring requires metrics collection

# --- logging namespace ---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-prometheus-scrape
  namespace: logging
  labels:
    app.kubernetes.io/part-of: sre-platform
    sre.io/policy-type: authorization
    sre.io/policy-status: reference-only
  annotations:
    sre.io/nist-controls: "AU-2, CA-7, SI-4"
spec:
  action: ALLOW
  rules:
    - from:
        - source:
            namespaces:
              - monitoring
      to:
        - operation:
            ports:
              - "3100"   # Loki HTTP API
              - "9095"   # Loki gRPC
              - "12345"  # Alloy metrics
              - "15090"  # Istio sidecar stats

