---
# NOTE: INACTIVE — see platform/README.md
#
# Allow Istio gateway to reach Alertmanager UI for external access
# NIST SC-7 — boundary protection via single ingress point
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-gateway-to-alertmanager
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: sre-platform
    sre.io/policy-type: authorization
    sre.io/policy-status: reference-only
  annotations:
    sre.io/nist-controls: "AC-3, SC-7"
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: alertmanager
  action: ALLOW
  rules:
    - from:
        - source:
            namespaces:
              - istio-system
      to:
        - operation:
            ports:
              - "9093"

---
# Allow Prometheus to reach Alertmanager for firing alerts
# Internal monitoring communication
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-prometheus-to-alertmanager
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: sre-platform
    sre.io/policy-type: authorization
    sre.io/policy-status: reference-only
  annotations:
    sre.io/nist-controls: "IR-4, IR-5"
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: alertmanager
  action: ALLOW
  rules:
    - from:
        - source:
            namespaces:
              - monitoring
      to:
        - operation:
            ports:
              - "9093"
              - "9094"
