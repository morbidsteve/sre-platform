---
# AuthorizationPolicy — require ext-authz (OAuth2 Proxy) for all ingress traffic
# Exceptions: Keycloak, OAuth2 Proxy callback, health endpoints
# NIST AC-3 (Access Enforcement), IA-2 (Identification and Authentication)
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: ext-authz-oauth2
  namespace: istio-system
  labels:
    app.kubernetes.io/part-of: sre-platform
  annotations:
    sre.io/nist-controls: "AC-3, IA-2, IA-8"
spec:
  selector:
    matchLabels:
      istio: gateway
  action: CUSTOM
  provider:
    name: oauth2-proxy
  rules:
    # Apply ext-authz to all traffic EXCEPT the excluded paths below.
    # The excludes are handled by a separate ALLOW policy.
    - to:
        - operation:
            notPaths:
              # Health check endpoints
              - /healthz
              - /health
              - /ready
              # OAuth2 Proxy callback (must be accessible pre-auth)
              - /oauth2/*
            notHosts:
              # Keycloak must remain accessible (it IS the auth provider)
              - "keycloak.apps.sre.example.com"

---
# Allow health check endpoints without authentication
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-health-endpoints
  namespace: istio-system
  labels:
    app.kubernetes.io/part-of: sre-platform
  annotations:
    sre.io/nist-controls: "AC-3"
spec:
  selector:
    matchLabels:
      istio: gateway
  action: ALLOW
  rules:
    - to:
        - operation:
            paths:
              - /healthz
              - /health
              - /ready

---
# Allow Keycloak traffic without ext-authz (auth provider itself)
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-keycloak-passthrough
  namespace: istio-system
  labels:
    app.kubernetes.io/part-of: sre-platform
  annotations:
    sre.io/nist-controls: "AC-3, IA-2"
spec:
  selector:
    matchLabels:
      istio: gateway
  action: ALLOW
  rules:
    - to:
        - operation:
            hosts:
              - "keycloak.apps.sre.example.com"

---
# Allow OAuth2 Proxy endpoints (callback, sign_in, etc.) without ext-authz
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-oauth2-proxy-passthrough
  namespace: istio-system
  labels:
    app.kubernetes.io/part-of: sre-platform
  annotations:
    sre.io/nist-controls: "AC-3, IA-2"
spec:
  selector:
    matchLabels:
      istio: gateway
  action: ALLOW
  rules:
    - to:
        - operation:
            hosts:
              - "oauth2.apps.sre.example.com"
