---
# AuthorizationPolicy — require ext-authz (OAuth2 Proxy) for PLATFORM UIs only
# Tenant apps are NOT behind platform SSO. They handle their own auth.
#
# NIST AC-3 (Access Enforcement), IA-2 (Identification and Authentication)
#
# Only these platform UIs require SSO login:
#   - SRE Dashboard, Portal, DSOP Wizard, Grafana, Prometheus, Alertmanager
# Excluded from SSO:
#   - Keycloak (IS the auth provider)
#   - Harbor, NeuVector (have their own auth)
#   - All tenant apps (team-* namespaces)
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: ext-authz-oauth2
  namespace: istio-system
  labels:
    app.kubernetes.io/part-of: sre-platform
  annotations:
    sre.io/nist-controls: "AC-3, IA-2, IA-8"
spec:
  selector:
    matchLabels:
      istio: gateway
  action: CUSTOM
  provider:
    name: oauth2-proxy
  rules:
    - to:
        - operation:
            # Only SSO-gate these specific platform UI hosts
            hosts:
              - "dashboard.${SRE_DOMAIN}"
              - "portal.${SRE_DOMAIN}"
              - "dsop.${SRE_DOMAIN}"
              - "grafana.${SRE_DOMAIN}"
              - "prometheus.${SRE_DOMAIN}"
              - "alertmanager.${SRE_DOMAIN}"
              - "openbao.${SRE_DOMAIN}"
            notPaths:
              - /healthz
              - /health
              - /ready
              - /oauth2/*

---
# Allow all traffic through the gateway after CUSTOM ext-authz evaluation.
# CUSTOM is evaluated FIRST — unauthenticated requests to platform UIs are
# blocked before reaching this. Tenant apps bypass CUSTOM entirely.
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-gateway-traffic
  namespace: istio-system
  labels:
    app.kubernetes.io/part-of: sre-platform
  annotations:
    sre.io/nist-controls: "AC-3"
spec:
  selector:
    matchLabels:
      istio: gateway
  action: ALLOW
  rules:
    - {}
