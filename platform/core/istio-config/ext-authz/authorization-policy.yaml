---
# AuthorizationPolicy — require ext-authz (OAuth2 Proxy) for all ingress traffic
# Exceptions: Keycloak (auth provider), /oauth2/* paths (pre-auth flow), health endpoints
# NIST AC-3 (Access Enforcement), IA-2 (Identification and Authentication)
#
# Istio evaluation order: CUSTOM → DENY → ALLOW
# 1. CUSTOM ext-authz checks auth via OAuth2 Proxy
#    - If ext-authz denies (no session) → request is blocked immediately
#    - If ext-authz passes (valid session) → continues to ALLOW evaluation
#    - Excluded paths/hosts skip ext-authz entirely
# 2. allow-gateway-traffic matches all requests → allows through
#
# Net effect: all traffic must pass OAuth2 Proxy auth, except Keycloak and /oauth2/* paths
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: ext-authz-oauth2
  namespace: istio-system
  labels:
    app.kubernetes.io/part-of: sre-platform
  annotations:
    sre.io/nist-controls: "AC-3, IA-2, IA-8"
spec:
  selector:
    matchLabels:
      istio: gateway
  action: CUSTOM
  provider:
    name: oauth2-proxy
  rules:
    - to:
        - operation:
            notPaths:
              - /healthz
              - /health
              - /ready
              - /oauth2/*
              - /ui/vault/auth/oidc/oidc/callback*
            notHosts:
              # Keycloak — IS the identity provider
              - "keycloak.${SRE_DOMAIN}"
              # Harbor — Docker registry API uses Bearer tokens, not browser cookies
              - "harbor.${SRE_DOMAIN}"
              # NeuVector — has its own auth system (OIDC configured separately)
              - "neuvector.${SRE_DOMAIN}"
              # Tenant applications — handle their own auth (not behind platform SSO)
              # Apps deployed to team-* namespaces bypass ext-authz
              - "go-httpbin.${SRE_DOMAIN}"
              - "uptime-kuma.${SRE_DOMAIN}"
              - "gitea.${SRE_DOMAIN}"

---
# Allow all traffic through the gateway after CUSTOM ext-authz evaluation.
# CUSTOM is evaluated FIRST — unauthenticated requests are blocked before reaching this.
# This catch-all ALLOW ensures authenticated requests (and excluded paths) are not
# implicitly denied by Istio's "deny if no ALLOW matches" behavior.
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-gateway-traffic
  namespace: istio-system
  labels:
    app.kubernetes.io/part-of: sre-platform
  annotations:
    sre.io/nist-controls: "AC-3"
spec:
  selector:
    matchLabels:
      istio: gateway
  action: ALLOW
  rules:
    - {}
