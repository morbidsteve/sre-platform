---
# AuthorizationPolicy — require ext-authz (OAuth2 Proxy) for ALL ingress traffic
# ATO/CMMC/FedRAMP compliance: every app must authenticate through Keycloak SSO.
#
# NIST AC-3 (Access Enforcement), IA-2 (Identification and Authentication)
#
# Exemptions (notHosts):
#   - Keycloak: IS the identity provider — can't auth-gate the auth provider
#   - Harbor: Docker/OCI protocol uses Bearer tokens, not browser cookies
#
# All other traffic (platform UIs AND tenant apps) goes through OAuth2 proxy.
# After Keycloak login, the auth cookie (.apps.sre.example.com) works for all apps.
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: ext-authz-oauth2
  namespace: istio-system
  labels:
    app.kubernetes.io/part-of: sre-platform
  annotations:
    sre.io/nist-controls: "AC-3, IA-2, IA-8"
spec:
  selector:
    matchLabels:
      istio: gateway
  action: CUSTOM
  provider:
    name: oauth2-proxy
  rules:
    - to:
        - operation:
            notMethods:
              - OPTIONS
            notPaths:
              - /healthz
              - /health
              - /ready
              - /readyz
              - /livez
              - /metrics
              - /oauth2/*
              - /ui/vault/auth/oidc/oidc/callback*
            notHosts:
              # Keycloak — IS the identity provider (auth-gating it = infinite redirect)
              - "keycloak.${SRE_DOMAIN}"
              # Harbor — Docker registry API uses Bearer tokens, not browser cookies
              - "harbor.${SRE_DOMAIN}"

---
# Allow all traffic through the gateway after CUSTOM ext-authz evaluation.
# CUSTOM is evaluated FIRST — unauthenticated requests are blocked.
# This catch-all ALLOW ensures authenticated requests pass through.
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-gateway-traffic
  namespace: istio-system
  labels:
    app.kubernetes.io/part-of: sre-platform
  annotations:
    sre.io/nist-controls: "AC-3"
spec:
  selector:
    matchLabels:
      istio: gateway
  action: ALLOW
  rules:
    - {}
