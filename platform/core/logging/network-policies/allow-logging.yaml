---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-logging-egress
  namespace: logging
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # Kubernetes API
    - ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Intra-namespace (Alloy to Loki, Loki internal gRPC/gossip/gateway)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: logging
    # Prometheus remote write (monitoring namespace)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 9090
          protocol: TCP
    # S3-compatible storage backend (MinIO in dev, S3 in prod)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: minio
      ports:
        - port: 9000
          protocol: TCP

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-logging-ingress
  namespace: logging
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    # Within namespace (Alloy to Loki, Loki internal communication)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: logging
    # Grafana queries from monitoring namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 80
          protocol: TCP
        - port: 3100
          protocol: TCP
        - port: 12345
          protocol: TCP
