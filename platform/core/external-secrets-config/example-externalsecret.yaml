---
# Example ExternalSecret for tenant applications
# Copy this to your tenant namespace and modify the remoteRef keys
# NIST Controls: SC-28, IA-5
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: app-secrets
  namespace: team-alpha
  labels:
    app.kubernetes.io/part-of: sre-platform
  annotations:
    sre.io/nist-controls: "SC-28, IA-5"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-backend
    kind: ClusterSecretStore
  target:
    name: app-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: team-alpha/demo-app
        property: database-url
