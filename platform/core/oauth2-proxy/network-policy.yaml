---
# Default deny all ingress/egress for oauth2-proxy namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: oauth2-proxy
  labels:
    app.kubernetes.io/part-of: sre-platform
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# Allow ingress from istio-system (gateway proxies ext-authz calls)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-istio-ingress
  namespace: oauth2-proxy
  labels:
    app.kubernetes.io/part-of: sre-platform
spec:
  podSelector:
    matchLabels:
      app: oauth2-proxy
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
      ports:
        - port: 4180
          protocol: TCP

---
# Allow egress to Keycloak (OIDC token validation), DNS, and Kubernetes API
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-oauth2-proxy-egress
  namespace: oauth2-proxy
  labels:
    app.kubernetes.io/part-of: sre-platform
spec:
  podSelector:
    matchLabels:
      app: oauth2-proxy
  policyTypes:
    - Egress
  egress:
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Keycloak internal service (OIDC discovery, token validation)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: keycloak
      ports:
        - port: 80
          protocol: TCP
        - port: 8080
          protocol: TCP
    # Keycloak external (self-signed TLS for OIDC issuer URL)
    # TODO: Restrict egress to specific Keycloak/gateway IPs in production — currently allows port 443 to any destination for lab flexibility
    - ports:
        - port: 443
          protocol: TCP
    # Istio control plane (sidecar)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
      ports:
        - port: 15012
          protocol: TCP
        - port: 15010
          protocol: TCP
