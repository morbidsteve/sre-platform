---
# Custom OAuth2 Proxy sign-in template
# Fixes post-login redirect: captures the original URL from the browser's
# address bar and passes it as the `rd` parameter to /oauth2/start.
# Without this, users land on oauth2.apps.sre.example.com/ after login
# instead of being redirected back to the service they were accessing.
apiVersion: v1
kind: ConfigMap
metadata:
  name: oauth2-proxy-templates
  namespace: oauth2-proxy
  labels:
    app.kubernetes.io/part-of: sre-platform
    app.kubernetes.io/component: oauth2-proxy
data:
  sign_in.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <title>SRE Platform — Sign In</title>
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
          background: #0f172a;
          color: #e2e8f0;
          display: flex;
          align-items: center;
          justify-content: center;
          min-height: 100vh;
        }
        .card {
          background: #1e293b;
          border: 1px solid #334155;
          border-radius: 12px;
          padding: 2.5rem;
          max-width: 400px;
          width: 90%;
          text-align: center;
          box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        .logo {
          font-size: 2rem;
          font-weight: 700;
          margin-bottom: 0.5rem;
          background: linear-gradient(135deg, #60a5fa, #a78bfa);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
        }
        .subtitle {
          color: #94a3b8;
          font-size: 0.875rem;
          margin-bottom: 2rem;
        }
        .btn {
          display: inline-block;
          background: linear-gradient(135deg, #3b82f6, #6366f1);
          color: #fff;
          padding: 0.75rem 2rem;
          border-radius: 8px;
          border: none;
          font-size: 1rem;
          font-weight: 600;
          cursor: pointer;
          text-decoration: none;
          transition: opacity 0.2s;
          width: 100%;
        }
        .btn:hover { opacity: 0.9; }
        .footer {
          margin-top: 1.5rem;
          font-size: 0.75rem;
          color: #64748b;
        }
        .lock-icon {
          font-size: 2.5rem;
          margin-bottom: 1rem;
        }
      </style>
    </head>
    <body>
      <div class="card">
        <div class="lock-icon">&#128274;</div>
        <div class="logo">SRE Platform</div>
        <div class="subtitle">Secure Runtime Environment</div>
        <a id="sign-in-btn" class="btn" href="/oauth2/start">Sign in with Keycloak</a>
        <div class="footer">Protected by OAuth2 Proxy + Istio ext-authz</div>
      </div>
      <script>
        // Capture the original URL so the user is redirected back after authentication.
        // When ext-authz returns this page as a 403, window.location is the original service URL.
        var btn = document.getElementById('sign-in-btn');
        btn.href = '/oauth2/start?rd=' + encodeURIComponent(window.location.href);
      </script>
    </body>
    </html>
