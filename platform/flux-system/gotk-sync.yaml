---
# Root Kustomization — discovers and reconciles platform/core and platform/addons
# Uses the flux-system GitRepository created by `flux bootstrap`
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: sre-platform
  namespace: flux-system
  annotations:
    sre.io/nist-controls: "CM-2, CM-3, SA-10"
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./platform
  prune: true
  wait: true
  timeout: 10m
