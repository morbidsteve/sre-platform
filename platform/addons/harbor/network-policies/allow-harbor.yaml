---
# Allow all Harbor pods egress (API server + DNS + internal + external HTTPS)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-harbor-egress
  namespace: harbor
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # Intra-namespace (core <-> registry <-> db <-> redis <-> jobservice <-> trivy)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: harbor
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Kubernetes API
    - ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
    # External HTTPS (Trivy DB updates, upstream registry replication)
    - ports:
        - port: 443
          protocol: TCP

---
# Allow ingress from Istio gateway, monitoring, and within namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-harbor-ingress
  namespace: harbor
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    # Within harbor namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: harbor
    # Istio gateway for web UI and API
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
      ports:
        - port: 80
          protocol: TCP
        - port: 8080
          protocol: TCP
        - port: 8443
          protocol: TCP
    # Prometheus scraping
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 8001
          protocol: TCP
    # Webhook traffic from API server
    - ports:
        - port: 443
          protocol: TCP
