---
# Allow all Harbor pods egress (API server + DNS + internal + external HTTPS)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-harbor-egress
  namespace: harbor
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # Allow all egress - Harbor needs intra-namespace communication, DNS,
    # Kubernetes API, Trivy DB updates, and upstream registry replication
    - {}

---
# Allow ingress from any namespace - Harbor serves as the internal container
# registry and must accept image pushes from build pods (sre-builds), image
# pulls from application namespaces, and web UI access via Istio gateway.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-harbor-ingress
  namespace: harbor
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector: {}
