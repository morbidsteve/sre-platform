---
# Allow all Keycloak pods egress (DNS + internal + K8s API + external HTTPS)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-keycloak-egress
  namespace: keycloak
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # Intra-namespace (Keycloak <-> PostgreSQL, JGroups clustering)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: keycloak
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Kubernetes API (service discovery)
    - ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP

---
# Allow ingress from Istio gateway, monitoring, and within namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-keycloak-ingress
  namespace: keycloak
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    # Within keycloak namespace (Keycloak <-> PostgreSQL, JGroups)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: keycloak
    # Istio gateway for SSO web UI
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
      ports:
        - port: 8080
          protocol: TCP
    # SRE Dashboard (admin API for session logout)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: sre-dashboard
      ports:
        - port: 8080
          protocol: TCP
    # Prometheus scraping (metrics on port 9000)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 8080
          protocol: TCP
        - port: 9000
          protocol: TCP
    # Webhook traffic from API server
    - ports:
        - port: 443
          protocol: TCP
