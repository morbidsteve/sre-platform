---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keycloak
  namespace: keycloak
spec:
  interval: 10m
  chart:
    spec:
      chart: keycloak
      version: "24.8.1"
      sourceRef:
        # Bitnami charts now require OCI-type HelmRepository
        kind: HelmRepository
        name: bitnami-oci
        namespace: flux-system
  dependsOn:
    - name: istio-base
      namespace: istio-system
    - name: cert-manager
      namespace: cert-manager
    - name: openbao
      namespace: openbao
    - name: kube-prometheus-stack
      namespace: monitoring
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    # ---------------------------------------------------------------
    # Global — allow bitnamilegacy images (migrated from bitnami org)
    # ---------------------------------------------------------------
    global:
      security:
        allowInsecureImages: true

    # ---------------------------------------------------------------
    # Keycloak image — Bitnami migrated images to bitnamilegacy org
    # ---------------------------------------------------------------
    image:
      registry: docker.io
      repository: bitnamilegacy/keycloak
      tag: "26.3.2-debian-12-r0"

    # ---------------------------------------------------------------
    # Authentication
    # ---------------------------------------------------------------
    auth:
      adminUser: "admin"
      # adminPassword is injected via valuesFrom Secret

    # ---------------------------------------------------------------
    # Deployment — dev mode for lab
    # ---------------------------------------------------------------
    replicaCount: 1
    production: false
    proxy: "edge"

    # ---------------------------------------------------------------
    # Hostname — KC_HOSTNAME_URL forces https:// scheme in ALL OIDC
    # discovery responses, even when accessed internally via HTTP.
    # This is required for internal OIDC clients (OpenBao, etc.) that
    # use http://keycloak.keycloak.svc:80 but need the issuer to match
    # the external https:// URL used by browsers.
    # ---------------------------------------------------------------
    extraEnvVars:
      - name: KC_HOSTNAME_PORT
        value: "443"
      - name: KC_HOSTNAME_STRICT
        value: "false"
      - name: KC_HTTP_RELATIVE_PATH
        value: "/"
    # Override keycloak.conf to use hostname-url (forces https:// issuer for ALL requests)
    # The default Bitnami init writes `hostname = ...` which uses request protocol for issuer.
    # Adding hostname-url forces https:// issuer even on internal HTTP requests.
    # Required for OpenBao/NeuVector OIDC which access Keycloak internally via HTTP.
    extraVolumes:
      - name: keycloak-conf-override
        configMap:
          name: keycloak-extra-config
    extraVolumeMounts:
      - name: keycloak-conf-override
        mountPath: /opt/bitnami/keycloak/conf/hostname-override.conf
        subPath: hostname-override.conf
        readOnly: true
    command:
      - /bin/bash
    args:
      - -c
      - |
        # Append hostname-url override to the generated keycloak.conf
        cat /opt/bitnami/keycloak/conf/hostname-override.conf >> /opt/bitnami/keycloak/conf/keycloak.conf
        # Start Keycloak normally
        /opt/bitnami/scripts/keycloak/entrypoint.sh /opt/bitnami/scripts/keycloak/run.sh

    # ---------------------------------------------------------------
    # Service — ClusterIP (accessed via Istio Gateway + VirtualService)
    # ---------------------------------------------------------------
    service:
      type: ClusterIP

    # ---------------------------------------------------------------
    # Bundled PostgreSQL — bitnamilegacy images with persistence
    # ---------------------------------------------------------------
    postgresql:
      enabled: true
      image:
        registry: docker.io
        repository: bitnamilegacy/postgresql
        tag: "17.4.0-debian-12-r17"
      primary:
        persistence:
          enabled: false

    # ---------------------------------------------------------------
    # Prometheus Metrics
    # ---------------------------------------------------------------
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
  valuesFrom:
    - kind: Secret
      name: keycloak-admin-credentials
      optional: true
    - kind: ConfigMap
      name: keycloak-env-values
      optional: true
