---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keycloak
  namespace: keycloak
spec:
  interval: 10m
  chart:
    spec:
      chart: keycloak
      version: "24.8.1"
      sourceRef:
        # Bitnami charts now require OCI-type HelmRepository
        kind: HelmRepository
        name: bitnami-oci
        namespace: flux-system
  dependsOn:
    - name: istio-base
      namespace: istio-system
    - name: cert-manager
      namespace: cert-manager
    - name: openbao
      namespace: openbao
    - name: kube-prometheus-stack
      namespace: monitoring
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    # ---------------------------------------------------------------
    # Global — allow bitnamilegacy images (migrated from bitnami org)
    # ---------------------------------------------------------------
    global:
      security:
        allowInsecureImages: true

    # ---------------------------------------------------------------
    # Keycloak image — Bitnami migrated images to bitnamilegacy org
    # ---------------------------------------------------------------
    image:
      registry: docker.io
      repository: bitnamilegacy/keycloak
      tag: "26.3.2-debian-12-r0"

    # ---------------------------------------------------------------
    # Authentication
    # ---------------------------------------------------------------
    auth:
      adminUser: "admin"
      # adminPassword is injected via valuesFrom Secret

    # ---------------------------------------------------------------
    # Deployment — dev mode for lab
    # ---------------------------------------------------------------
    replicaCount: 1
    production: false
    proxy: "edge"

    # ---------------------------------------------------------------
    # Hostname — KC_HOSTNAME_URL forces https:// scheme in ALL OIDC
    # discovery responses, even when accessed internally via HTTP.
    # This is required for internal OIDC clients (OpenBao, etc.) that
    # use http://keycloak.keycloak.svc:80 but need the issuer to match
    # the external https:// URL used by browsers.
    # ---------------------------------------------------------------
    extraEnvVars:
      - name: KC_HOSTNAME
        value: "keycloak.${SRE_DOMAIN}"
      - name: KC_HOSTNAME_PORT
        value: "443"
      - name: KC_HOSTNAME_STRICT
        value: "false"
      - name: KC_HTTP_RELATIVE_PATH
        value: "/"

    # Add hostname-url to keycloak.conf AFTER Bitnami's init generates it.
    # This forces https:// in ALL OIDC issuer responses (even internal HTTP).
    # Required for OpenBao OIDC which uses internal HTTP but gets https:// tokens.
    initContainers:
      - name: patch-hostname-url
        image: docker.io/bitnami/os-shell:12
        command:
          - /bin/bash
          - -c
          - |
            echo "Patching keycloak.conf with hostname-url..."
            while [ ! -f /bitnami/keycloak/conf/keycloak.conf ]; do sleep 1; done
            if ! grep -q "hostname-url" /bitnami/keycloak/conf/keycloak.conf; then
              echo "" >> /bitnami/keycloak/conf/keycloak.conf
              echo "hostname-url = https://keycloak.apps.sre.example.com" >> /bitnami/keycloak/conf/keycloak.conf
              echo "hostname-admin-url = https://keycloak.apps.sre.example.com" >> /bitnami/keycloak/conf/keycloak.conf
            fi
            echo "Done. Config:"
            grep hostname /bitnami/keycloak/conf/keycloak.conf
        volumeMounts:
          - name: empty-dir
            mountPath: /bitnami/keycloak
            subPath: app-dir

    # ---------------------------------------------------------------
    # Service — ClusterIP (accessed via Istio Gateway + VirtualService)
    # ---------------------------------------------------------------
    service:
      type: ClusterIP

    # ---------------------------------------------------------------
    # Bundled PostgreSQL — bitnamilegacy images with persistence
    # ---------------------------------------------------------------
    postgresql:
      enabled: true
      image:
        registry: docker.io
        repository: bitnamilegacy/postgresql
        tag: "17.4.0-debian-12-r17"
      primary:
        persistence:
          enabled: false

    # ---------------------------------------------------------------
    # Prometheus Metrics
    # ---------------------------------------------------------------
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
  valuesFrom:
    - kind: Secret
      name: keycloak-admin-credentials
      optional: true
    - kind: ConfigMap
      name: keycloak-env-values
      optional: true
