---
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-https-proxy-config
  namespace: keycloak
data:
  nginx.conf: |
    server {
      listen 8080;
      location /realms/sre/.well-known/openid-configuration {
        proxy_pass http://keycloak.keycloak.svc.cluster.local:80;
        proxy_set_header Host keycloak.apps.sre.example.com;
        sub_filter_types application/json;
        sub_filter_once off;
        sub_filter 'http://keycloak.apps.sre.example.com/realms/sre/protocol/openid-connect/token' 'http://keycloak-https-proxy.keycloak.svc.cluster.local/realms/sre/protocol/openid-connect/token';
        sub_filter 'http://keycloak.apps.sre.example.com/realms/sre/protocol/openid-connect/certs' 'http://keycloak-https-proxy.keycloak.svc.cluster.local/realms/sre/protocol/openid-connect/certs';
        sub_filter 'http://keycloak.apps.sre.example.com/realms/sre/protocol/openid-connect/userinfo' 'http://keycloak-https-proxy.keycloak.svc.cluster.local/realms/sre/protocol/openid-connect/userinfo';
        sub_filter 'http://keycloak.apps.sre.example.com/realms/sre/protocol/openid-connect/auth' 'https://keycloak.apps.sre.example.com/realms/sre/protocol/openid-connect/auth';
      }
      location /realms/ {
        proxy_pass http://keycloak.keycloak.svc.cluster.local:80;
        proxy_set_header Host keycloak.apps.sre.example.com;
      }
      location / {
        proxy_pass http://keycloak.keycloak.svc.cluster.local:80;
        proxy_set_header Host keycloak.apps.sre.example.com;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak-https-proxy
  namespace: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak-https-proxy
  template:
    metadata:
      labels:
        app: keycloak-https-proxy
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nginx
          image: docker.io/nginx:1.27-alpine
          ports:
            - containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /var/cache/nginx
            - name: run
              mountPath: /var/run
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      volumes:
        - name: config
          configMap:
            name: keycloak-https-proxy-config
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}
        - name: run
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak-https-proxy
  namespace: keycloak
spec:
  selector:
    app: keycloak-https-proxy
  ports:
    - port: 80
      targetPort: 8080
