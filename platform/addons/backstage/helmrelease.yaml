---
# Backstage Developer Portal
# Provides a unified software catalog, scaffolding templates, and
# integrated documentation for platform tenants.
# NIST Controls: CM-8 (component inventory), SA-10 (developer config mgmt)
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: backstage
  namespace: backstage
spec:
  interval: 10m
  chart:
    spec:
      chart: backstage
      version: "2.4.0"
      sourceRef:
        kind: HelmRepository
        name: backstage
        namespace: flux-system
  dependsOn:
    - name: istio-base
      namespace: istio-system
    - name: kube-prometheus-stack
      namespace: monitoring
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    # -----------------------------------------------------------------
    # Backstage application
    # -----------------------------------------------------------------
    backstage:
      image:
        registry: ghcr.io
        repository: backstage/backstage
        tag: "1.35.0"

      # Mount the app-config ConfigMap as a file
      extraAppConfig:
        - filename: app-config.sre.yaml
          configMapRef: backstage-app-config

      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: "1"
          memory: 1Gi

      extraEnvVars:
        - name: NODE_OPTIONS
          value: "--max-old-space-size=768"

    # -----------------------------------------------------------------
    # Ingress — disabled; use Istio VirtualService instead
    # -----------------------------------------------------------------
    ingress:
      enabled: false

    # -----------------------------------------------------------------
    # Bundled PostgreSQL
    # -----------------------------------------------------------------
    postgresql:
      enabled: true
      auth:
        username: "backstage"
        database: "backstage"
        # password injected via valuesFrom Secret
      primary:
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 250m
            memory: 256Mi
        persistence:
          enabled: false

    # -----------------------------------------------------------------
    # Service — ClusterIP (accessed via Istio Gateway + VirtualService)
    # -----------------------------------------------------------------
    service:
      type: ClusterIP
      ports:
        backend: 7007

    # -----------------------------------------------------------------
    # Metrics — Prometheus integration
    # -----------------------------------------------------------------
    metrics:
      serviceMonitor:
        enabled: true
        path: /metrics
        interval: 30s

  # -------------------------------------------------------------------
  # Sensitive values from External Secrets (OpenBao via ESO)
  # -------------------------------------------------------------------
  valuesFrom:
    - kind: Secret
      name: backstage-credentials
      optional: true
    - kind: ConfigMap
      name: backstage-env-values
      optional: true
