---
# Flux Kustomization for demo-fullstack Task Board app
# Depends on: istio, tenants (team-demo namespace must exist)
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: sre-demo-fullstack
  namespace: flux-system
spec:
  interval: 10m
  path: ./apps/demo-fullstack/k8s
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: sre-istio
    - name: sre-tenants
  timeout: 5m
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: sre-domain-config
