---
# Flux Kustomization for SRE Portal
# Depends on: istio, harbor
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: sre-portal
  namespace: flux-system
spec:
  interval: 10m
  path: ./apps/portal/k8s
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: sre-istio
    - name: sre-harbor
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: sre-portal
      namespace: sre-portal
  timeout: 5m
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: sre-domain-config
