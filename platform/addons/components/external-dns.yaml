---
# Flux Kustomization for ExternalDNS (automatic DNS record management)
# Depends on: istio
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: sre-external-dns
  namespace: flux-system
  annotations:
    sre.io/nist-controls: "CM-2, CM-3"
spec:
  interval: 10m
  path: ./platform/addons/external-dns
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: sre-istio
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: external-dns
      namespace: external-dns
  timeout: 5m
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: sre-domain-config
