---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-probes
  labels:
    app.kubernetes.io/part-of: sre-platform
    sre.io/policy-category: custom
  annotations:
    policies.kyverno.io/title: Require Probes
    policies.kyverno.io/description: >-
      Requires all application containers to define livenessProbe and
      readinessProbe. Istio sidecar (istio-proxy) is excluded since it uses
      startup and readiness probes only by design.
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/severity: medium
    sre.io/nist-controls: "SI-4, SC-5"
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: validate-probes
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: >-
          All application containers in Pod {{request.object.metadata.name}}
          must define livenessProbe and readinessProbe. Istio sidecar
          (istio-proxy) is excluded from this check.
        deny:
          conditions:
            any:
              - key: "{{ request.object.spec.containers[?livenessProbe == null && name != `istio-proxy`] | length(@) }}"
                operator: GreaterThan
                value: "0"
              - key: "{{ request.object.spec.containers[?readinessProbe == null && name != `istio-proxy`] | length(@) }}"
                operator: GreaterThan
                value: "0"
