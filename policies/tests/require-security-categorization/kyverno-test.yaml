apiVersion: cli.kyverno.io/v1alpha1
kind: Test
metadata:
  name: require-security-categorization-test
policies:
  - policy.yaml
resources:
  - resource-pass.yaml
  - resource-fail.yaml
results:
  - policy: require-security-categorization
    rule: require-categorization-label
    resource: team-alpha
    kind: Namespace
    result: pass
  - policy: require-security-categorization
    rule: require-categorization-label
    resource: team-bad
    kind: Namespace
    result: fail
