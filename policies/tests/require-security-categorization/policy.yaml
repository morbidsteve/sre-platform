apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-security-categorization
  labels:
    app.kubernetes.io/part-of: sre-platform
    sre.io/policy-category: custom
  annotations:
    policies.kyverno.io/title: Require Security Categorization Label
    policies.kyverno.io/description: >-
      Ensures all tenant namespaces have a security categorization label.
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/severity: high
    sre.io/nist-controls: "RA-2, SC-2"
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-categorization-label
      match:
        any:
          - resources:
              kinds:
                - Namespace
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-public
                - kube-node-lease
                - default
                - istio-system
                - flux-system
                - kyverno
                - sre-builds
                - tekton-pipelines
                - tekton-pipelines-resolvers
          - resources:
              selector:
                matchLabels:
                  sre.io/system-namespace: "true"
      validate:
        message: >-
          Tenant namespaces must have a security categorization label.
          Add: sre.io/security-categorization: "moderate" (or "low").
        pattern:
          metadata:
            labels:
              sre.io/security-categorization: "low | moderate"
