---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-privilege-escalation
  labels:
    app.kubernetes.io/part-of: sre-platform
    sre.io/policy-category: restricted
  annotations:
    policies.kyverno.io/title: Disallow Privilege Escalation
    policies.kyverno.io/description: >-
      Requires all containers and init containers to set
      allowPrivilegeEscalation to false. Privilege escalation allows a process
      to gain more privileges than its parent process, which can be exploited
      to escape the container sandbox. This policy enforces the Pod Security
      Standards restricted profile requirement for disabling privilege
      escalation. System namespaces are excluded.
    policies.kyverno.io/category: Pod Security Standards Restricted
    policies.kyverno.io/severity: high
    sre.io/nist-controls: "AC-6, AC-6(10)"
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: disallow-privilege-escalation-containers
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-public
                - kube-node-lease
                - istio-system
                - flux-system
                - kyverno
                - cert-manager
                - monitoring
                - logging
                - tempo
                - openbao
                - external-secrets
                - neuvector
                - harbor
                - velero
                - keycloak
                - sre-dashboard
                - oauth2-proxy
                - local-path-storage
                - metallb-system
                - sre-builds
      validate:
        message: >-
          All containers in Pod {{request.object.metadata.name}} must set
          `securityContext.allowPrivilegeEscalation` to false. Add the
          following to each container's securityContext:
          containers:
            - name: my-container
              securityContext:
                allowPrivilegeEscalation: false
        pattern:
          spec:
            containers:
              - securityContext:
                  allowPrivilegeEscalation: false
    - name: disallow-privilege-escalation-init-containers
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-public
                - kube-node-lease
                - istio-system
                - flux-system
                - kyverno
                - cert-manager
                - monitoring
                - logging
                - tempo
                - openbao
                - external-secrets
                - neuvector
                - harbor
                - velero
                - keycloak
                - sre-dashboard
                - oauth2-proxy
                - local-path-storage
                - metallb-system
                - sre-builds
      preconditions:
        all:
          - key: "{{ request.object.spec.initContainers[] || `[]` | length(@) }}"
            operator: GreaterThanOrEquals
            value: 1
      validate:
        message: >-
          All init containers in Pod {{request.object.metadata.name}} must set
          `securityContext.allowPrivilegeEscalation` to false. Add the
          following to each init container's securityContext:
          initContainers:
            - name: my-init-container
              securityContext:
                allowPrivilegeEscalation: false
        pattern:
          spec:
            initContainers:
              - securityContext:
                  allowPrivilegeEscalation: false
