---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-host-ports
  labels:
    app.kubernetes.io/part-of: sre-platform
    sre.io/policy-category: baseline
  annotations:
    policies.kyverno.io/title: Disallow Host Ports
    policies.kyverno.io/description: >-
      Using hostPort binds a container port directly to a host network
      interface, bypassing Kubernetes networking and creating port conflicts.
      Istio sidecar (istio-proxy) is excluded since it uses hostPort for
      Prometheus metrics scraping by design.
    policies.kyverno.io/category: Pod Security Standards Baseline
    policies.kyverno.io/severity: high
    sre.io/nist-controls: "AC-6, SC-7"
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: deny-host-ports
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: >-
          Host ports are not allowed. Pod {{request.object.metadata.name}} has
          a container with hostPort defined. Remove the hostPort field from all
          container port definitions. Use a Service or Istio VirtualService to
          expose your application instead.
        foreach:
          - list: "request.object.spec.containers[]"
            preconditions:
              all:
                - key: "{{ element.name }}"
                  operator: NotEquals
                  value: "istio-proxy"
            deny:
              conditions:
                any:
                  - key: "{{ element.ports[?hostPort > `0`] || `[]` | length(@) }}"
                    operator: GreaterThan
                    value: 0
    - name: deny-host-ports-init-containers
      match:
        any:
          - resources:
              kinds:
                - Pod
      preconditions:
        all:
          - key: "{{ request.object.spec.initContainers[] || `[]` | length(@) }}"
            operator: GreaterThanOrEquals
            value: 1
      validate:
        message: >-
          Host ports are not allowed on init containers. Remove the hostPort
          field from all init container port definitions.
        foreach:
          - list: "request.object.spec.initContainers[]"
            preconditions:
              all:
                - key: "{{ element.name }}"
                  operator: NotEquals
                  value: "istio-init"
                - key: "{{ element.name }}"
                  operator: NotEquals
                  value: "istio-validation"
            deny:
              conditions:
                any:
                  - key: "{{ element.ports[?hostPort] | length(@) }}"
                    operator: GreaterThan
                    value: 0
