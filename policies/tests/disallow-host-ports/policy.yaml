---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-host-ports
  labels:
    app.kubernetes.io/part-of: sre-platform
    sre.io/policy-category: baseline
  annotations:
    policies.kyverno.io/title: Disallow Host Ports
    policies.kyverno.io/description: >-
      Using hostPort binds a container port directly to a host network
      interface, bypassing Kubernetes networking and creating port conflicts.
    policies.kyverno.io/category: Pod Security Standards Baseline
    policies.kyverno.io/severity: high
    sre.io/nist-controls: "AC-6, SC-7"
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: deny-host-ports
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: >-
          Host ports are not allowed. Remove the hostPort field from all
          container port definitions. Use a Service or Istio VirtualService
          to expose your application instead.
        pattern:
          spec:
            containers:
              - ports:
                  - =(hostPort): 0
    - name: deny-host-ports-init-containers
      match:
        any:
          - resources:
              kinds:
                - Pod
      preconditions:
        all:
          - key: "{{ request.object.spec.initContainers[] || `[]` | length(@) }}"
            operator: GreaterThanOrEquals
            value: 1
      validate:
        message: >-
          Host ports are not allowed on init containers. Remove the hostPort
          field from all init container port definitions.
        pattern:
          spec:
            initContainers:
              - ports:
                  - =(hostPort): 0
