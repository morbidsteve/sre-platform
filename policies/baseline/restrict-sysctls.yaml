---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: restrict-unsafe-sysctls
  labels:
    app.kubernetes.io/part-of: sre-platform
    sre.io/policy-category: baseline
  annotations:
    policies.kyverno.io/title: Restrict Unsafe Sysctls
    policies.kyverno.io/description: >-
      Sysctls can modify kernel behavior and may compromise node stability or
      security. This policy restricts the use of sysctls to only those
      considered safe by Kubernetes. Allowed sysctls are:
      kernel.shm_rmid_forced, net.ipv4.ip_local_port_range,
      net.ipv4.ip_unprivileged_port_start, net.ipv4.tcp_syncookies, and
      net.ipv4.ping_group_range. This is a Pod Security Standards Baseline
      requirement.
    policies.kyverno.io/category: Pod Security Standards Baseline
    policies.kyverno.io/severity: medium
    sre.io/nist-controls: "CM-6, CM-7"
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: restrict-sysctls
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-public
                - kube-node-lease
                - istio-system
                - flux-system
                - kyverno
                - cert-manager
                - monitoring
                - logging
                - tempo
                - openbao
                - external-secrets
                - neuvector
                - harbor
                - velero
                - keycloak
                - sre-dashboard
                - oauth2-proxy
                - local-path-storage
                - metallb-system
                - sre-builds
                - tekton-pipelines
                - tekton-pipelines-resolvers
      validate:
        message: >-
          Unsafe sysctls are not allowed. Pod {{request.object.metadata.name}}
          uses a sysctl that is not in the allowed list. Only the following
          sysctls are permitted: kernel.shm_rmid_forced,
          net.ipv4.ip_local_port_range, net.ipv4.ip_unprivileged_port_start,
          net.ipv4.tcp_syncookies, and net.ipv4.ping_group_range. To fix this,
          remove any disallowed sysctls from spec.securityContext.sysctls or
          replace them with an allowed alternative.
        deny:
          conditions:
            all:
              - key: "{{ request.object.spec.securityContext.sysctls[].name || `[]` }}"
                operator: AnyNotIn
                value:
                  - kernel.shm_rmid_forced
                  - net.ipv4.ip_local_port_range
                  - net.ipv4.ip_unprivileged_port_start
                  - net.ipv4.tcp_syncookies
                  - net.ipv4.ping_group_range
