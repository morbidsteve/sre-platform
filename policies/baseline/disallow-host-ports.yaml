---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-host-ports
  labels:
    app.kubernetes.io/part-of: sre-platform
    sre.io/policy-category: baseline
  annotations:
    policies.kyverno.io/title: Disallow Host Ports
    policies.kyverno.io/description: >-
      Using hostPort binds a container port directly to a host network
      interface, bypassing Kubernetes networking and creating port conflicts.
      This policy denies any Pod that specifies hostPort on any container.
      Use a Service with type ClusterIP, NodePort, or LoadBalancer, or an
      Istio VirtualService for ingress instead.
    policies.kyverno.io/category: Pod Security Standards Baseline
    policies.kyverno.io/severity: high
    sre.io/nist-controls: "AC-6, SC-7"
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: deny-host-ports
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-public
                - kube-node-lease
                - istio-system
                - flux-system
                - kyverno
                - cert-manager
                - monitoring
                - logging
                - tempo
                - openbao
                - external-secrets
                - neuvector
                - harbor
                - velero
                - keycloak
                - sre-dashboard
                - oauth2-proxy
                - local-path-storage
                - metallb-system
      validate:
        message: >-
          Host ports are not allowed. Pod {{request.object.metadata.name}} has
          a container with hostPort defined. To fix this, remove the hostPort
          field from all container port definitions. Use a Service resource
          (ClusterIP, NodePort, or LoadBalancer) or an Istio VirtualService to
          expose your application instead.
        pattern:
          spec:
            containers:
              - ports:
                  - =(hostPort): 0
    - name: deny-host-ports-init-containers
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-public
                - kube-node-lease
                - istio-system
                - flux-system
                - kyverno
                - cert-manager
                - monitoring
                - logging
                - tempo
                - openbao
                - external-secrets
                - neuvector
                - harbor
                - velero
                - keycloak
                - sre-dashboard
                - oauth2-proxy
                - local-path-storage
                - metallb-system
      preconditions:
        all:
          - key: "{{ request.object.spec.initContainers[] || `[]` | length(@) }}"
            operator: GreaterThanOrEquals
            value: 1
      validate:
        message: >-
          Host ports are not allowed on init containers. Pod
          {{request.object.metadata.name}} has an init container with hostPort
          defined. To fix this, remove the hostPort field from all init
          container port definitions.
        pattern:
          spec:
            initContainers:
              - ports:
                  - =(hostPort): 0
