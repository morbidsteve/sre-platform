---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-resource-limits
  labels:
    app.kubernetes.io/part-of: sre-platform
    sre.io/policy-category: custom
  annotations:
    policies.kyverno.io/title: Require Resource Limits
    policies.kyverno.io/description: >-
      Requires all containers and init containers to specify CPU and memory
      requests and limits. Without resource limits, a single pod can consume
      all available node resources, causing denial of service for other
      workloads. System namespaces are excluded from this policy.
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/severity: medium
    sre.io/nist-controls: "SC-6, CM-6"
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: validate-resource-limits
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-node-lease
                - kube-public
                - flux-system
                - istio-system
                - cert-manager
                - monitoring
                - logging
                - tempo
                - openbao
                - external-secrets
                - runtime-security
                - backup
                - kyverno
                - neuvector
                - harbor
                - velero
                - keycloak
                - sre-portal
                - sre-dashboard
                - sre-dsop
                - oauth2-proxy
                - local-path-storage
                - metallb-system
                - sre-builds
                - tekton-pipelines
                - tekton-pipelines-resolvers
      validate:
        message: >-
          All containers in Pod {{request.object.metadata.name}} must specify
          resources.requests and resources.limits for both cpu and memory.
          Add the following to each container spec:
            resources:
              requests:
                cpu: "100m"
                memory: "128Mi"
              limits:
                cpu: "500m"
                memory: "512Mi"
        pattern:
          spec:
            containers:
              - resources:
                  requests:
                    cpu: "?*"
                    memory: "?*"
                  limits:
                    cpu: "?*"
                    memory: "?*"
    - name: validate-init-container-resource-limits
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-node-lease
                - kube-public
                - flux-system
                - istio-system
                - cert-manager
                - monitoring
                - logging
                - tempo
                - openbao
                - external-secrets
                - runtime-security
                - backup
                - kyverno
                - neuvector
                - harbor
                - velero
                - keycloak
                - sre-portal
                - sre-dashboard
                - sre-dsop
                - oauth2-proxy
                - local-path-storage
                - metallb-system
                - sre-builds
                - tekton-pipelines
                - tekton-pipelines-resolvers
      preconditions:
        all:
          - key: "{{ request.object.spec.initContainers[] || `[]` | length(@) }}"
            operator: GreaterThanOrEquals
            value: 1
      validate:
        message: >-
          All init containers in Pod {{request.object.metadata.name}} must
          specify resources.requests and resources.limits for both cpu and
          memory.
        pattern:
          spec:
            initContainers:
              - resources:
                  requests:
                    cpu: "?*"
                    memory: "?*"
                  limits:
                    cpu: "?*"
                    memory: "?*"
