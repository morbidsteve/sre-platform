---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-probes
  labels:
    app.kubernetes.io/part-of: sre-platform
    sre.io/policy-category: custom
  annotations:
    policies.kyverno.io/title: Require Probes
    policies.kyverno.io/description: >-
      Requires all containers to define livenessProbe and readinessProbe.
      Without probes, Kubernetes cannot detect unhealthy pods or know when
      a pod is ready to receive traffic, leading to degraded service
      availability and reliability. System namespaces are excluded from
      this policy.
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/severity: medium
    sre.io/nist-controls: "SI-4, SC-5"
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: validate-probes
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-node-lease
                - kube-public
                - flux-system
                - istio-system
                - cert-manager
                - monitoring
                - logging
                - tempo
                - openbao
                - external-secrets
                - runtime-security
                - backup
                - kyverno
                - neuvector
                - harbor
                - velero
                - keycloak
                - sre-portal
                - sre-dashboard
                - oauth2-proxy
                - local-path-storage
                - metallb-system
                - sre-builds
                - tekton-pipelines
                - tekton-pipelines-resolvers
      validate:
        message: >-
          All application containers in Pod {{request.object.metadata.name}}
          must define livenessProbe and readinessProbe. Istio sidecar
          (istio-proxy) is excluded from this check. Add probes to each
          container spec using at least one of httpGet, tcpSocket, or exec.
        foreach:
          - list: "request.object.spec.containers[]"
            preconditions:
              all:
                - key: "{{ element.name }}"
                  operator: NotEquals
                  value: "istio-proxy"
            deny:
              conditions:
                any:
                  - key: "{{ element.livenessProbe || '' }}"
                    operator: Equals
                    value: ""
                  - key: "{{ element.readinessProbe || '' }}"
                    operator: Equals
                    value: ""
